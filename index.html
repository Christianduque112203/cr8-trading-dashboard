function renderTraderDNA(container, trades, allTrades) {
  if (trades.length < 5) {
    container.innerHTML = `<div class="fade-in"><p class="muted">Your Trader DNA unlocks after 5 logged trades. The more you log, the sharper your profile becomes. (${trades.length}/5)</p></div>`;
    return;
  }

  const tier = computeTier(allTrades, state.currentCode);
  const total = trades.length;
  const wins = trades.filter(t => t.result === 'win').length;
  const winRate = Math.round((wins / total) * 100);
  const disciplined = trades.filter(t => !t.emotional).length;
  const disciplineRate = Math.round((disciplined / total) * 100);
  const avgQuality = Math.round(trades.map(t => computeTradeQuality(t).overall).reduce((a, b) => a + b, 0) / total);

  // Helper: win rate for a filtered subset
  function wrOf(subset) {
    if (!subset.length) return null;
    return Math.round((subset.filter(t => t.result === 'win').length / subset.length) * 100);
  }

  // Best session
  function sessionForHour(h) {
    if (h >= 0 && h < 9) return 'Asian';
    if (h >= 7 && h < 12) return 'London';
    if (h >= 12 && h < 16) return 'London/NY';
    if (h >= 16 && h < 21) return 'NY';
    return 'Off-hours';
  }
  const sessionGroups = {};
  trades.forEach(t => {
    const h = parseInt(String(t.trade_time || '').split(':')[0], 10);
    if (isNaN(h)) return;
    const s = sessionForHour(h);
    (sessionGroups[s] = sessionGroups[s] || []).push(t);
  });
  let bestSession = null;
  Object.entries(sessionGroups).forEach(([name, arr]) => {
    if (arr.length >= 3) {
      const wr = wrOf(arr);
      if (!bestSession || wr > bestSession.wr) bestSession = { name, wr, count: arr.length };
    }
  });

  // Best instrument
  const instGroups = {};
  trades.forEach(t => { if (t.instrument) (instGroups[t.instrument.toUpperCase()] = instGroups[t.instrument.toUpperCase()] || []).push(t); });
  let bestInstrument = null;
  Object.entries(instGroups).forEach(([name, arr]) => {
    if (arr.length >= 3) { const wr = wrOf(arr); if (!bestInstrument || wr > bestInstrument.wr) bestInstrument = { name, wr, count: arr.length }; }
  });

  // Most broken rule
  const violationCounts = {};
  trades.forEach(t => (t.rule_violations || []).forEach(v => violationCounts[v] = (violationCounts[v] || 0) + 1));
  const topViolation = Object.entries(violationCounts).sort((a, b) => b[1] - a[1])[0];

  // Trader archetype — derived from dominant traits
  let archetype, archetypeDesc, archetypeIcon;
  if (disciplineRate >= 80 && winRate >= 55) { archetype = 'The Disciplined Sniper'; archetypeDesc = 'You wait, you strike, you follow your rules. Precision over frequency.'; archetypeIcon = '🎯'; }
  else if (disciplineRate >= 80) { archetype = 'The Process Master'; archetypeDesc = 'Your discipline is elite. The wins will follow the process.'; archetypeIcon = '🧘'; }
  else if (winRate >= 60 && disciplineRate < 60) { archetype = 'The Gifted Gambler'; archetypeDesc = 'You win often, but your discipline lags. Imagine your results with control.'; archetypeIcon = '🎰'; }
  else if (total >= 40 && avgQuality >= 70) { archetype = 'The Grinder'; archetypeDesc = 'High volume, solid execution. You show up and put in the reps.'; archetypeIcon = '⚙️'; }
  else if (winRate < 45 && disciplineRate >= 65) { archetype = 'The Student'; archetypeDesc = 'Disciplined but still finding your edge. You are exactly where growth happens.'; archetypeIcon = '📚'; }
  else { archetype = 'The Developing Trader'; archetypeDesc = 'Your style is still forming. Keep logging — your identity will sharpen.'; archetypeIcon = '🌱'; }

  container.innerHTML = `
    <div class="fade-in" style="display:flex;flex-direction:column;gap:16px;">

      <div class="card tilt-card" style="border-color:var(--gold);background:linear-gradient(135deg, rgba(212,175,55,0.1), var(--surface-1));text-align:center;">
        <div style="font-size:48px;">${archetypeIcon}</div>
        <div style="font-family:var(--font-mono);font-size:11px;color:var(--gold);letter-spacing:0.15em;margin-top:4px;">YOUR TRADER ARCHETYPE</div>
        <h2 style="font-size:24px;margin-top:4px;">${archetype}</h2>
        <p style="font-size:13px;color:var(--text-secondary);margin-top:6px;max-width:340px;margin-left:auto;margin-right:auto;">${archetypeDesc}</p>
        <div style="display:inline-flex;align-items:center;gap:6px;margin-top:12px;padding:4px 14px;border-radius:999px;background:${tier.color}1a;border:1px solid ${tier.color};">
          <span>${tier.icon}</span><span style="font-size:13px;font-weight:500;color:${tier.color};">${tier.name}</span>
        </div>
      </div>

      <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;">
        <div class="card tilt-card">
          <div style="font-size:12px;color:var(--text-secondary);">Execution Quality</div>
          <div class="value-pop" style="font-family:var(--font-mono);font-size:24px;font-weight:500;color:var(--gold);margin-top:4px;">${avgQuality}<span style="font-size:13px;color:var(--text-muted);">/100</span></div>
          <div style="font-size:11px;color:var(--text-muted);margin-top:2px;">How well you trade your plan</div>
        </div>
        <div class="card tilt-card">
          <div style="font-size:12px;color:var(--text-secondary);">Discipline</div>
          <div class="value-pop" style="font-family:var(--font-mono);font-size:24px;font-weight:500;color:${disciplineRate>=70?'var(--text-success)':disciplineRate>=50?'#fbbf24':'var(--text-danger)'};margin-top:4px;">${disciplineRate}%</div>
          <div style="font-size:11px;color:var(--text-muted);margin-top:2px;">Trades following your rules</div>
        </div>
        <div class="card tilt-card">
          <div style="font-size:12px;color:var(--text-secondary);">Win Rate</div>
          <div class="value-pop" style="font-family:var(--font-mono);font-size:24px;font-weight:500;color:${winRate>=50?'var(--text-success)':'var(--text-danger)'};margin-top:4px;">${winRate}%</div>
          <div style="font-size:11px;color:var(--text-muted);margin-top:2px;">Across ${total} trades</div>
        </div>
      </div>

      <div class="card">
        <div style="font-weight:500;margin-bottom:12px;">What defines you</div>
        <div style="display:flex;flex-direction:column;gap:12px;">
          <div style="display:flex;gap:12px;align-items:flex-start;">
            <div style="font-size:20px;">💪</div>
            <div>
              <div style="font-size:12px;color:var(--text-muted);">Your superpower</div>
              <div style="font-size:14px;">${bestInstrument ? `Trading <strong>${esc(bestInstrument.name)}</strong> — ${bestInstrument.wr}% win rate` : bestSession ? `<strong>${esc(bestSession.name)} session</strong> — ${bestSession.wr}% win rate` : 'Still emerging — keep logging with instrument & time filled in'}</div>
            </div>
          </div>
          ${bestSession ? `
          <div style="display:flex;gap:12px;align-items:flex-start;">
            <div style="font-size:20px;">⏰</div>
            <div>
              <div style="font-size:12px;color:var(--text-muted);">When you shine</div>
              <div style="font-size:14px;"><strong>${esc(bestSession.name)} session</strong> — ${bestSession.wr}% win rate over ${bestSession.count} trades</div>
            </div>
          </div>` : ''}
          <div style="display:flex;gap:12px;align-items:flex-start;">
            <div style="font-size:20px;">${topViolation ? '⚠️' : '✨'}</div>
            <div>
              <div style="font-size:12px;color:var(--text-muted);">Your kryptonite</div>
              <div style="font-size:14px;">${topViolation ? `<strong>${esc(topViolation[0])}</strong> — your most-broken rule (${topViolation[1]}\u00d7)` : 'No recurring rule violations. Clean discipline.'}</div>
            </div>
          </div>
        </div>
      </div>

      <div class="card" style="text-align:center;">
        <div style="font-size:13px;color:var(--text-secondary);line-height:1.6;">Your Trader DNA evolves with every trade you log.<br>Check back as your profile sharpens. 🧬</div>
      </div>

    </div>`;
}

function renderPersonalBests(container, trades) {
  if (trades.length === 0) {
    container.innerHTML = `<div class="fade-in"><p class="muted">No trades logged yet — your personal bests will show up here once you start.</p></div>`;
    return;
  }

  const sorted = [...trades].sort((a, b) => (a.trade_date + a.trade_time).localeCompare(b.trade_date + b.trade_time));

  // Biggest win and biggest loss
  const biggestWin = trades.reduce((best, t) => Number(t.pnl_pct) > (best ? Number(best.pnl_pct) : -Infinity) ? t : best, null);
  const biggestLoss = trades.reduce((worst, t) => Number(t.pnl_pct) < (worst ? Number(worst.pnl_pct) : Infinity) ? t : worst, null);

  // Longest win streak (reuse computeStreaks logic's "best", already win-streak based)
  const streaks = computeStreaks(trades.map(t => ({ ...t, trader_code: t.trader_code })), trades[0] ? trades[0].trader_code : null);

  // Best week — group by ISO week, sum pnl
  function getWeekKey(dateStr) {
    const d = new Date(dateStr);
    const onejan = new Date(d.getFullYear(), 0, 1);
    const week = Math.ceil((((d - onejan) / 86400000) + onejan.getDay() + 1) / 7);
    return `${d.getFullYear()}-W${week}`;
  }
  const weekTotals = {};
  sorted.forEach(t => {
    const wk = getWeekKey(t.trade_date);
    weekTotals[wk] = (weekTotals[wk] || 0) + Number(t.pnl_pct);
  });
  let bestWeekKey = null, bestWeekValue = -Infinity;
  Object.entries(weekTotals).forEach(([wk, val]) => { if (val > bestWeekValue) { bestWeekValue = val; bestWeekKey = wk; } });

  // Most disciplined day streak (consecutive trades, not just one day) — longest run of non-emotional trades
  let bestDisciplineRun = 0, run = 0;
  sorted.forEach(t => {
    if (!t.emotional) { run++; bestDisciplineRun = Math.max(bestDisciplineRun, run); } else run = 0;
  });

  // Total trades and overall win rate for context
  const total = trades.length;
  const wins = trades.filter(t => t.result === 'win').length;

  const cards = [
    {
      icon: '💰', label: 'Biggest Win', color: 'var(--text-success)',
      value: biggestWin ? `+${Number(biggestWin.pnl_pct)}%` : '—',
      sub: biggestWin ? `${esc(biggestWin.instrument || 'Trade')} &middot; ${biggestWin.trade_date}` : 'No wins yet'
    },
    {
      icon: '📉', label: 'Biggest Loss', color: 'var(--text-danger)',
      value: biggestLoss ? `${Number(biggestLoss.pnl_pct)}%` : '—',
      sub: biggestLoss ? `${esc(biggestLoss.instrument || 'Trade')} &middot; ${biggestLoss.trade_date}` : 'No losses yet'
    },
    {
      icon: '🔥', label: 'Longest Win Streak', color: 'var(--gold)',
      value: `${streaks.best} trades`,
      sub: streaks.best > 0 ? 'Personal record' : 'Log a few wins in a row to set this'
    },
    {
      icon: '📅', label: 'Best Week', color: 'var(--text-success)',
      value: bestWeekKey ? `${bestWeekValue >= 0 ? '+' : ''}${Math.round(bestWeekValue * 10) / 10}%` : '—',
      sub: bestWeekKey ? bestWeekKey.replace('-W', ', Week ') : 'No data yet'
    },
    {
      icon: '🧘', label: 'Discipline Run', color: '#60a5fa',
      value: `${bestDisciplineRun} trades`,
      sub: 'Longest streak of following your rules'
    },
    {
      icon: '📊', label: 'Total Trades', color: 'var(--text-primary)',
      value: `${total}`,
      sub: `${total ? Math.round((wins/total)*100) : 0}% overall win rate`
    },
    {
      icon: '⚡', label: 'Avg Quality Score', color: 'var(--gold)',
      value: (() => {
        const scores = trades.map(t => computeTradeQuality(t).overall);
        const avg = scores.length ? Math.round(scores.reduce((a,b)=>a+b,0)/scores.length) : 0;
        return `${avg}/100`;
      })(),
      sub: 'Execution quality across all trades'
    }
  ];

  container.innerHTML = `
    <div class="fade-in">
      <p class="muted" style="font-size:13px;margin-bottom:16px;">Your personal records, tracked since your very first trade.</p>
      <div style="display:grid;grid-template-columns:repeat(auto-fit, minmax(180px, 1fr));gap:12px;">
        ${cards.map(c => `
          <div class="card tilt-card">
            <div style="display:flex;justify-content:space-between;align-items:flex-start;">
              <div style="font-size:12px;color:var(--text-secondary);">${c.label}</div>
              <div style="font-size:18px;">${c.icon}</div>
            </div>
            <div style="font-family:var(--font-mono);font-weight:500;font-size:22px;color:${c.color};margin-top:6px;">${c.value}</div>
            <div style="font-size:11px;color:var(--text-muted);margin-top:4px;">${c.sub}</div>
          </div>`).join('')}
      </div>
    </div>`;
}

    </div>
    <p class="muted" style="font-size:13px;margin-bottom:12px;">Trade details stay private. Only rates and percent gain are shown here.</p>
    <div style="display:flex;flex-direction:column;gap:8px;">
      ${leaderboard.map((r, i) => {
        const rankClass = i === 0 ? 'rank-1' : i === 1 ? 'rank-2' : i === 2 ? 'rank-3' : '';
        const isMe = r.code === state.currentCode;
        return `
        <div class="card ${rankClass}" style="display:flex;align-items:center;gap:12px;padding:10px 14px;${isMe && !rankClass ? 'border:2px solid var(--gold);' : ''}">
          <div style="width:24px;text-align:center;">
            ${i < 3 ? `<span class="rank-badge">${medals[i]}</span>` : `<span style="font-family:var(--font-mono);font-size:14px;color:var(--text-muted);">${i+1}</span>`}
          </div>
          <div class="avatar sm">${getInitials(r.nick)}</div>
          <div style="flex:1;">
            <div style="font-weight:500;"><span title="${r.tier.name}" style="margin-right:4px;">${r.tier.icon}</span>${esc(r.nick)}${isMe ? ' <span style="font-size:12px;color:var(--gold);">(you)</span>' : ''}${r.streak >= 3 && r.streakType === 'win' ? ' <span class="flame" style="font-size:14px;">🔥</span>' : ''}</div>
            <div style="font-size:12px;color:var(--text-secondary);">${r.total} trades${r.streak > 1 ? ` &nbsp;·&nbsp; ${r.streak} ${r.streakType === 'win' ? 'W' : 'L'} streak` : ''}</div>
          </div>
          <div style="text-align:right;font-size:12px;color:var(--text-muted);">
            <div style="font-family:var(--font-mono);font-weight:500;font-size:14px;color:var(--text-primary);">${r.pnlPct>=0?'+':''}${r.pnlPct}%</div>
            ${r.winRate}% win &middot; ${r.disciplineRate}% disciplined
          </div>
        </div>`;
      }).join('')}
    </div>
    </div>`;

  container.querySelectorAll('.sortbtn').forEach(b => {
    b.onclick = () => { state.sortBy = b.dataset.sort; renderDashboard(); };
  });
}

// Lightweight sound effects using the Web Audio API — no external audio files needed.
let _audioCtx = null;
function getAudioCtx() {
  if (!_audioCtx) {
    try { _audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }
    catch (e) { return null; }
  }
  if (_audioCtx.state === 'suspended') _audioCtx.resume();
  return _audioCtx;
}

function playTone(freq, startTime, duration, ctx, type, gainPeak) {
  const osc = ctx.createOscillator();
  const gain = ctx.createGain();
  osc.type = type || 'sine';
  osc.frequency.value = freq;
  gain.gain.setValueAtTime(0, ctx.currentTime + startTime);
  gain.gain.linearRampToValueAtTime(gainPeak || 0.12, ctx.currentTime + startTime + 0.02);
  gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + startTime + duration);
  osc.connect(gain);
  gain.connect(ctx.destination);
  osc.start(ctx.currentTime + startTime);
  osc.stop(ctx.currentTime + startTime + duration);
}

function playWinChime() {
  const ctx = getAudioCtx();
  if (!ctx) return;
  playTone(523.25, 0,    0.18, ctx, 'sine', 0.1);  // C5
  playTone(659.25, 0.08, 0.22, ctx, 'sine', 0.1);  // E5
  playTone(783.99, 0.16, 0.3,  ctx, 'sine', 0.12); // G5
}

function playBadgeChime() {
  const ctx = getAudioCtx();
  if (!ctx) return;
  playTone(440,    0,    0.12, ctx, 'triangle', 0.1);
  playTone(659.25, 0.1,  0.2,  ctx, 'triangle', 0.12);
}

function playRankUpFanfare() {
  const ctx = getAudioCtx();
  if (!ctx) return;
  playTone(392,    0,    0.15, ctx, 'sine', 0.1);   // G4
  playTone(523.25, 0.12, 0.15, ctx, 'sine', 0.1);   // C5
  playTone(659.25, 0.24, 0.15, ctx, 'sine', 0.1);   // E5
  playTone(783.99, 0.36, 0.4,  ctx, 'sine', 0.14);  // G5 (held)
  playTone(1046.5, 0.36, 0.4,  ctx, 'triangle', 0.08); // C6 shimmer
}

// Live activity ticker — shows recent trades across all traders, anonymized
// (nickname + instrument + win/loss only, never exact P&L, notes, or screenshots).
let _liveTickerInterval = null;

function stopLiveTicker() {
  if (_liveTickerInterval) { clearInterval(_liveTickerInterval); _liveTickerInterval = null; }
  const el = document.getElementById('live-ticker');
  if (el) el.remove();
  document.body.classList.remove('has-live-ticker');
}

async function refreshLiveTicker() {
  let el = document.getElementById('live-ticker');
  if (!el) {
    el = document.createElement('div');
    el.id = 'live-ticker';
    document.body.appendChild(el);
    document.body.classList.add('has-live-ticker');
  }

  try {
    const [{ data: recentTrades }, { data: traders }] = await Promise.all([
      sb.from('trades').select('*').order('created_at', { ascending: false }),
      sb.from('traders').select('*')
    ]);

    const traderMap = {};
    (traders || []).forEach(t => traderMap[t.code] = t.nickname);

    const items = (recentTrades || []).slice(0, 20).map(t => {
      const nick = esc(traderMap[t.trader_code] || 'A trader');
      const isWin = t.result === 'win';
      const dot = isWin ? '🟢' : '🔴';
      const verb = isWin ? 'closed a win on' : 'closed a loss on';
      const instrument = esc(t.instrument || 'a trade');
      return `<span class="ticker-item">${dot} <strong style="color:var(--text-primary);">${nick}</strong> ${verb} ${instrument}</span>`;
    });

    if (items.length === 0) {
      el.innerHTML = `<div class="ticker-label"><span class="live-dot"></span>LIVE</div>
        <div class="ticker-track"><span class="ticker-item">No trades logged yet today — be the first.</span></div>`;
      return;
    }

    // Duplicate the list so the scroll loop feels continuous
    const trackHtml = items.concat(items).join('<span style="color:var(--border);">•</span>');
    el.innerHTML = `<div class="ticker-label"><span class="live-dot"></span>LIVE</div>
      <div class="ticker-track">${trackHtml}</div>`;
  } catch (e) { /* fail silently, ticker is non-critical */ }
}

function startLiveTicker() {
  stopLiveTicker();
  refreshLiveTicker();
  _liveTickerInterval = setInterval(refreshLiveTicker, 20000);
}

function showTierUpCelebration(tier) {
  playRankUpFanfare();
  const overlay = document.createElement('div');

// Market sessions clock — shows live UTC time and which major forex sessions are open.
let _marketInterval = null;

function getSessionStatus() {
  // Session hours in UTC (approximate standard forex hours)
  const sessions = [
    { name: 'Sydney',   open: 21, close: 6 },
    { name: 'Tokyo',    open: 0,  close: 9 },
    { name: 'London',   open: 7,  close: 16 },
    { name: 'New York', open: 12, close: 21 }
  ];
  const now = new Date();
  const utcHour = now.getUTCHours() + now.getUTCMinutes() / 60;
  const day = now.getUTCDay(); // 0 = Sunday, 6 = Saturday

  // Forex market is closed over the weekend (roughly Fri 21:00 UTC to Sun 21:00 UTC)
  const weekendClosed = (day === 6) || (day === 0 && utcHour < 21) || (day === 5 && utcHour >= 21);

  return sessions.map(s => {
    let isOpen;
    if (s.open < s.close) {
      isOpen = utcHour >= s.open && utcHour < s.close;
    } else {
      // Session spans midnight (e.g. Sydney 21:00 -> 06:00)
      isOpen = utcHour >= s.open || utcHour < s.close;
    }
    if (weekendClosed) isOpen = false;
    return { name: s.name, open: isOpen };
  });
}

function renderMarketSidebar() {
  const el = document.getElementById('market-sidebar');
  if (!el) return;

  // Only show when a trader is logged in (dashboard visible)
  if (!state.currentCode) { el.innerHTML = ''; return; }

  const now = new Date();
  const utcTime = now.toLocaleTimeString('en-GB', { timeZone: 'UTC', hour: '2-digit', minute: '2-digit', second: '2-digit' });
  const sessions = getSessionStatus();
  const anyOpen = sessions.some(s => s.open);

  el.innerHTML = `
    <div class="card">
      <div class="brand-mark" style="margin-bottom:8px;">MARKET SESSIONS</div>
      <div class="clock-display">${utcTime}</div>
      <div style="text-align:center;font-size:11px;color:var(--text-muted);margin-bottom:12px;">UTC &middot; ${anyOpen ? 'Markets open' : 'Markets closed'}</div>
      ${sessions.map(s => `
        <div class="session-row">
          <span style="font-size:13px;color:${s.open ? 'var(--text-primary)' : 'var(--text-muted)'};">${s.name}</span>
          <span style="display:flex;align-items:center;gap:8px;">
            <span style="font-size:11px;color:var(--text-muted);">${s.open ? 'Open' : 'Closed'}</span>
            <span class="session-dot ${s.open ? 'open' : 'closed'}"></span>
          </span>
        </div>`).join('')}
    </div>`;
}

function startMarketClock() {
  renderMarketSidebar();
  if (_marketInterval) clearInterval(_marketInterval);
  _marketInterval = setInterval(renderMarketSidebar, 1000);
}

function setupBackgroundFX() {

  const sampleValues = ['+2.4%', '+0.8%', '+5.1%', '+1.3%', '-0.6%', '+3.7%', '-1.2%', '+0.4%', '+4.4%', '-2.1%', '+1.9%', '+0.2%'];
  const particleCount = 14;
  for (let i = 0; i < particleCount; i++) {
    const el = document.createElement('div');
    const val = sampleValues[Math.floor(Math.random() * sampleValues.length)];
    const isPositive = val.startsWith('+');
    el.className = 'pnl-particle';
    el.textContent = val;
    const leftSide = Math.random() > 0.5;
    el.style.left = leftSide ? (Math.random() * 14) + '%' : (84 + Math.random() * 14) + '%';
    el.style.bottom = '-40px';
    el.style.fontSize = (12 + Math.random() * 10) + 'px';
    el.style.color = isPositive ? '#4ade80' : '#f87171';
    el.style.animationDuration = (14 + Math.random() * 12) + 's';
    el.style.animationDelay = (Math.random() * 20) + 's';
    fx.appendChild(el);
  }

  // Two ticker rows of candlesticks pinned to top and bottom edges, like a trading floor strip
  [{ pos: 'top', speed: 75, height: 46, opacity: 0.28 }, { pos: 'bottom', speed: 95, height: 60, opacity: 0.24 }]
    .forEach(rowCfg => {
      const row = document.createElement('div');
      row.className = 'ticker-row ' + rowCfg.pos;
      row.style.opacity = rowCfg.opacity;
      row.style.animationDuration = rowCfg.speed + 's';
      let html = '';
      for (let i = 0; i < 90; i++) {

        const isGreen = Math.random() > 0.45;

      }
      row.innerHTML = html;

  // Floating crypto symbols drifting diagonally across the screen

  for (let i = 0; i < cryptoCount; i++) {
    const el = document.createElement('div');

    el.className = 'crypto-particle';
    el.textContent = sym;
    el.style.left = (Math.random() * 95) + '%';
    el.style.top = (Math.random() * 95) + '%';

    el.style.animationDuration = (20 + Math.random() * 20) + 's';
    el.style.animationDelay = (Math.random() * 25) + 's';
    fx.appendChild(el);
  }
}

// Global 3D tilt effect — applies to any .card with the .tilt-card class.
// Cards subtly rotate toward the cursor with a gold glare highlight.
(function setupCardTilt() {
  const MAX_TILT = 7; // degrees
  let activeCard = null;

  function ensureGlare(card) {
    if (!card.querySelector('.tilt-glare')) {
      const glare = document.createElement('div');
      glare.className = 'tilt-glare';
      card.appendChild(glare);
    }
  }

  document.addEventListener('mousemove', (e) => {
    const card = e.target.closest('.tilt-card');
    if (!card) {
      if (activeCard) {
        activeCard.style.transform = '';
        activeCard.classList.remove('tilting');
        activeCard = null;
      }
      return;
    }
    if (card !== activeCard) {
      if (activeCard) { activeCard.style.transform = ''; activeCard.classList.remove('tilting'); }
      activeCard = card;
      ensureGlare(card);
      card.classList.add('tilting');
    }
    const rect = card.getBoundingClientRect();
    const px = (e.clientX - rect.left) / rect.width;   // 0..1
    const py = (e.clientY - rect.top) / rect.height;   // 0..1
    const rotateY = (px - 0.5) * 2 * MAX_TILT;
    const rotateX = -(py - 0.5) * 2 * MAX_TILT;
    card.style.transform = `perspective(800px) rotateX(${rotateX.toFixed(2)}deg) rotateY(${rotateY.toFixed(2)}deg) translateZ(0)`;
    const glare = card.querySelector('.tilt-glare');
    if (glare) {
      glare.style.setProperty('--glare-x', (px * 100).toFixed(1) + '%');
      glare.style.setProperty('--glare-y', (py * 100).toFixed(1) + '%');
    }
  });

  document.addEventListener('mouseleave', () => {
    if (activeCard) { activeCard.style.transform = ''; activeCard.classList.remove('tilting'); activeCard = null; }
  }, true);
})();

// Global ripple effect on every button click — works automatically for buttons
// added later too, since it's delegated to the document rather than bound per-button.
document.addEventListener('click', (e) => {
  const btn = e.target.closest('button');
  if (!btn) return;
  const rect = btn.getBoundingClientRect();
  const size = Math.max(rect.width, rect.height);
  const ripple = document.createElement('span');
  ripple.className = 'ripple-effect';
  ripple.style.width = ripple.style.height = size + 'px';
  ripple.style.left = (e.clientX - rect.left - size / 2) + 'px';
  ripple.style.top = (e.clientY - rect.top - size / 2) + 'px';
  btn.appendChild(ripple);
  setTimeout(() => ripple.remove(), 600);
});

setupBackgroundFX();

// Cinematic loader boot sequence
(function runLoaderBoot() {
  const bootEl = document.getElementById('loaderBoot');
  const loader = document.getElementById('cr8-loader');
  if (!bootEl || !loader) { init(); return; }

  const lines = [
    '> Initializing CR8 Trading Journal...',
    '> Connecting to market data...',
    '> Loading trader profiles...',
    '> Calibrating leaderboard...',
    '> Ready.'
  ];

  let lineIndex = 0;
  let charIndex = 0;
  let displayed = '';

  function typeChar() {
    if (lineIndex >= lines.length) {
      finishLoader();
      return;
    }
    const currentLine = lines[lineIndex];
    if (charIndex < currentLine.length) {
      displayed = displayed.replace(/<span class="cursor">█<\/span>$/, '');
      displayed += currentLine[charIndex];
      bootEl.innerHTML = displayed + '<span class="cursor">█</span>';
      charIndex++;
      setTimeout(typeChar, 18 + Math.random() * 25);
    } else {
      displayed = displayed.replace(/<span class="cursor">█<\/span>$/, '') + '\n';
      lineIndex++;
      charIndex = 0;
      // keep only the last 4 lines visible
      const shownLines = displayed.split('\n').filter(Boolean).slice(-4);
      displayed = shownLines.join('\n') + '\n';
      setTimeout(typeChar, 180);
    }
  }

  let appReady = false;
  let bootDone = false;

  function finishLoader() {
    bootDone = true;
    tryHide();
  }
  function tryHide() {
    if (bootDone && appReady) {
      loader.classList.add('fade-out');
      setTimeout(() => loader.remove(), 600);
    }
  }

  // Start typing, and load the app in parallel
  typeChar();
  (async () => {
    await init();
    appReady = true;
    tryHide();
  })();

  // Safety: never let the loader hang forever
  setTimeout(() => { appReady = true; bootDone = true; tryHide(); }, 8000);
})();
