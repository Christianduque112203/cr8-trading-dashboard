<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>CR8 Trading Journal</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.2/dist/chart.umd.min.js"></script>
<style>
  :root {
    --bg: #0a0a0a;
    --surface-1: rgba(23, 22, 18, 0.78);
    --surface-2: rgba(31, 29, 23, 0.85);
    --border: #2e2a20;
    --border-strong: #4a4330;
    --border-accent: #d4af37;
    --text-primary: #f2f0e8;
    --text-secondary: #b8b2a0;
    --text-muted: #7a7468;
    --text-success: #4ade80;
    --text-danger: #f87171;
    --bg-success: #14291c;
    --bg-danger: #2c1717;
    --gold: #d4af37;
    --radius: 8px;
    --font-mono: 'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, monospace;
    --font-sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  }

  /* Retro terminal / hacker theme */
  body.terminal {
    --bg: #000800;
    --surface-1: rgba(0, 20, 0, 0.85);
    --surface-2: rgba(0, 28, 0, 0.9);
    --border: #0f3d0f;
    --border-strong: #1a5c1a;
    --border-accent: #00ff66;
    --text-primary: #00ff66;
    --text-secondary: #2ec27e;
    --text-muted: #1a7a3d;
    --text-success: #00ff66;
    --text-danger: #ff5f5f;
    --bg-success: #022b0e;
    --bg-danger: #2c0a0a;
    --gold: #00ff66;
  }
  body.terminal,
  body.terminal h2,
  body.terminal input,
  body.terminal select,
  body.terminal textarea,
  body.terminal button {
    font-family: var(--font-mono) !important;
    letter-spacing: 0.02em;
  }
  body.terminal #bg-layer { opacity: 0.12; filter: grayscale(1) brightness(0.6); }
  body.terminal .avatar { background: linear-gradient(135deg, #00ff66, #066b2f); color: #001a08; }
  body.terminal h2,
  body.terminal .brand-mark { text-shadow: 0 0 8px rgba(0,255,102,0.5); }
  /* CRT scanline overlay, only in terminal mode */
  body.terminal::after {
    content: '';
    position: fixed; inset: 0; z-index: 200;
    pointer-events: none;
    background: repeating-linear-gradient(
      0deg,
      rgba(0,0,0,0) 0px,
      rgba(0,0,0,0) 2px,
      rgba(0,20,0,0.25) 3px,
      rgba(0,0,0,0) 4px
    );
    animation: scanlineMove 8s linear infinite;
  }
  @keyframes scanlineMove {
    from { background-position: 0 0; }
    to { background-position: 0 100px; }
  }
  * { box-sizing: border-box; }
  html, body { min-height: 100%; }
  body {
    color: var(--text-primary);
    font-family: var(--font-sans);
    margin: 0;
    padding: 24px 16px 60px;
    line-height: 1.5;
    position: relative;
    overflow-x: hidden;
  }
  #bg-layer {
    position: fixed;
    top: -5%; left: -5%; right: -5%; bottom: -5%;
    width: 110%; height: 110%;
    background: url('cr8-bg.jpg') center / cover no-repeat;
    z-index: -2;
    animation: kenburns 36s ease-in-out infinite alternate;
  }
  #bg-overlay {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: linear-gradient(180deg, rgba(5,5,5,0.82), rgba(5,5,5,0.93));
    z-index: -1;
  }
  @keyframes kenburns {
    0%   { transform: scale(1) translate(0, 0); }
    50%  { transform: scale(1.08) translate(-1.5%, -1%); }
    100% { transform: scale(1.04) translate(1.5%, 1%); }
  }
  #app { max-width: 720px; margin: 0 auto; position: relative; z-index: 1; }
  .card, .pill, input, select, textarea, button {
    -webkit-backdrop-filter: blur(6px);
    backdrop-filter: blur(6px);
  }

  #fx-layer {
    position: fixed; top: 0; left: 0; right: 0; bottom: 0;
    z-index: 0; overflow: hidden; pointer-events: none;
  }
  .pnl-particle {
    position: absolute;
    font-family: var(--font-mono);
    font-weight: 500;
    opacity: 0;
    white-space: nowrap;
    animation-name: floatUp;
    animation-timing-function: ease-in;
    animation-iteration-count: infinite;
  }
  @keyframes floatUp {
    0%   { opacity: 0; transform: translateY(0) scale(0.9); }
    10%  { opacity: 0.35; }
    85%  { opacity: 0.35; }
    100% { opacity: 0; transform: translateY(-100vh) scale(1.05); }
  }
  .ticker-row {
    position: fixed;
    left: 0; width: 100%;
    display: flex; align-items: flex-end; gap: 6px;
    opacity: 0.22;
    animation: tickerScroll linear infinite;
    padding: 8px 0;
  }
  .ticker-row.top { top: 0; align-items: flex-start; background: linear-gradient(180deg, rgba(0,0,0,0.35), transparent); }
  .ticker-row.bottom { bottom: 0; align-items: flex-end; background: linear-gradient(0deg, rgba(0,0,0,0.35), transparent); }
  .ticker-candle {
    width: 7px; border-radius: 1px; flex-shrink: 0;
  }
  @keyframes tickerScroll {
    from { transform: translateX(0); }
    to   { transform: translateX(-50%); }
  }
  .crypto-particle {
    position: absolute;
    font-family: var(--font-mono);
    font-weight: 600;
    opacity: 0;
    pointer-events: none;
    animation-name: driftAcross;
    animation-timing-function: linear;
    animation-iteration-count: infinite;
  }
  @keyframes driftAcross {
    0%   { opacity: 0; transform: translate(0, 0) rotate(0deg); }
    8%   { opacity: 0.18; }
    92%  { opacity: 0.18; }
    100% { opacity: 0; transform: translate(var(--dx), var(--dy)) rotate(var(--rot)); }
  }
  h2 { font-weight: 500; margin: 0; }
  input, select, textarea, button {
    font-family: var(--font-sans);
    font-size: 14px;
    background: var(--surface-2);
    border: 0.5px solid var(--border-strong);
    color: var(--text-primary);
    border-radius: var(--radius);
    padding: 8px 10px;
    transition: border-color 0.18s ease, color 0.18s ease, box-shadow 0.18s ease, transform 0.12s ease;
  }
  input:focus, select:focus, textarea:focus {
    outline: none;
    border-color: var(--border-accent);
    box-shadow: 0 0 0 3px rgba(212,175,55,0.12);
  }
  button {
    cursor: pointer;
    font-weight: 500;
    position: relative;
    overflow: hidden;
  }
  button:hover { border-color: var(--gold); color: var(--gold); }
  button:active { transform: scale(0.96); }
  .ripple-effect {
    position: absolute;
    border-radius: 50%;
    background: rgba(212,175,55,0.35);
    transform: scale(0);
    animation: rippleAnim 0.55s ease-out;
    pointer-events: none;
  }
  @keyframes rippleAnim {
    to { transform: scale(2.6); opacity: 0; }
  }
  label { font-size: 13px; color: var(--text-secondary); display: block; margin-bottom: 4px; }
  .card {
    background: var(--surface-1);
    border-radius: var(--radius);
    padding: 1rem;
    border: 0.5px solid var(--border);
    transition: transform 0.18s ease, border-color 0.18s ease, box-shadow 0.18s ease;
  }
  .card:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 20px rgba(0,0,0,0.3);
  }
  .muted { color: var(--text-muted); }
  .tabbtn { border: none; border-bottom: 2px solid transparent; border-radius: 0; background: transparent; padding: 8px 4px; transition: border-color 0.22s ease, color 0.22s ease; }
  .tabbtn.active { border-bottom-color: var(--gold); font-weight: 500; color: var(--gold); }
  .pill { font-size: 12px; padding: 2px 8px; border-radius: var(--radius); background: var(--surface-2); color: var(--text-secondary); }
  .brand-mark { font-family: var(--font-mono); font-size: 12px; color: var(--gold); letter-spacing: 0.15em; }
  .tagline { font-size: 12px; color: var(--text-muted); letter-spacing: 0.1em; margin-top: 6px; }

  .avatar {
    width: 40px; height: 40px; border-radius: 50%;
    background: linear-gradient(135deg, #d4af37, #8a6d1f);
    display: flex; align-items: center; justify-content: center;
    font-weight: 500; font-size: 14px; color: #1a1605;
    flex-shrink: 0;
    transition: transform 0.2s ease;
  }
  .avatar:hover { transform: scale(1.08) rotate(-4deg); }
  .avatar.sm { width: 28px; height: 28px; font-size: 11px; }

  @keyframes flicker {
    0%, 100% { transform: scale(1) rotate(-2deg); opacity: 1; }
    25% { transform: scale(1.08) rotate(2deg); opacity: 0.9; }
    50% { transform: scale(0.96) rotate(-1deg); opacity: 1; }
    75% { transform: scale(1.04) rotate(3deg); opacity: 0.95; }
  }
  .flame { display: inline-block; animation: flicker 1.4s ease-in-out infinite; }
  .streak-card {
    background: var(--surface-1);
    border-radius: var(--radius);
    padding: 1rem;
    border: 0.5px solid var(--border);
    display: flex; align-items: center; gap: 12px;
  }
  .streak-card.hot { border-color: #f97316; background: linear-gradient(135deg, rgba(249,115,22,0.12), var(--surface-1)); }
  .streak-card.cold { border-color: #60a5fa; }

  #tierup-overlay {
    position: fixed; inset: 0; z-index: 999;
    background: rgba(0,0,0,0.82);
    display: flex; align-items: center; justify-content: center;
    animation: fadeIn 0.3s ease-out;
  }
  #tierup-overlay .tierup-card {
    text-align: center; padding: 2.5rem 2rem;
    max-width: 360px;
    animation: tierPop 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
  }
  @keyframes tierPop {
    0% { transform: scale(0.7); opacity: 0; }
    100% { transform: scale(1); opacity: 1; }
  }
  .tierup-icon {
    font-size: 64px;
    animation: tierBounce 1.2s ease-in-out infinite;
  }
  @keyframes tierBounce {
    0%, 100% { transform: translateY(0) scale(1); }
    50% { transform: translateY(-10px) scale(1.08); }
  }
  .confetti-piece {
    position: fixed; top: -20px;
    width: 8px; height: 14px;
    opacity: 0.9;
    animation-name: confettiFall;
    animation-timing-function: linear;
    z-index: 1000;
  }
  @keyframes confettiFall {
    0% { transform: translateY(0) rotate(0deg); opacity: 1; }
    100% { transform: translateY(110vh) rotate(540deg); opacity: 0.3; }
  }

  #live-ticker {
    position: fixed; bottom: 0; left: 0; right: 0;
    height: 34px;
    background: rgba(10,10,10,0.92);
    border-top: 1px solid var(--border);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    overflow: hidden;
    z-index: 50;
    display: flex; align-items: center;
  }
  #live-ticker .ticker-label {
    flex-shrink: 0;
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--gold);
    letter-spacing: 0.1em;
    padding: 0 12px;
    border-right: 1px solid var(--border);
    height: 100%;
    display: flex; align-items: center;
    background: rgba(212,175,55,0.06);
  }
  #live-ticker .ticker-label .live-dot {
    display: inline-block; width: 6px; height: 6px; border-radius: 50%;
    background: #4ade80; margin-right: 6px;
    animation: livePulse 1.5s ease-in-out infinite;
  }
  @keyframes livePulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.4; transform: scale(0.8); }
  }
  #live-ticker .ticker-track {
    display: flex; gap: 36px;
    white-space: nowrap;
    animation: liveTickerScroll 40s linear infinite;
    padding-left: 100%;
  }
  @keyframes liveTickerScroll {
    from { transform: translateX(0); }
    to   { transform: translateX(-100%); }
  }
  #live-ticker .ticker-item {
    font-size: 12px;
    color: var(--text-secondary);
    display: inline-flex;
    align-items: center;
    gap: 6px;
  }
  body.has-live-ticker { padding-bottom: 50px; }

  /* ===== Cinematic loading screen ===== */
  #cr8-loader {
    position: fixed; inset: 0; z-index: 500;
    background: radial-gradient(circle at center, #14110a 0%, #050505 70%);
    display: flex; flex-direction: column; align-items: center; justify-content: flex-start;
    padding-top: 16vh;
    gap: 28px;
    transition: opacity 0.6s ease;
  }
  #cr8-loader.fade-out { opacity: 0; pointer-events: none; }

  .loader-brand {
    font-family: var(--font-mono);
    font-size: 20px; letter-spacing: 0.42em;
    color: var(--gold);
    text-shadow: 0 0 18px rgba(212,175,55,0.7);
    margin-bottom: 4px;
  }

  .loader-stage {
    position: relative;
    width: 220px; height: 220px;
    display: flex; align-items: center; justify-content: center;
  }

  .loader-ring {
    position: absolute;
    width: 220px; height: 220px;
    border-radius: 50%;
    border: 2px solid rgba(212,175,55,0.1);
    border-top-color: var(--gold);
    box-shadow: 0 0 24px rgba(212,175,55,0.25), inset 0 0 24px rgba(212,175,55,0.08);
    animation: loaderSpin 1.1s linear infinite;
  }
  @keyframes loaderSpin { to { transform: rotate(360deg); } }

  .loader-inner {
    display: flex; flex-direction: column; align-items: center; gap: 14px;
  }
  .loader-candles {
    display: flex; align-items: flex-end; gap: 5px; height: 70px;
  }
  .loader-candles i {
    display: block; width: 8px; border-radius: 2px;
    background: linear-gradient(180deg, #f1d27a, #d4af37);
    box-shadow: 0 0 12px rgba(212,175,55,0.7);
    animation: loaderCandle 1.4s ease-in-out infinite;
  }
  @keyframes loaderCandle {
    0%, 100% { height: 24%; opacity: 0.6; }
    50% { height: 100%; opacity: 1; }
  }

  .loader-chart {
    width: 150px; height: 44px;
  }
  .loader-chart path {
    stroke: var(--gold);
    stroke-width: 2.5;
    fill: none;
    stroke-linecap: round;
    stroke-linejoin: round;
    stroke-dasharray: 400;
    stroke-dashoffset: 400;
    animation: drawChart 2.2s ease-in-out infinite;
    filter: drop-shadow(0 0 5px rgba(212,175,55,0.8));
  }
  @keyframes drawChart {
    0% { stroke-dashoffset: 400; }
    55% { stroke-dashoffset: 0; }
    85% { stroke-dashoffset: 0; opacity: 1; }
    100% { stroke-dashoffset: 0; opacity: 0; }
  }

  .loader-boot {
    font-family: var(--font-mono);
    font-size: 12px; color: var(--gold);
    text-shadow: 0 0 8px rgba(212,175,55,0.4);
    min-height: 80px; width: 300px;
    text-align: center;
    white-space: pre-line;
    margin-top: 18px;
    opacity: 0.9;
  }
  .loader-boot .cursor { animation: blinkCursor 0.8s step-end infinite; }
  @keyframes blinkCursor { 50% { opacity: 0; } }
  .badge-card {
    text-align: center; padding: 1.2rem 0.8rem;
    border-radius: var(--radius); border: 0.5px solid var(--border);
    background: var(--surface-1);
  }
  .badge-card.locked { opacity: 0.4; filter: grayscale(1); }
  .badge-card.unlocked { border-color: var(--gold); background: linear-gradient(135deg, rgba(212,175,55,0.1), var(--surface-1)); }
  .badge-icon { font-size: 32px; margin-bottom: 6px; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }
  .fade-in { animation: fadeIn 0.25s ease-out; }
  @keyframes slideInRight {
    from { opacity: 0; transform: translateX(24px); }
    to { opacity: 1; transform: translateX(0); }
  }
  @keyframes slideInLeft {
    from { opacity: 0; transform: translateX(-24px); }
    to { opacity: 1; transform: translateX(0); }
  }
  .slide-right { animation: slideInRight 0.32s cubic-bezier(0.22, 1, 0.36, 1); }
  .slide-left { animation: slideInLeft 0.32s cubic-bezier(0.22, 1, 0.36, 1); }
  #tabContent { will-change: transform, opacity; }
  @keyframes valuePop {
    0% { transform: scale(0.85); opacity: 0; }
    60% { transform: scale(1.08); opacity: 1; }
    100% { transform: scale(1); }
  }
  .value-pop { animation: valuePop 0.4s cubic-bezier(0.34, 1.56, 0.64, 1); display: inline-block; }

  .rank-1 { border: 1px solid var(--gold) !important; background: linear-gradient(90deg, rgba(212,175,55,0.12), var(--surface-1)) !important; }
  .rank-2 { border: 1px solid #c8c8d0 !important; }
  .rank-3 { border: 1px solid #b87a4a !important; }
  .rank-badge { font-size: 16px; }

  .candles {
    display: flex; align-items: flex-end; gap: 3px; height: 36px;
    margin-bottom: 1rem; opacity: 0.85;
  }
  .candles i {
    display: block; width: 4px; border-radius: 1px;
    background: var(--gold);
    animation: candle 2.4s ease-in-out infinite;
  }
  @keyframes candle {
    0%, 100% { height: 30%; }
    50% { height: 90%; }
  }
</style>
</head>
<body>
<div id="bg-layer"></div>
<div id="bg-overlay"></div>
<div id="fx-layer"></div>
<div id="cr8-loader">
  <div class="loader-brand">CR8 TRADING</div>
  <div class="loader-stage">
    <div class="loader-ring"></div>
    <div class="loader-inner">
      <div class="loader-candles">
        <i style="animation-delay:0s;"></i>
        <i style="animation-delay:-0.2s;"></i>
        <i style="animation-delay:-0.4s;"></i>
        <i style="animation-delay:-0.6s;"></i>
        <i style="animation-delay:-0.8s;"></i>
        <i style="animation-delay:-1s;"></i>
        <i style="animation-delay:-1.2s;"></i>
      </div>
      <svg class="loader-chart" viewBox="0 0 200 60" preserveAspectRatio="none">
        <path d="M0,50 L25,42 L50,46 L75,30 L100,34 L125,18 L150,22 L175,8 L200,12" />
      </svg>
    </div>
  </div>
  <div class="loader-boot" id="loaderBoot"></div>
</div>
<div id="app"></div>
<script>
  setTimeout(function() {
    const appEl = document.getElementById('app');
    const loaderEl = document.getElementById('cr8-loader');
    // If the app never rendered any real content, show a connection error
    if (appEl && appEl.children.length === 0 && appEl.textContent.trim() === '') {
      if (loaderEl) loaderEl.remove();
      appEl.innerHTML =
        '<div style="max-width:420px;margin:60px auto;text-align:center;">' +
        '<div style="font-family:monospace;font-size:13px;color:#d4af37;letter-spacing:0.1em;">CR8 TRADING</div>' +
        '<h3 style="margin-top:8px;">Connection issue</h3>' +
        '<p style="color:#b8b2a0;font-size:14px;line-height:1.5;">This page is having trouble connecting. Check your internet connection and try again, ' +
        'or try a different browser/network if the problem continues.</p>' +
        '<button onclick="location.reload()" style="margin-top:12px;padding:8px 16px;background:#1f1d17;border:1px solid #d4af37;color:#d4af37;border-radius:8px;cursor:pointer;">Try again</button>' +
        '</div>';
    }
  }, 9000);
</script>

<script>

// ----------------------------------------------------------------

// Lightweight Supabase REST client — no external library or CDN needed.
// Talks directly to your own Supabase project over plain fetch(), so nothing
// can block it the way third-party CDN scripts sometimes get blocked.
function createLiteClient(url, anonKey) {
  const restBase = url + '/rest/v1';
  const storageBase = url + '/storage/v1';
  const baseHeaders = {
    'apikey': anonKey,
    'Authorization': 'Bearer ' + anonKey
  };

  function buildQuery(table) {
    const filters = [];
    let selectCols = '*';
    let orderClause = null;
    let countMode = null;
    let headOnly = false;
    let singleMode = false;

    const builder = {
      select(cols, opts) {
        selectCols = cols || '*';
        if (opts && opts.count) countMode = opts.count;
        if (opts && opts.head) headOnly = true;
        return builder;
      },
      eq(col, val) {
        filters.push(`${col}=eq.${encodeURIComponent(val)}`);
        return builder;
      },
      order(col, opts) {
        const dir = (opts && opts.ascending === false) ? 'desc' : 'asc';
        orderClause = `${col}.${dir}`;
        return builder;
      },
      maybeSingle() {
        singleMode = true;
        return builder.then(undefined); // trigger execution via thenable below
      },
      insert(rowOrRows) {
        return (async () => {
          try {
            const res = await fetch(`${restBase}/${table}`, {
              method: 'POST',
              headers: { ...baseHeaders, 'Content-Type': 'application/json', 'Prefer': 'return=representation' },
              body: JSON.stringify(rowOrRows)
            });
            if (!res.ok) {
              const errBody = await res.text();
              return { data: null, error: { message: errBody, status: res.status } };
            }
            const data = await res.json();
            return { data, error: null };
          } catch (e) {
            return { data: null, error: { message: e.message } };
          }
        })();
      },
      // Thenable: lets `await sb.from(t).select(...).eq(...)` work without an explicit exec() call
      then(resolve, reject) {
        return execute().then(resolve, reject);
      }
    };

    async function execute() {
      try {
        let queryUrl = `${restBase}/${table}?select=${encodeURIComponent(selectCols)}`;
        if (filters.length) queryUrl += '&' + filters.join('&');
        if (orderClause) queryUrl += `&order=${orderClause}`;

        const headers = { ...baseHeaders };
        if (countMode) headers['Prefer'] = `count=${countMode}`;

        const res = await fetch(queryUrl, {
          method: headOnly ? 'HEAD' : 'GET',
          headers
        });

        if (!res.ok && !headOnly) {
          const errBody = await res.text();
          return { data: null, error: { message: errBody, status: res.status }, count: null };
        }

        let count = null;
        const contentRange = res.headers.get('content-range');
        if (contentRange && contentRange.includes('/')) {
          const total = contentRange.split('/')[1];
          count = total === '*' ? null : parseInt(total, 10);
        }

        if (headOnly) return { data: null, error: null, count };

        const data = await res.json();
        if (singleMode) {
          return { data: data && data.length ? data[0] : null, error: null, count };
        }
        return { data, error: null, count };
      } catch (e) {
        return { data: null, error: { message: e.message }, count: null };
      }
    }

    return builder;
  }

  return {
    from(table) {
      return buildQuery(table);
    },
    async rpc(fnName, params) {
      try {
        const res = await fetch(`${restBase}/rpc/${fnName}`, {
          method: 'POST',
          headers: { ...baseHeaders, 'Content-Type': 'application/json' },
          body: JSON.stringify(params || {})
        });
        if (!res.ok) {
          const errBody = await res.text();
          return { data: null, error: { message: errBody, status: res.status } };
        }
        const data = await res.json();
        return { data, error: null };
      } catch (e) {
        return { data: null, error: { message: e.message } };
      }
    },
    storage: {
      from(bucket) {
        return {
          async upload(path, file) {
            try {
              const res = await fetch(`${storageBase}/object/${bucket}/${path}`, {
                method: 'POST',
                headers: { ...baseHeaders, 'Content-Type': file.type || 'application/octet-stream' },
                body: file
              });
              if (!res.ok) {
                const errBody = await res.text();
                return { data: null, error: { message: errBody, status: res.status } };
              }
              const data = await res.json();
              return { data, error: null };
            } catch (e) {
              return { data: null, error: { message: e.message } };
            }
          },
          getPublicUrl(path) {
            return { data: { publicUrl: `${storageBase}/object/public/${bucket}/${path}` } };
          }
        };
      }
    }
  };
}

function esc(s) {
  return String(s || '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function getInitials(name) {
  const parts = String(name || '?').trim().split(/\s+/);
  if (parts.length === 1) return parts[0].slice(0, 2).toUpperCase();
  return (parts[0][0] + parts[1][0]).toUpperCase();
}

function candleStrip(n) {
  let html = '<div class="candles">';
  for (let i = 0; i < n; i++) {
    const delay = (i * 0.15).toFixed(2);
    html += `<i style="animation-delay:-${delay}s;"></i>`;
  }
  return html + '</div>';
}

function computeStats(trades, code) {
  const t = trades.filter(tr => tr.trader_code === code);
  const wins = t.filter(tr => tr.result === 'win').length;
  const total = t.length;
  const disciplined = t.filter(tr => !tr.emotional).length;
  const pnlPct = t.reduce((a, tr) => a + Number(tr.pnl_pct), 0);
  return {
    total,
    winRate: total ? Math.round((wins / total) * 100) : 0,
    disciplineRate: total ? Math.round((disciplined / total) * 100) : 0,
    pnlPct: Math.round(pnlPct * 10) / 10
  };
}

const TIERS = [
  { name: 'Rookie',     minTrades: 0,   minScore: 0,  icon: '🌱', color: '#9a9a9a' },
  { name: 'Trader',     minTrades: 10,  minScore: 40, icon: '📈', color: '#60a5fa' },
  { name: 'Strategist', minTrades: 25,  minScore: 55, icon: '🧠', color: '#a78bfa' },
  { name: 'Veteran',    minTrades: 50,  minScore: 65, icon: '🛡️', color: '#34d399' },
  { name: 'Elite',      minTrades: 100, minScore: 75, icon: '⚡', color: '#d4af37' },
  { name: 'Legend',     minTrades: 150, minScore: 85, icon: '👑', color: '#f97316' }
];

function computeTier(trades, code) {
  const t = trades.filter(tr => tr.trader_code === code);
  const total = t.length;
  const wins = t.filter(tr => tr.result === 'win').length;
  const disciplined = t.filter(tr => !tr.emotional).length;
  const winRate = total ? (wins / total) * 100 : 0;
  const disciplineRate = total ? (disciplined / total) * 100 : 0;
  const score = winRate * 0.5 + disciplineRate * 0.5;

  let current = TIERS[0];
  for (const tier of TIERS) {
    if (total >= tier.minTrades && score >= tier.minScore) current = tier;
  }

  const currentIndex = TIERS.indexOf(current);
  const next = TIERS[currentIndex + 1] || null;

  return { ...current, score: Math.round(score), total, next };
}

function computeBadges(trades, code) {
  const t = trades.filter(tr => tr.trader_code === code)
    .sort((a, b) => (a.trade_date + a.trade_time).localeCompare(b.trade_date + b.trade_time));
  const total = t.length;
  const wins = t.filter(tr => tr.result === 'win').length;
  const winRate = total ? Math.round((wins / total) * 100) : 0;
  const disciplined = t.filter(tr => !tr.emotional).length;
  const disciplineRate = total ? Math.round((disciplined / total) * 100) : 0;
  const netGain = t.reduce((a, tr) => a + Number(tr.pnl_pct), 0);
  const streaks = computeStreaks(trades, code);

  const last10 = t.slice(-10);
  const disciplineLast10 = last10.length === 10 && last10.every(tr => !tr.emotional);

  // Comeback Kid: a win immediately after a loss streak of 3+
  let comeback = false;
  let lossRun = 0;
  for (let i = 0; i < t.length; i++) {
    if (t[i].result === 'loss') { lossRun++; }
    else {
      if (lossRun >= 3) { comeback = true; }
      lossRun = 0;
    }
  }

  // Risk Manager: average risk:reward of at least 1:2 (parses "1:2", "1:3" style strings)
  const rrValues = t.map(tr => {
    const m = String(tr.risk_reward || '').match(/^(\d+(?:\.\d+)?)\s*:\s*(\d+(?:\.\d+)?)$/);
    if (!m) return null;
    const risk = parseFloat(m[1]), reward = parseFloat(m[2]);
    return risk > 0 ? reward / risk : null;
  }).filter(v => v !== null);
  const avgRR = rrValues.length ? rrValues.reduce((a, b) => a + b, 0) / rrValues.length : 0;

  // Diversified: 3+ distinct instruments traded
  const instruments = new Set(t.map(tr => (tr.instrument || '').trim().toUpperCase()).filter(Boolean));
  // Strategist: 3+ distinct strategies used
  const strategies = new Set(t.map(tr => (tr.strategy || '').trim().toUpperCase()).filter(Boolean));

  // Early Riser / Night Owl: based on logged trade_time
  const earlyTrade = t.some(tr => {
    const h = parseInt(String(tr.trade_time || '99:99').split(':')[0], 10);
    return h < 7;
  });
  const nightTrade = t.some(tr => {
    const h = parseInt(String(tr.trade_time || '-1:99').split(':')[0], 10);
    return h >= 21;
  });

  // High Roller: any single trade with 5%+ gain
  const highRoller = t.some(tr => Number(tr.pnl_pct) >= 5);

  // Consistency King: logged trades on 5+ distinct calendar days
  const distinctDays = new Set(t.map(tr => tr.trade_date));

  // Phoenix: cumulative gain dipped negative at some point, but is positive now
  let running = 0, wentNegative = false;
  t.forEach(tr => {

  });
  const phoenix = wentNegative && running > 0;

    { id: 'first', icon: '🌱', name: 'First Blood', desc: 'Log your first trade', unlocked: total >= 1 },

    { id: 'discipline10', icon: '🧘', name: 'Disciplined Mind', desc: 'Follow your rules on 10 trades in a row', unlocked: disciplineLast10 },
    { id: 'streak5', icon: '🔥', name: 'Iron Will', desc: 'Hit a 5-trade win streak', unlocked: streaks.best >= 5 },

    { id: 'sharpshooter', icon: '🎯', name: 'Sharpshooter', desc: '70%+ win rate over 10+ trades', unlocked: total >= 10 && winRate >= 70 },
    { id: 'greengain', icon: '💰', name: 'In the Green', desc: 'Positive net gain over 10+ trades', unlocked: total >= 10 && netGain > 0 },
    { id: 'fulldiscipline', icon: '🛡️', name: 'Rule Follower', desc: '100% discipline over 20+ trades', unlocked: total >= 20 && disciplineRate === 100 },
    { id: 'comeback', icon: '🐦‍🔥', name: 'Comeback Kid', desc: 'Win right after a 3+ loss streak', unlocked: comeback },
    { id: 'riskmanager', icon: '⚖️', name: 'Risk Manager', desc: 'Average risk:reward of 1:2 or better', unlocked: rrValues.length >= 5 && avgRR >= 2 },
    { id: 'diversified', icon: '🌐', name: 'Diversified', desc: 'Trade 3+ different instruments', unlocked: instruments.size >= 3 },
    { id: 'strategist', icon: '🧩', name: 'Strategist', desc: 'Use 3+ different strategies', unlocked: strategies.size >= 3 },

    { id: 'consistency', icon: '📅', name: 'Consistency King', desc: 'Log trades on 5 different days', unlocked: distinctDays.size >= 5 },
    { id: 'phoenix', icon: '🔥🐣', name: 'Phoenix', desc: 'Recover from a drawdown into positive territory', unlocked: phoenix }
  ];

  return badges;
}

function computeStreaks(trades, code) {
  // Sort by date+time ascending so we scan from oldest to newest
  const t = trades
    .filter(tr => tr.trader_code === code)
    .sort((a, b) => (a.trade_date + a.trade_time).localeCompare(b.trade_date + b.trade_time));

  if (t.length === 0) return { current: 0, best: 0, currentType: null };

  // Best win streak ever
  let best = 0, run = 0;
  t.forEach(tr => {
    if (tr.result === 'win') { run++; best = Math.max(best, run); }
    else run = 0;
  });

  // Current streak from the most recent trade going back
  const last = t[t.length - 1];
  const streakType = last.result; // 'win' or 'loss'
  let current = 0;
  for (let i = t.length - 1; i >= 0; i--) {
    if (t[i].result === streakType) current++;
    else break;
  }

  return { current, best, currentType: streakType };
}

async function renderDashboard() {
  const allTrades = await fetchAllTrades();
  const myTrades = allTrades.filter(t => t.trader_code === state.currentCode);
  const stats = computeStats(allTrades, state.currentCode);
  const streaks = computeStreaks(allTrades, state.currentCode);
  const myTier = computeTier(allTrades, state.currentCode);

  // Detect tier-up since last visit (per trader code, stored locally)
  const tierKey = 'cr8_last_tier_' + state.currentCode;
  const lastSeenTier = localStorage.getItem(tierKey);
  if (lastSeenTier && lastSeenTier !== myTier.name) {
    const lastIndex = TIERS.findIndex(t => t.name === lastSeenTier);
    const currentIndex = TIERS.findIndex(t => t.name === myTier.name);
    if (currentIndex > lastIndex) {
      // Defer until after render so the overlay mounts on top of the real DOM
      setTimeout(() => showTierUpCelebration(myTier), 50);
    }
  }
  localStorage.setItem(tierKey, myTier.name);

  // Detect newly unlocked badges since last visit, play a chime if any are new
  const myBadges = computeBadges(allTrades, state.currentCode);
  const unlockedIds = myBadges.filter(b => b.unlocked).map(b => b.id);
  const badgeKey = 'cr8_seen_badges_' + state.currentCode;
  const seenBadges = JSON.parse(localStorage.getItem(badgeKey) || '[]');
  const newlyUnlocked = unlockedIds.filter(id => !seenBadges.includes(id));
  if (seenBadges.length > 0 && newlyUnlocked.length > 0) {
    setTimeout(() => playBadgeChime(), 60);
  }
  localStorage.setItem(badgeKey, JSON.stringify(unlockedIds));

  // Fetch the latest mentor announcement, if any
  let announcementBanner = '';
  let latestAnnouncementId = null;
  try {
    const { data: announcements } = await sb.from('announcements').select('*').order('created_at', { ascending: false });
    const latest = announcements && announcements.length ? announcements[0] : null;
    if (latest) {
      latestAnnouncementId = latest.id;
      const dismissedId = sessionStorage.getItem('cr8_dismissed_announcement');
      if (dismissedId !== latest.id) {
        announcementBanner = `
          <div class="card fade-in" style="border-color:var(--gold);margin-bottom:1.25rem;display:flex;gap:10px;align-items:flex-start;">
            <div style="font-size:18px;">📣</div>
            <div style="flex:1;">
              <div style="font-size:12px;color:var(--gold);font-weight:500;margin-bottom:2px;">MENTOR ANNOUNCEMENT</div>
              <div style="font-size:14px;color:var(--text-primary);">${esc(latest.message)}</div>
            </div>
            <button id="dismissAnnouncement" style="font-size:12px;padding:4px 8px;flex-shrink:0;">Dismiss</button>
          </div>`;
      }
    }
  } catch (e) { /* announcements table may not exist yet, fail silently */ }

  // Build streak banner HTML
  let streakBanner = '';
  if (streaks.current > 0) {
    const isWin = streaks.currentType === 'win';
    const flameCount = Math.min(streaks.current, 5);
    const flames = isWin ? '🔥'.repeat(flameCount) : '❄️'.repeat(flameCount);
    const label = isWin
      ? `${streaks.current}-trade win streak`
      : `${streaks.current}-trade loss streak`;
    const sub = isWin
      ? `Best ever: ${streaks.best} &nbsp;·&nbsp; Keep it going.`
      : `Best ever: ${streaks.best} &nbsp;·&nbsp; Reset with discipline.`;
    const cardClass = isWin ? 'hot' : 'cold';
    streakBanner = `
      <div class="streak-card ${cardClass} fade-in" style="margin-bottom:1.25rem;">
        <div style="font-size:28px;line-height:1;" class="${isWin ? 'flame' : ''}">${flames}</div>
        <div>
          <div style="font-weight:500;font-size:15px;">${label}</div>
          <div style="font-size:12px;color:var(--text-muted);margin-top:2px;">${sub}</div>
        </div>
      </div>`;
  }

  // Gentle drawdown alert — shown separately when 3+ losses in a row
  let drawdownAlert = '';
  if (streaks.current >= 3 && streaks.currentType === 'loss') {
    drawdownAlert = `
      <div class="card fade-in" style="border-color:#60a5fa;background:linear-gradient(135deg, rgba(96,165,250,0.1), var(--surface-1));margin-bottom:1.25rem;">
        <div style="display:flex;gap:10px;align-items:flex-start;">
          <div style="font-size:20px;">🧘</div>
          <div>
            <div style="font-weight:500;font-size:14px;color:#60a5fa;">Take a breath</div>
            <div style="font-size:13px;color:var(--text-secondary);margin-top:4px;line-height:1.5;">
              You're ${streaks.current} losses in a row. This happens to every trader. Consider stepping away for a bit, reviewing your last few trades for patterns, and coming back with a clear head before your next entry. No revenge trades.
            </div>
          </div>
        </div>
      </div>`;
  }

  const traderCodes = [...new Set(allTrades.map(t => t.trader_code))];
  const { data: traderRows } = await sb.from('traders').select('*');
  const traderMap = {};
  (traderRows || []).forEach(t => traderMap[t.code] = t.nickname);

  let leaderboard = traderCodes.map(code => {
    const s = computeStats(allTrades, code);
    const sk = computeStreaks(allTrades, code);
    const tier = computeTier(allTrades, code);
    return {
      code, nick: traderMap[code] || code,
      winRate: s.winRate, disciplineRate: s.disciplineRate, pnlPct: s.pnlPct, total: s.total,
      blend: Math.round(s.winRate * 0.5 + s.disciplineRate * 0.5),
      streak: sk.current, streakType: sk.currentType, bestStreak: sk.best,
      tier: tier
    };
  }).filter(r => r.total > 0);

  const sortKey = state.sortBy;
  leaderboard.sort((a, b) => {
    if (sortKey === 'win') return b.winRate - a.winRate;
    if (sortKey === 'discipline') return b.disciplineRate - a.disciplineRate;
    if (sortKey === 'pnl') return b.pnlPct - a.pnlPct;
    return b.blend - a.blend;
  });

  app.innerHTML = `
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1.25rem;" class="fade-in">
      <div style="display:flex;align-items:center;gap:10px;">
        <div class="avatar">${getInitials(state.currentNick)}</div>
        <div>
          <div class="brand-mark">CR8 TRADING</div>
          <h2 style="margin-top:2px;">${esc(state.currentNick)} <span style="font-size:13px;color:var(--gold);font-weight:400;">🏅 ${computeBadges(allTrades, state.currentCode).filter(b=>b.unlocked).length}</span></h2>
          <div style="margin-top:4px;display:inline-flex;align-items:center;gap:5px;padding:2px 10px;border-radius:999px;background:${myTier.color}1a;border:1px solid ${myTier.color};">
            <span style="font-size:13px;">${myTier.icon}</span>
            <span style="font-size:12px;font-weight:500;color:${myTier.color};">${myTier.name}</span>
          </div>
          ${myTier.next ? `<div style="font-size:11px;color:var(--text-muted);margin-top:3px;">Next: ${myTier.next.icon} ${myTier.next.name} &middot; needs ${myTier.next.minTrades} trades &amp; ${myTier.next.minScore}+ score</div>` : `<div style="font-size:11px;color:var(--gold);margin-top:3px;">Max tier reached 🏆</div>`}
        </div>
      </div>
      <div style="display:flex;gap:8px;">
        <button id="themeToggle" title="Toggle terminal mode" style="padding:8px 12px;">▣</button>
        <button id="logoutBtn">Log out</button>
      </div>
    </div>
    <div style="display:grid;grid-template-columns:repeat(auto-fit, minmax(140px, 1fr));gap:12px;margin-bottom:1.5rem;" class="fade-in">
      ${metricCard('Trades logged', stats.total)}
      ${metricCard('Win rate', stats.winRate + '%')}
      ${metricCard('Discipline', stats.disciplineRate + '%')}
      ${metricCard('Net gain', (stats.pnlPct >= 0 ? '+' : '') + stats.pnlPct + '%', stats.pnlPct >= 0 ? 'green' : 'red', true)}
    </div>
    ${drawdownAlert}
    ${announcementBanner}
    ${streakBanner}
    <div style="display:flex;gap:8px;margin-bottom:1.25rem;border-bottom:0.5px solid var(--border);">
      <button class="tabbtn ${state.tab==='log'?'active':''}" data-tab="log">Log a trade</button>
      <button class="tabbtn ${state.tab==='mine'?'active':''}" data-tab="mine">My trades</button>
      <button class="tabbtn ${state.tab==='charts'?'active':''}" data-tab="charts">Charts</button>
      <button class="tabbtn ${state.tab==='calc'?'active':''}" data-tab="calc">Risk Calc</button>
      <button class="tabbtn ${state.tab==='board'?'active':''}" data-tab="board">Leaderboard</button>
      <button class="tabbtn ${state.tab==='badges'?'active':''}" data-tab="badges">Badges</button>
      <button class="tabbtn ${state.tab==='bests'?'active':''}" data-tab="bests">Personal Bests</button>
    </div>
    <div id="tabContent"></div>
  `;

  document.getElementById('logoutBtn').onclick = () => {
    sessionStorage.removeItem('cr8_code');
    sessionStorage.removeItem('cr8_nick');
    state.currentCode = null;
    stopLiveTicker();
    renderLogin();
  };
  startLiveTicker();
  const themeToggle = document.getElementById('themeToggle');
  if (themeToggle) {
    themeToggle.onclick = () => {
      document.body.classList.toggle('terminal');
      const isTerminal = document.body.classList.contains('terminal');
      localStorage.setItem('cr8_terminal_theme', isTerminal ? '1' : '0');
    };
  }
  const dismissBtn = document.getElementById('dismissAnnouncement');
  if (dismissBtn && latestAnnouncementId) {
    dismissBtn.onclick = () => {
      sessionStorage.setItem('cr8_dismissed_announcement', latestAnnouncementId);
      renderDashboard();
    };
  }
  const TAB_ORDER = ['log', 'mine', 'charts', 'calc', 'board', 'badges', 'bests'];
  app.querySelectorAll('.tabbtn').forEach(b => {
    b.onclick = () => {
      const fromIndex = TAB_ORDER.indexOf(state.tab);
      const toIndex = TAB_ORDER.indexOf(b.dataset.tab);
      state.slideDir = toIndex >= fromIndex ? 'right' : 'left';
      state.tab = b.dataset.tab;
      renderDashboard();
    };
  });

  const content = document.getElementById('tabContent');
  if (state.tab === 'log') renderLogForm(content);
  else if (state.tab === 'mine') renderMine(content, myTrades);

  else if (state.tab === 'calc') renderRiskCalc(content);
  else if (state.tab === 'badges') renderBadges(content, allTrades);
  else if (state.tab === 'bests') renderPersonalBests(content, myTrades);
  else renderLeaderboard(content, leaderboard);

  // Apply directional slide to whatever the render function just placed inside
  if (state.slideDir) {
    const inner = content.firstElementChild;
    if (inner) {
      inner.classList.remove('fade-in', 'slide-left', 'slide-right');
      void inner.offsetWidth;
      inner.classList.add(state.slideDir === 'right' ? 'slide-right' : 'slide-left');
    }
    state.slideDir = null;
  }

  let style = '';

  if (color === 'red') style = 'color:var(--text-danger);';

  return `<div class="card" style="${border}">

    <div class="value-pop" style="font-size:24px;font-weight:500;font-family:var(--font-mono);${style}">${value}</div>

}

    const stop = parseFloat(document.getElementById('calcStop').value);
    const type = document.getElementById('calcType').value;
    const resultEl = document.getElementById('calcResult');

    if (!account || !riskPct || !entry || !stop || entry === stop) {
      resultEl.innerHTML = `<p class="muted" style="font-size:13px;">Fill in all fields. Entry and stop loss must be different prices.</p>`;
      return;
    }

    const riskAmount = account * (riskPct / 100);
    const priceDistance = Math.abs(entry - stop);
    const riskPerUnit = priceDistance;
    const positionSize = riskAmount / riskPerUnit;

    let sizeLabel, sizeValue;
    if (type === 'forex') {
      const lots = positionSize / 100000;
      sizeLabel = 'Position size';
      sizeValue = `${lots.toFixed(2)} lots <span style="color:var(--text-muted);font-size:12px;">(${Math.round(positionSize).toLocaleString()} units)</span>`;
    } else {
      sizeLabel = 'Position size';
      sizeValue = `${positionSize.toFixed(4)} units/shares`;
    }

    resultEl.innerHTML = `
      <div class="card fade-in" style="border-color:var(--gold);">
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;">
          <div>
            <div style="font-size:12px;color:var(--text-muted);">Risk amount</div>
            <div style="font-family:var(--font-mono);font-weight:500;font-size:18px;color:var(--text-danger);">$${riskAmount.toFixed(2)}</div>
          </div>
          <div>
            <div style="font-size:12px;color:var(--text-muted);">${sizeLabel}</div>
            <div style="font-family:var(--font-mono);font-weight:500;font-size:18px;color:var(--gold);">${sizeValue}</div>
          </div>
        </div>
        <div style="margin-top:12px;font-size:12px;color:var(--text-muted);">
          You're risking ${riskPct}% of your $${account.toLocaleString()} account ($${riskAmount.toFixed(2)}) with a ${priceDistance.toFixed(5)} price distance to your stop loss.
        </div>
      </div>`;
  };
}

function renderCharts(container, trades) {
  if (trades.length < 2) {
    container.innerHTML = `<div class="fade-in"><p class="muted">Log at least 2 trades to see your charts.</p></div>`;
    return;
  }

  // Sort oldest to newest
  const sorted = [...trades].sort((a, b) =>
    (a.trade_date + a.trade_time).localeCompare(b.trade_date + b.trade_time));

  // Equity curve — cumulative P&L %
  let running = 0;
  const equityLabels = [];
  const equityData = [];
  sorted.forEach((t, i) => {
    running += Number(t.pnl_pct);
    equityLabels.push(`#${i + 1}`);
    equityData.push(Math.round(running * 100) / 100);
  });

  // Rolling 5-trade win rate
  const winRateLabels = [];
  const winRateData = [];
  for (let i = 4; i < sorted.length; i++) {
    const window = sorted.slice(i - 4, i + 1);
    const wr = Math.round((window.filter(t => t.result === 'win').length / 5) * 100);
    winRateLabels.push(`#${i + 1}`);
    winRateData.push(wr);
  }

  // Discipline trend — rolling 5-trade discipline rate
  const discLabels = [];
  const discData = [];
  for (let i = 4; i < sorted.length; i++) {
    const window = sorted.slice(i - 4, i + 1);
    const dr = Math.round((window.filter(t => !t.emotional).length / 5) * 100);
    discLabels.push(`#${i + 1}`);
    discData.push(dr);
  }

  const isPositive = equityData[equityData.length - 1] >= 0;

  // Build trade calendar heatmap — last 12 weeks, GitHub-style
  const byDate = {};
  trades.forEach(t => {
    if (!byDate[t.trade_date]) byDate[t.trade_date] = { wins: 0, losses: 0, pnl: 0 };
    if (t.result === 'win') byDate[t.trade_date].wins++; else byDate[t.trade_date].losses++;
    byDate[t.trade_date].pnl += Number(t.pnl_pct);
  });

  const todayDate = new Date();
  const weeksToShow = 12;
  const totalDays = weeksToShow * 7;
  const startDate = new Date(todayDate);
  startDate.setDate(startDate.getDate() - totalDays + 1);
  // Align start to a Sunday so columns line up as full weeks
  startDate.setDate(startDate.getDate() - startDate.getDay());

  const dayCells = [];
  const cursor = new Date(startDate);
  while (cursor <= todayDate) {
    const iso = cursor.toISOString().slice(0, 10);
    const day = byDate[iso];
    let bucket = 'none';
    if (day) {
      const total = day.wins + day.losses;
      const winRate = total ? day.wins / total : 0;
      if (winRate >= 0.7) bucket = 'great';
      else if (winRate >= 0.4) bucket = 'mixed';
      else bucket = 'rough';
    }
    dayCells.push({ date: new Date(cursor), iso, day, bucket });
    cursor.setDate(cursor.getDate() + 1);
  }

  const heatColors = {
    none: 'rgba(255,255,255,0.05)',
    great: '#4ade80',
    mixed: '#fbbf24',
    rough: '#f87171'
  };

  // Group into week columns
  const weekCols = [];
  for (let i = 0; i < dayCells.length; i += 7) weekCols.push(dayCells.slice(i, i + 7));

  const monthLabels = [];
  weekCols.forEach((week, i) => {
    const firstOfMonth = week.find(d => d.date.getDate() <= 7);
    monthLabels.push(firstOfMonth ? firstOfMonth.date.toLocaleString('default', { month: 'short' }) : '');
  });

  const heatmapHTML = `
    <div class="card">
      <div style="font-weight:500;margin-bottom:4px;">Trade Calendar</div>
      <div style="font-size:12px;color:var(--text-muted);margin-bottom:14px;">Last 12 weeks &middot; green = strong day, yellow = mixed, red = rough day</div>
      <div style="overflow-x:auto;">
        <div style="display:inline-flex;gap:3px;">
          ${weekCols.map((week, wi) => `
            <div style="display:flex;flex-direction:column;gap:3px;">
              ${week.map(d => `
                <div title="${d.iso}${d.day ? ` — ${d.day.wins}W/${d.day.losses}L, ${d.day.pnl >= 0 ? '+' : ''}${Math.round(d.day.pnl*10)/10}%` : ' — no trades'}"
                  style="width:13px;height:13px;border-radius:3px;background:${heatColors[d.bucket]};${d.date > todayDate ? 'opacity:0;' : ''}"></div>
              `).join('')}
            </div>`).join('')}
        </div>
      </div>
      <div style="display:flex;gap:14px;margin-top:10px;font-size:11px;color:var(--text-muted);">
        <span><span style="display:inline-block;width:9px;height:9px;border-radius:2px;background:${heatColors.great};margin-right:4px;"></span>Strong day</span>
        <span><span style="display:inline-block;width:9px;height:9px;border-radius:2px;background:${heatColors.mixed};margin-right:4px;"></span>Mixed</span>
        <span><span style="display:inline-block;width:9px;height:9px;border-radius:2px;background:${heatColors.rough};margin-right:4px;"></span>Rough day</span>
      </div>
    </div>`;

  container.innerHTML = `
    <div class="fade-in" style="display:flex;flex-direction:column;gap:24px;">

      ${heatmapHTML}

      <div class="card">
        <div style="font-weight:500;margin-bottom:4px;">Equity Curve</div>
        <div style="font-size:12px;color:var(--text-muted);margin-bottom:12px;">Cumulative % gain across all trades</div>
        <canvas id="equityChart" height="140"></canvas>
      </div>

      <div class="card">
        <div style="font-weight:500;margin-bottom:4px;">Win Rate Trend</div>
        <div style="font-size:12px;color:var(--text-muted);margin-bottom:12px;">Rolling 5-trade win rate</div>
        <canvas id="winChart" height="120"></canvas>
      </div>

      <div class="card">
        <div style="font-weight:500;margin-bottom:4px;">Discipline Trend</div>
        <div style="font-size:12px;color:var(--text-muted);margin-bottom:12px;">Rolling 5-trade discipline rate</div>
        <canvas id="discChart" height="120"></canvas>
      </div>

    </div>`;

  const gold = '#d4af37';
  const green = '#4ade80';
  const red = '#f87171';
  const blue = '#60a5fa';
  const gridColor = 'rgba(255,255,255,0.06)';
  const tickColor = '#7a7468';

  const baseOptions = (yLabel, unit) => ({
    responsive: true,
    animation: { duration: 600, easing: 'easeInOutQuart' },
    plugins: { legend: { display: false }, tooltip: {
      backgroundColor: 'rgba(23,22,18,0.95)',
      borderColor: gold,
      borderWidth: 1,
      titleColor: gold,
      bodyColor: '#f2f0e8',
      callbacks: { label: ctx => ` ${ctx.parsed.y}${unit}` }
    }},
    scales: {
      x: { grid: { color: gridColor }, ticks: { color: tickColor, font: { size: 11 }, maxTicksLimit: 8 } },
      y: { grid: { color: gridColor }, ticks: { color: tickColor, font: { size: 11 }, callback: v => v + unit } }
    }
  });

  // Equity chart — color line green or red based on final value
  new Chart(document.getElementById('equityChart'), {
    type: 'line',
    data: {
      labels: equityLabels,
      datasets: [{
        data: equityData,
        borderColor: isPositive ? green : red,
        backgroundColor: isPositive ? 'rgba(74,222,128,0.08)' : 'rgba(248,113,113,0.08)',
        borderWidth: 2,
        pointRadius: sorted.length > 20 ? 0 : 3,
        pointBackgroundColor: isPositive ? green : red,
        fill: true,
        tension: 0.3
      }]
    },
    options: baseOptions('P&L', '%')
  });

  // Win rate chart
  new Chart(document.getElementById('winChart'), {
    type: 'line',
    data: {
      labels: winRateLabels,
      datasets: [{
        data: winRateData,
        borderColor: gold,
        backgroundColor: 'rgba(212,175,55,0.08)',
        borderWidth: 2,
        pointRadius: winRateData.length > 20 ? 0 : 3,
        pointBackgroundColor: gold,
        fill: true,
        tension: 0.3
      }]
    },
    options: {
      ...baseOptions('Win rate', '%'),
      scales: {
        ...baseOptions('Win rate', '%').scales,
        y: { ...baseOptions('Win rate', '%').scales.y, min: 0, max: 100 }
      }
    }
  });

  // Discipline chart
  new Chart(document.getElementById('discChart'), {
    type: 'line',
    data: {
      labels: discLabels,
      datasets: [{
        data: discData,
        borderColor: blue,
        backgroundColor: 'rgba(96,165,250,0.08)',
        borderWidth: 2,
        pointRadius: discData.length > 20 ? 0 : 3,
        pointBackgroundColor: blue,
        fill: true,
        tension: 0.3
      }]
    },
    options: {
      ...baseOptions('Discipline', '%'),
      scales: {
        ...baseOptions('Discipline', '%').scales,
        y: { ...baseOptions('Discipline', '%').scales.y, min: 0, max: 100 }
      }
    }
  });
}

function renderPersonalBests(container, trades) {
  if (trades.length === 0) {
    container.innerHTML = `<div class="fade-in"><p class="muted">No trades logged yet — your personal bests will show up here once you start.</p></div>`;
    return;
  }

  const sorted = [...trades].sort((a, b) => (a.trade_date + a.trade_time).localeCompare(b.trade_date + b.trade_time));

  // Biggest win and biggest loss
  const biggestWin = trades.reduce((best, t) => Number(t.pnl_pct) > (best ? Number(best.pnl_pct) : -Infinity) ? t : best, null);
  const biggestLoss = trades.reduce((worst, t) => Number(t.pnl_pct) < (worst ? Number(worst.pnl_pct) : Infinity) ? t : worst, null);

  // Longest win streak (reuse computeStreaks logic's "best", already win-streak based)
  const streaks = computeStreaks(trades.map(t => ({ ...t, trader_code: t.trader_code })), trades[0] ? trades[0].trader_code : null);

  // Best week — group by ISO week, sum pnl
  function getWeekKey(dateStr) {
    const d = new Date(dateStr);
    const onejan = new Date(d.getFullYear(), 0, 1);
    const week = Math.ceil((((d - onejan) / 86400000) + onejan.getDay() + 1) / 7);
    return `${d.getFullYear()}-W${week}`;
  }
  const weekTotals = {};
  sorted.forEach(t => {
    const wk = getWeekKey(t.trade_date);
    weekTotals[wk] = (weekTotals[wk] || 0) + Number(t.pnl_pct);
  });
  let bestWeekKey = null, bestWeekValue = -Infinity;
  Object.entries(weekTotals).forEach(([wk, val]) => { if (val > bestWeekValue) { bestWeekValue = val; bestWeekKey = wk; } });

  // Most disciplined day streak (consecutive trades, not just one day) — longest run of non-emotional trades
  let bestDisciplineRun = 0, run = 0;
  sorted.forEach(t => {
    if (!t.emotional) { run++; bestDisciplineRun = Math.max(bestDisciplineRun, run); } else run = 0;
  });

  // Total trades and overall win rate for context
  const total = trades.length;
  const wins = trades.filter(t => t.result === 'win').length;

  const cards = [
    {
      icon: '💰', label: 'Biggest Win', color: 'var(--text-success)',
      value: biggestWin ? `+${Number(biggestWin.pnl_pct)}%` : '—',
      sub: biggestWin ? `${esc(biggestWin.instrument || 'Trade')} &middot; ${biggestWin.trade_date}` : 'No wins yet'
    },
    {
      icon: '📉', label: 'Biggest Loss', color: 'var(--text-danger)',
      value: biggestLoss ? `${Number(biggestLoss.pnl_pct)}%` : '—',
      sub: biggestLoss ? `${esc(biggestLoss.instrument || 'Trade')} &middot; ${biggestLoss.trade_date}` : 'No losses yet'
    },
    {
      icon: '🔥', label: 'Longest Win Streak', color: 'var(--gold)',
      value: `${streaks.best} trades`,
      sub: streaks.best > 0 ? 'Personal record' : 'Log a few wins in a row to set this'
    },
    {
      icon: '📅', label: 'Best Week', color: 'var(--text-success)',
      value: bestWeekKey ? `${bestWeekValue >= 0 ? '+' : ''}${Math.round(bestWeekValue * 10) / 10}%` : '—',
      sub: bestWeekKey ? bestWeekKey.replace('-W', ', Week ') : 'No data yet'
    },
    {
      icon: '🧘', label: 'Discipline Run', color: '#60a5fa',
      value: `${bestDisciplineRun} trades`,
      sub: 'Longest streak of following your rules'
    },
    {
      icon: '📊', label: 'Total Trades', color: 'var(--text-primary)',
      value: `${total}`,
      sub: `${total ? Math.round((wins/total)*100) : 0}% overall win rate`
    }
  ];

  container.innerHTML = `
    <div class="fade-in">
      <p class="muted" style="font-size:13px;margin-bottom:16px;">Your personal records, tracked since your very first trade.</p>
      <div style="display:grid;grid-template-columns:repeat(auto-fit, minmax(180px, 1fr));gap:12px;">
        ${cards.map(c => `
          <div class="card">
            <div style="display:flex;justify-content:space-between;align-items:flex-start;">
              <div style="font-size:12px;color:var(--text-secondary);">${c.label}</div>
              <div style="font-size:18px;">${c.icon}</div>
            </div>
            <div style="font-family:var(--font-mono);font-weight:500;font-size:22px;color:${c.color};margin-top:6px;">${c.value}</div>
            <div style="font-size:11px;color:var(--text-muted);margin-top:4px;">${c.sub}</div>
          </div>`).join('')}
      </div>
    </div>`;
}

// Lightweight sound effects using the Web Audio API — no external audio files needed.
let _audioCtx = null;
function getAudioCtx() {
  if (!_audioCtx) {
    try { _audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }
    catch (e) { return null; }
  }
  if (_audioCtx.state === 'suspended') _audioCtx.resume();
  return _audioCtx;
}

function playTone(freq, startTime, duration, ctx, type, gainPeak) {
  const osc = ctx.createOscillator();
  const gain = ctx.createGain();
  osc.type = type || 'sine';
  osc.frequency.value = freq;
  gain.gain.setValueAtTime(0, ctx.currentTime + startTime);
  gain.gain.linearRampToValueAtTime(gainPeak || 0.12, ctx.currentTime + startTime + 0.02);
  gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + startTime + duration);
  osc.connect(gain);
  gain.connect(ctx.destination);
  osc.start(ctx.currentTime + startTime);
  osc.stop(ctx.currentTime + startTime + duration);
}

function playWinChime() {
  const ctx = getAudioCtx();
  if (!ctx) return;
  playTone(523.25, 0,    0.18, ctx, 'sine', 0.1);  // C5
  playTone(659.25, 0.08, 0.22, ctx, 'sine', 0.1);  // E5
  playTone(783.99, 0.16, 0.3,  ctx, 'sine', 0.12); // G5
}

function playBadgeChime() {
  const ctx = getAudioCtx();
  if (!ctx) return;
  playTone(440,    0,    0.12, ctx, 'triangle', 0.1);
  playTone(659.25, 0.1,  0.2,  ctx, 'triangle', 0.12);
}

function playRankUpFanfare() {
  const ctx = getAudioCtx();
  if (!ctx) return;
  playTone(392,    0,    0.15, ctx, 'sine', 0.1);   // G4
  playTone(523.25, 0.12, 0.15, ctx, 'sine', 0.1);   // C5
  playTone(659.25, 0.24, 0.15, ctx, 'sine', 0.1);   // E5
  playTone(783.99, 0.36, 0.4,  ctx, 'sine', 0.14);  // G5 (held)
  playTone(1046.5, 0.36, 0.4,  ctx, 'triangle', 0.08); // C6 shimmer
}

// Live activity ticker — shows recent trades across all traders, anonymized
// (nickname + instrument + win/loss only, never exact P&L, notes, or screenshots).
let _liveTickerInterval = null;

function stopLiveTicker() {
  if (_liveTickerInterval) { clearInterval(_liveTickerInterval); _liveTickerInterval = null; }
  const el = document.getElementById('live-ticker');
  if (el) el.remove();
  document.body.classList.remove('has-live-ticker');
}

async function refreshLiveTicker() {
  let el = document.getElementById('live-ticker');
  if (!el) {
    el = document.createElement('div');
    el.id = 'live-ticker';
    document.body.appendChild(el);
    document.body.classList.add('has-live-ticker');
  }

  try {
    const [{ data: recentTrades }, { data: traders }] = await Promise.all([
      sb.from('trades').select('*').order('created_at', { ascending: false }),
      sb.from('traders').select('*')
    ]);

    const traderMap = {};
    (traders || []).forEach(t => traderMap[t.code] = t.nickname);

    const items = (recentTrades || []).slice(0, 20).map(t => {
      const nick = esc(traderMap[t.trader_code] || 'A trader');
      const isWin = t.result === 'win';
      const dot = isWin ? '🟢' : '🔴';
      const verb = isWin ? 'closed a win on' : 'closed a loss on';
      const instrument = esc(t.instrument || 'a trade');
      return `<span class="ticker-item">${dot} <strong style="color:var(--text-primary);">${nick}</strong> ${verb} ${instrument}</span>`;
    });

    if (items.length === 0) {
      el.innerHTML = `<div class="ticker-label"><span class="live-dot"></span>LIVE</div>
        <div class="ticker-track"><span class="ticker-item">No trades logged yet today — be the first.</span></div>`;
      return;
    }

    // Duplicate the list so the scroll loop feels continuous
    const trackHtml = items.concat(items).join('<span style="color:var(--border);">•</span>');
    el.innerHTML = `<div class="ticker-label"><span class="live-dot"></span>LIVE</div>
      <div class="ticker-track">${trackHtml}</div>`;
  } catch (e) { /* fail silently, ticker is non-critical */ }
}

function startLiveTicker() {
  stopLiveTicker();
  refreshLiveTicker();
  _liveTickerInterval = setInterval(refreshLiveTicker, 20000);
}

function showTierUpCelebration(tier) {
  playRankUpFanfare();
  const overlay = document.createElement('div');
  overlay.id = 'tierup-overlay';
  overlay.innerHTML = `
    <div class="tierup-card">
      <div class="tierup-icon">${tier.icon}</div>
      <div style="font-family:var(--font-mono);font-size:12px;color:var(--gold);letter-spacing:0.15em;margin-top:16px;">RANK UP</div>
      <h2 style="margin-top:6px;font-size:28px;">${esc(tier.name)}</h2>
      <p style="color:var(--text-secondary);font-size:14px;margin-top:8px;">Your discipline and consistency just paid off. Keep building.</p>
      <button id="tierupCloseBtn" style="margin-top:20px;padding:10px 28px;border:1px solid ${tier.color};color:${tier.color};">Let's go</button>
    </div>`;
  document.body.appendChild(overlay);

  // Confetti burst
  const colors = ['#d4af37', '#f97316', '#4ade80', '#60a5fa', '#f87171', '#a78bfa'];
  const confettiCount = 60;
  const pieces = [];
  for (let i = 0; i < confettiCount; i++) {
    const piece = document.createElement('div');
    piece.className = 'confetti-piece';
    piece.style.left = (Math.random() * 100) + 'vw';
    piece.style.background = colors[Math.floor(Math.random() * colors.length)];
    piece.style.animationDuration = (2 + Math.random() * 1.5) + 's';
    piece.style.animationDelay = (Math.random() * 0.6) + 's';
    piece.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
    document.body.appendChild(piece);
    pieces.push(piece);
  }

  const cleanup = () => {
    overlay.remove();
    pieces.forEach(p => p.remove());
  };
  document.getElementById('tierupCloseBtn').onclick = cleanup;
  overlay.addEventListener('click', (e) => { if (e.target === overlay) cleanup(); });
  setTimeout(() => pieces.forEach(p => p.remove()), 4000);
}

function setupBackgroundFX() {
  const fx = document.getElementById('fx-layer');
  if (!fx) return;

  // Floating P&L particles
  const sampleValues = ['+2.4%', '+0.8%', '+5.1%', '+1.3%', '-0.6%', '+3.7%', '-1.2%', '+0.4%', '+4.4%', '-2.1%', '+1.9%', '+0.2%'];
  const particleCount = 14;
  for (let i = 0; i < particleCount; i++) {
    const el = document.createElement('div');
    const val = sampleValues[Math.floor(Math.random() * sampleValues.length)];
    const isPositive = val.startsWith('+');
    el.className = 'pnl-particle';
    el.textContent = val;
    const leftSide = Math.random() > 0.5;
    el.style.left = leftSide ? (Math.random() * 14) + '%' : (84 + Math.random() * 14) + '%';
    el.style.bottom = '-40px';
    el.style.fontSize = (12 + Math.random() * 10) + 'px';
    el.style.color = isPositive ? '#4ade80' : '#f87171';
    el.style.animationDuration = (14 + Math.random() * 12) + 's';
    el.style.animationDelay = (Math.random() * 20) + 's';
    fx.appendChild(el);
  }

  // Two ticker rows of candlesticks pinned to top and bottom edges, like a trading floor strip
  [{ pos: 'top', speed: 75, height: 46, opacity: 0.28 }, { pos: 'bottom', speed: 95, height: 60, opacity: 0.24 }]
    .forEach(rowCfg => {
      const row = document.createElement('div');
      row.className = 'ticker-row ' + rowCfg.pos;
      row.style.opacity = rowCfg.opacity;
      row.style.animationDuration = rowCfg.speed + 's';
      let html = '';
      for (let i = 0; i < 90; i++) {
        const h = Math.round(rowCfg.height * (0.35 + Math.random() * 0.65));
        const isGreen = Math.random() > 0.45;
        html += `<div class="ticker-candle" style="height:${h}px;background:${isGreen ? '#f97316' : '#6b6b6b'};"></div>`;
      }
      row.innerHTML = html;
      fx.appendChild(row);
    });

  // Floating crypto symbols drifting diagonally across the screen
  const cryptoSymbols = ['₿', 'Ξ', '◎', 'Ł', '$', '€', '⟠', '₮'];
  const cryptoCount = 10;
  for (let i = 0; i < cryptoCount; i++) {
    const el = document.createElement('div');
    const sym = cryptoSymbols[Math.floor(Math.random() * cryptoSymbols.length)];
    el.className = 'crypto-particle';
    el.textContent = sym;
    el.style.left = (Math.random() * 95) + '%';
    el.style.top = (Math.random() * 95) + '%';
    el.style.fontSize = (18 + Math.random() * 28) + 'px';
    el.style.color = Math.random() > 0.5 ? '#d4af37' : '#9a9a9a';
    const dx = (Math.random() - 0.5) * 300;
    const dy = (Math.random() - 0.5) * 300;
    const rot = (Math.random() - 0.5) * 60;
    el.style.setProperty('--dx', dx + 'px');
    el.style.setProperty('--dy', dy + 'px');
    el.style.setProperty('--rot', rot + 'deg');
    el.style.animationDuration = (20 + Math.random() * 20) + 's';
    el.style.animationDelay = (Math.random() * 25) + 's';
    fx.appendChild(el);
  }
}

// Global ripple effect on every button click — works automatically for buttons
// added later too, since it's delegated to the document rather than bound per-button.
document.addEventListener('click', (e) => {
  const btn = e.target.closest('button');
  if (!btn) return;
  const rect = btn.getBoundingClientRect();
  const size = Math.max(rect.width, rect.height);
  const ripple = document.createElement('span');
  ripple.className = 'ripple-effect';
  ripple.style.width = ripple.style.height = size + 'px';
  ripple.style.left = (e.clientX - rect.left - size / 2) + 'px';
  ripple.style.top = (e.clientY - rect.top - size / 2) + 'px';
  btn.appendChild(ripple);
  setTimeout(() => ripple.remove(), 600);
});

setupBackgroundFX();

// Cinematic loader boot sequence
(function runLoaderBoot() {
  const bootEl = document.getElementById('loaderBoot');
  const loader = document.getElementById('cr8-loader');
  if (!bootEl || !loader) { init(); return; }

  const lines = [
    '> Initializing CR8 Trading Journal...',
    '> Connecting to market data...',
    '> Loading trader profiles...',
    '> Calibrating leaderboard...',
    '> Ready.'
  ];

  let lineIndex = 0;
  let charIndex = 0;
  let displayed = '';

  function typeChar() {
    if (lineIndex >= lines.length) {
      finishLoader();
      return;
    }
    const currentLine = lines[lineIndex];
    if (charIndex < currentLine.length) {
      displayed = displayed.replace(/<span class="cursor">█<\/span>$/, '');
      displayed += currentLine[charIndex];
      bootEl.innerHTML = displayed + '<span class="cursor">█</span>';
      charIndex++;
      setTimeout(typeChar, 18 + Math.random() * 25);
    } else {
      displayed = displayed.replace(/<span class="cursor">█<\/span>$/, '') + '\n';
      lineIndex++;
      charIndex = 0;
      // keep only the last 4 lines visible
      const shownLines = displayed.split('\n').filter(Boolean).slice(-4);
      displayed = shownLines.join('\n') + '\n';
      setTimeout(typeChar, 180);
    }
  }

  let appReady = false;
  let bootDone = false;

  function finishLoader() {
    bootDone = true;
    tryHide();
  }
  function tryHide() {
    if (bootDone && appReady) {
      loader.classList.add('fade-out');
      setTimeout(() => loader.remove(), 600);
    }
  }

  // Start typing, and load the app in parallel
  typeChar();
  (async () => {
    await init();
    appReady = true;
    tryHide();
  })();

  // Safety: never let the loader hang forever
  setTimeout(() => { appReady = true; bootDone = true; tryHide(); }, 8000);
})();
</script>
