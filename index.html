    if (currentIndex > lastIndex) {
      // Defer until after render so the overlay mounts on top of the real DOM
      setTimeout(() => showTierUpCelebration(myTier), 50);
    }
  }
  localStorage.setItem(tierKey, myTier.name);

  // Detect newly unlocked badges since last visit, play a chime if any are new
  const myBadges = computeBadges(allTrades, state.currentCode);
  const unlockedIds = myBadges.filter(b => b.unlocked).map(b => b.id);
  const badgeKey = 'cr8_seen_badges_' + state.currentCode;
  const seenBadges = JSON.parse(localStorage.getItem(badgeKey) || '[]');
  const newlyUnlocked = unlockedIds.filter(id => !seenBadges.includes(id));
  if (seenBadges.length > 0 && newlyUnlocked.length > 0) {
    setTimeout(() => playBadgeChime(), 60);
  }
  localStorage.setItem(badgeKey, JSON.stringify(unlockedIds));

  // Fetch the latest mentor announcement, if any
  let announcementBanner = '';
  let latestAnnouncementId = null;
  try {
    const { data: announcements } = await sb.from('announcements').select('*').order('created_at', { ascending: false });
    const latest = announcements && announcements.length ? announcements[0] : null;
    if (latest) {
      latestAnnouncementId = latest.id;
      const dismissedId = sessionStorage.getItem('cr8_dismissed_announcement');
      if (dismissedId !== latest.id) {
        announcementBanner = `
          <div class="card fade-in" style="border-color:var(--gold);margin-bottom:1.25rem;display:flex;gap:10px;align-items:flex-start;">
            <div style="font-size:18px;">📣</div>
            <div style="flex:1;">
              <div style="font-size:12px;color:var(--gold);font-weight:500;margin-bottom:2px;">MENTOR ANNOUNCEMENT</div>
              <div style="font-size:14px;color:var(--text-primary);">${esc(latest.message)}</div>
            </div>
            <button id="dismissAnnouncement" style="font-size:12px;padding:4px 8px;flex-shrink:0;">Dismiss</button>
          </div>`;
      }
    }
  } catch (e) { /* announcements table may not exist yet, fail silently */ }

  // Fetch assignments (homework) for this student
  let assignmentBanner = '';
  try {
    const [{ data: assignments }, { data: dones }] = await Promise.all([
      sb.from('assignments').select('*').order('created_at', { ascending: false }),
      sb.from('assignment_done').select('*').eq('trader_code', state.currentCode)
    ]);
    const mine = (assignments || []).filter(a => !a.target_code || a.target_code === state.currentCode);
    const doneIds = new Set((dones || []).map(d => d.assignment_id));
    const pending = mine.filter(a => !doneIds.has(a.id));
    if (mine.length) {
      assignmentBanner = `
        <div class="card fade-in" style="border-color:#a78bfa;margin-bottom:1.25rem;">
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;">
            <div style="font-size:12px;color:#a78bfa;font-weight:500;">📋 HOMEWORK FROM YOUR MENTOR</div>
            <div style="font-size:11px;color:var(--text-muted);">${pending.length} pending</div>
          </div>
          <div style="display:flex;flex-direction:column;gap:8px;">
            ${mine.map(a => {
              const done = doneIds.has(a.id);
              return `
                <div style="display:flex;gap:10px;align-items:flex-start;${done ? 'opacity:0.55;' : ''}">
                  <button class="hw-toggle" data-id="${a.id}" data-done="${done ? '1' : '0'}" style="width:22px;height:22px;padding:0;flex-shrink:0;border-radius:6px;${done ? 'background:#a78bfa;border-color:#a78bfa;color:#1a1605;' : ''}">${done ? '✓' : ''}</button>
                  <div>
                    <div style="font-size:14px;${done ? 'text-decoration:line-through;' : ''}">${esc(a.title)}</div>
                    ${a.detail ? `<div style="font-size:12px;color:var(--text-secondary);">${esc(a.detail)}</div>` : ''}
                  </div>
                </div>`;
            }).join('')}
          </div>
        </div>`;
    }
  } catch (e) { /* assignments table may not exist yet */ }

  // Build streak banner HTML
  let streakBanner = '';
  if (streaks.current > 0) {
    const isWin = streaks.currentType === 'win';
    const flameCount = Math.min(streaks.current, 5);
    const flames = isWin ? '🔥'.repeat(flameCount) : '❄️'.repeat(flameCount);
    const label = isWin
      ? `${streaks.current}-trade win streak`
      : `${streaks.current}-trade loss streak`;
    const sub = isWin
      ? `Best ever: ${streaks.best} &nbsp;·&nbsp; Keep it going.`
      : `Best ever: ${streaks.best} &nbsp;·&nbsp; Reset with discipline.`;
    const cardClass = isWin ? 'hot' : 'cold';
    streakBanner = `
      <div class="streak-card ${cardClass} fade-in" style="margin-bottom:1.25rem;">
        <div style="font-size:28px;line-height:1;" class="${isWin ? 'flame' : ''}">${flames}</div>
        <div>
          <div style="font-weight:500;font-size:15px;">${label}</div>
          <div style="font-size:12px;color:var(--text-muted);margin-top:2px;">${sub}</div>
        </div>
      </div>`;
  }

  // Gentle drawdown alert — shown separately when 3+ losses in a row
  let drawdownAlert = '';
  if (streaks.current >= 3 && streaks.currentType === 'loss') {
    drawdownAlert = `
      <div class="card fade-in" style="border-color:#60a5fa;background:linear-gradient(135deg, rgba(96,165,250,0.1), var(--surface-1));margin-bottom:1.25rem;">
        <div style="display:flex;gap:10px;align-items:flex-start;">
          <div style="font-size:20px;">🧘</div>
          <div>
            <div style="font-weight:500;font-size:14px;color:#60a5fa;">Take a breath</div>
            <div style="font-size:13px;color:var(--text-secondary);margin-top:4px;line-height:1.5;">
              You're ${streaks.current} losses in a row. This happens to every trader. Consider stepping away for a bit, reviewing your last few trades for patterns, and coming back with a clear head before your next entry. No revenge trades.
            </div>
          </div>
        </div>
      </div>`;
  }

  const traderCodes = [...new Set(allTrades.map(t => t.trader_code))];
  const { data: traderRows } = await sb.from('traders').select('*');
  const traderMap = {};
  (traderRows || []).forEach(t => traderMap[t.code] = t.nickname);

  let leaderboard = traderCodes.map(code => {
    const s = computeStats(allTrades, code);
    const sk = computeStreaks(allTrades, code);
    const tier = computeTier(allTrades, code);
    return {
      code, nick: traderMap[code] || code,
      winRate: s.winRate, disciplineRate: s.disciplineRate, pnlPct: s.pnlPct, total: s.total,
      blend: Math.round(s.winRate * 0.5 + s.disciplineRate * 0.5),
      streak: sk.current, streakType: sk.currentType, bestStreak: sk.best,
      tier: tier
    };
  }).filter(r => r.total > 0);

  const sortKey = state.sortBy;
  leaderboard.sort((a, b) => {
    if (sortKey === 'win') return b.winRate - a.winRate;
    if (sortKey === 'discipline') return b.disciplineRate - a.disciplineRate;
    if (sortKey === 'pnl') return b.pnlPct - a.pnlPct;
    return b.blend - a.blend;
  });

  app.innerHTML = `
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1.25rem;" class="fade-in">
      <div style="display:flex;align-items:center;gap:10px;">
        <div class="avatar">${getInitials(state.currentNick)}</div>
        <div>
          <div class="brand-mark">CR8 TRADING</div>
          <h2 style="margin-top:2px;">${esc(state.currentNick)} <span style="font-size:13px;color:var(--gold);font-weight:400;">🏅 ${computeBadges(allTrades, state.currentCode).filter(b=>b.unlocked).length}</span></h2>
          <div style="margin-top:4px;display:inline-flex;align-items:center;gap:5px;padding:2px 10px;border-radius:999px;background:${myTier.color}1a;border:1px solid ${myTier.color};">
            <span style="font-size:13px;">${myTier.icon}</span>
            <span style="font-size:12px;font-weight:500;color:${myTier.color};">${myTier.name}</span>
          </div>
          ${myTier.next ? `<div style="font-size:11px;color:var(--text-muted);margin-top:3px;">Next: ${myTier.next.icon} ${myTier.next.name} &middot; needs ${myTier.next.minTrades} trades &amp; ${myTier.next.minScore}+ score</div>` : `<div style="font-size:11px;color:var(--gold);margin-top:3px;">Max tier reached 🏆</div>`}
        </div>
      </div>
      <div style="display:flex;gap:8px;">
        <button id="themeToggle" title="Toggle terminal mode" style="padding:8px 12px;">▣</button>
        <button id="logoutBtn">Log out</button>
      </div>
    </div>
    <div style="display:grid;grid-template-columns:repeat(auto-fit, minmax(140px, 1fr));gap:12px;margin-bottom:1.5rem;" class="fade-in">
      ${metricCard('Trades logged', stats.total)}
      ${metricCard('Win rate', stats.winRate + '%')}
      ${metricCard('Discipline', stats.disciplineRate + '%')}
      ${metricCard('Net gain', (stats.pnlPct >= 0 ? '+' : '') + stats.pnlPct + '%', stats.pnlPct >= 0 ? 'green' : 'red', true)}
    </div>
    <div class="card fade-in" style="margin-bottom:1.25rem;overflow-x:auto;">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;">
        <div style="font-weight:500;font-size:14px;">Institutional Rank</div>
        ${myTier.next
          ? `<div style="font-size:11px;color:var(--text-muted);">${myTier.total}/${myTier.next.minTrades} trades &middot; ${myTier.score}/${myTier.next.minScore} score to ${esc(myTier.next.name)}</div>`
          : `<div style="font-size:11px;color:var(--gold);">Top rank achieved 👑</div>`}
      </div>
      <div class="rank-track" style="min-width:560px;">
        ${TIERS.map((tier, i) => {
          const reached = i <= myTier.currentIndex;
          const isCurrent = i === myTier.currentIndex;
          const connector = i < TIERS.length - 1
            ? `<div class="rank-connector ${i < myTier.currentIndex ? 'filled' : ''}"></div>` : '';
          return `
            <div class="rank-node ${reached ? 'reached' : ''} ${isCurrent ? 'current' : ''}">
              <div class="rank-ico">${tier.icon}</div>
              <div class="rank-name">${esc(tier.name)}</div>
            </div>${connector}`;
        }).join('')}
      </div>
      ${myTier.next ? `
        <div style="margin-top:10px;">
          <div class="prob-meter-track"><div class="prob-meter-fill" style="width:${Math.min(100, Math.round((myTier.total / myTier.next.minTrades) * 100))}%;background:linear-gradient(90deg,#8a6d1f,var(--gold));"></div></div>
          <div style="font-size:11px;color:var(--text-muted);margin-top:4px;text-align:center;">Keep logging quality trades to reach ${myTier.next.icon} ${esc(myTier.next.name)}</div>
        </div>` : ''}
    </div>
    ${drawdownAlert}
    ${assignmentBanner}
    ${announcementBanner}
    ${streakBanner}
    <div class="tab-bar-h" style="display:flex;gap:8px;margin-bottom:1.25rem;border-bottom:0.5px solid var(--border);overflow-x:auto;scrollbar-width:none;-ms-overflow-style:none;">
      <button class="tabbtn ${state.tab==='log'?'active':''}" data-tab="log">➕ Log Trade</button>
      <button class="tabbtn ${state.tab==='watch'?'active':''}" data-tab="watch">👁 Watchlist</button>
      <button class="tabbtn ${state.tab==='mine'?'active':''}" data-tab="mine">📜 Journal</button>
      <button class="tabbtn ${state.tab==='charts'?'active':''}" data-tab="charts">📈 Charts</button>
      <button class="tabbtn ${state.tab==='calc'?'active':''}" data-tab="calc">🧮 Risk</button>
      <button class="tabbtn ${state.tab==='board'?'active':''}" data-tab="board">🏆 Leaderboard</button>
      <button class="tabbtn ${state.tab==='badges'?'active':''}" data-tab="badges">🎖 Badges</button>
      <button class="tabbtn ${state.tab==='bests'?'active':''}" data-tab="bests">⭐ Personal Best</button>
      <button class="tabbtn ${state.tab==='dna'?'active':''}" data-tab="dna">🧬 Trader DNA</button>
    </div>
    <div id="tabContent"></div>
  `;

  document.getElementById('logoutBtn').onclick = () => {
    sessionStorage.removeItem('cr8_code');
    sessionStorage.removeItem('cr8_nick');
    state.currentCode = null;
    stopLiveTicker();
    renderLogin();
  };
  startLiveTicker();
  startMarketClock();
  const themeToggle = document.getElementById('themeToggle');
  if (themeToggle) {
    themeToggle.onclick = () => {
      document.body.classList.toggle('terminal');
      const isTerminal = document.body.classList.contains('terminal');
      localStorage.setItem('cr8_terminal_theme', isTerminal ? '1' : '0');
    };
  }
  const dismissBtn = document.getElementById('dismissAnnouncement');
  if (dismissBtn && latestAnnouncementId) {
    dismissBtn.onclick = () => {
      sessionStorage.setItem('cr8_dismissed_announcement', latestAnnouncementId);
      renderDashboard();
    };
  }
  app.querySelectorAll('.hw-toggle').forEach(b => {
    b.onclick = async () => {
      const newDone = b.dataset.done !== '1';
      await sb.rpc('set_assignment_done', { p_assignment_id: b.dataset.id, p_trader_code: state.currentCode, p_done: newDone });
      renderDashboard();
    };
  });
  const TAB_ORDER = ['log', 'watch', 'mine', 'charts', 'calc', 'board', 'badges', 'bests', 'dna'];
  app.querySelectorAll('.tabbtn').forEach(b => {
    b.onclick = () => {
      const fromIndex = TAB_ORDER.indexOf(state.tab);
      const toIndex = TAB_ORDER.indexOf(b.dataset.tab);
      state.slideDir = toIndex >= fromIndex ? 'right' : 'left';
      state.tab = b.dataset.tab;
      renderDashboard();
    };
  });

  // Build & populate the vertical side navigation
  const SIDE_TABS = [
    { id: 'log', icon: '➕', label: 'Log Trade' },
    { id: 'watch', icon: '👁', label: 'Watchlist' },
    { id: 'mine', icon: '📜', label: 'Journal' },
    { id: 'charts', icon: '📈', label: 'Charts' },
    { id: 'calc', icon: '🧮', label: 'Risk' },
    { id: 'board', icon: '🏆', label: 'Leaderboard' },
    { id: 'badges', icon: '🎖', label: 'Badges' },
    { id: 'bests', icon: '⭐', label: 'Personal Best' },
    { id: 'dna', icon: '🧬', label: 'Trader DNA' }
  ];
  const sideNav = document.getElementById('side-nav');
  if (sideNav) {
    sideNav.innerHTML = `<div class="side-brand">CR8 MENU</div>` + SIDE_TABS.map(t => `
      <button class="side-nav-btn ${state.tab === t.id ? 'active' : ''}" data-tab="${t.id}">
        <span class="ico">${t.icon}</span><span>${t.label}</span>
      </button>`).join('');
    sideNav.querySelectorAll('.side-nav-btn').forEach(b => {
      b.onclick = () => {
        const fromIndex = TAB_ORDER.indexOf(state.tab);
        const toIndex = TAB_ORDER.indexOf(b.dataset.tab);
        state.slideDir = toIndex >= fromIndex ? 'right' : 'left';
        state.tab = b.dataset.tab;
        renderDashboard();
      };
    });
  }

  const content = document.getElementById('tabContent');
  if (state.tab === 'log') renderLogForm(content);
  else if (state.tab === 'watch') renderWatchlist(content);
  else if (state.tab === 'mine') renderMine(content, myTrades);
  else if (state.tab === 'charts') renderCharts(content, myTrades);
  else if (state.tab === 'calc') renderRiskCalc(content);
  else if (state.tab === 'badges') renderBadges(content, allTrades);
  else if (state.tab === 'bests') renderPersonalBests(content, myTrades);
  else if (state.tab === 'dna') renderTraderDNA(content, myTrades, allTrades);
  else renderLeaderboard(content, leaderboard);

  // Apply directional slide to whatever the render function just placed inside
  if (state.slideDir) {
    const inner = content.firstElementChild;
    if (inner) {
      inner.classList.remove('fade-in', 'slide-left', 'slide-right');
      void inner.offsetWidth;
      inner.classList.add(state.slideDir === 'right' ? 'slide-right' : 'slide-left');
    }
    state.slideDir = null;
  }
}

function metricCard(label, value, color, standout) {
  let style = '';
  if (color === 'green') style = 'color:var(--text-success);';
  if (color === 'red') style = 'color:var(--text-danger);';
  const border = standout ? 'border-color:var(--gold);' : '';
  return `<div class="card tilt-card" style="${border}">
    <div style="font-size:13px;color:var(--text-secondary);margin-bottom:4px;">${label}</div>
    <div class="value-pop" style="font-size:24px;font-weight:500;font-family:var(--font-mono);${style}">${value}</div>
  </div>`;
}

async function renderWatchlist(container) {
  container.innerHTML = `<div class="fade-in"><p class="muted">Loading your watchlist…</p></div>`;

  let items = [];
  try {
    const { data } = await sb.from('watchlist').select('*').eq('trader_code', state.currentCode).order('created_at', { ascending: false });
    items = data || [];
  } catch (e) { /* table may not exist yet */ }

  const watching = items.filter(i => i.status === 'watching');
  const resolved = items.filter(i => i.status !== 'watching');

  function itemCard(i) {
    const biasColor = i.bias === 'long' ? 'var(--text-success)' : i.bias === 'short' ? 'var(--text-danger)' : 'var(--text-muted)';
    const statusPill = i.status === 'taken'
      ? `<span class="pill" style="background:var(--bg-success);color:var(--text-success);">✓ Taken</span>`
      : i.status === 'skipped'
      ? `<span class="pill" style="background:var(--surface-2);color:var(--text-muted);">⊘ Skipped</span>`
      : '';
    return `
      <div class="card" style="display:flex;flex-direction:column;gap:8px;">
        <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:8px;">
          <div>
            <div style="font-weight:500;font-size:15px;">${esc(i.instrument || 'Setup')} ${i.bias ? `<span style="font-size:12px;color:${biasColor};text-transform:uppercase;">${esc(i.bias)}</span>` : ''}</div>
            ${i.setup ? `<div style="font-size:12px;color:var(--text-secondary);">${esc(i.setup)}</div>` : ''}
          </div>
          ${statusPill}
        </div>
        ${i.trigger_note ? `<div style="font-size:13px;color:var(--text-secondary);">Waiting for: ${esc(i.trigger_note)}</div>` : ''}
        ${i.status === 'watching' ? `
          <div style="display:flex;gap:8px;margin-top:4px;">
            <button class="wl-status" data-id="${i.id}" data-status="taken" style="flex:1;font-size:12px;">Mark taken</button>
            <button class="wl-status" data-id="${i.id}" data-status="skipped" style="flex:1;font-size:12px;">Skip</button>
          </div>` : `
          <div><button class="wl-status" data-id="${i.id}" data-status="watching" style="font-size:11px;padding:4px 10px;">↩ Back to watching</button></div>`}
      </div>`;
  }

  container.innerHTML = `
    <div class="fade-in" style="display:flex;flex-direction:column;gap:16px;">
      <div class="card">
        <div style="font-weight:500;margin-bottom:4px;">Add a setup to watch</div>
        <div style="font-size:12px;color:var(--text-muted);margin-bottom:12px;">Note a setup before you take it. Patience is the edge.</div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px;">
          <div><label>Instrument</label><input id="wlInstrument" placeholder="EUR/USD" style="width:100%;" /></div>
          <div><label>Bias</label>
            <select id="wlBias" style="width:100%;">
              <option value="long">Long</option>
              <option value="short">Short</option>
            </select>
          </div>
        </div>
        <label>Setup / pattern</label>
        <input id="wlSetup" placeholder="e.g. Fade & break, OB retest" style="width:100%;margin-bottom:10px;" />
        <label>What are you waiting for?</label>
        <input id="wlTrigger" placeholder="e.g. Break of London high + retest" style="width:100%;margin-bottom:12px;" />
        <button id="wlAdd" style="width:100%;">Add to watchlist</button>
        <p id="wlMsg" class="muted" style="font-size:12px;margin-top:8px;"></p>
      </div>

      <div>
        <div style="font-size:13px;color:var(--text-secondary);margin-bottom:8px;">👁 Watching (${watching.length})</div>
        ${watching.length ? `<div style="display:flex;flex-direction:column;gap:10px;">${watching.map(itemCard).join('')}</div>` : `<p class="muted" style="font-size:13px;">Nothing on your watchlist. Add a setup above before you trade it.</p>`}
      </div>

      ${resolved.length ? `
      <div>
        <div style="font-size:13px;color:var(--text-secondary);margin-bottom:8px;">History (${resolved.length})</div>
        <div style="display:flex;flex-direction:column;gap:10px;">${resolved.map(itemCard).join('')}</div>
      </div>` : ''}
    </div>`;

  document.getElementById('wlAdd').onclick = async () => {
    const instrument = document.getElementById('wlInstrument').value.trim();
    const bias = document.getElementById('wlBias').value;
    const setup = document.getElementById('wlSetup').value.trim();
    const trigger = document.getElementById('wlTrigger').value.trim();
    const msg = document.getElementById('wlMsg');
    if (!instrument && !setup) { msg.textContent = 'Add at least an instrument or setup.'; return; }
    msg.textContent = 'Adding…';
    const { error } = await sb.rpc('add_watchlist', {
      p_trader_code: state.currentCode,
      p_instrument: instrument || null,
      p_bias: bias,
      p_setup: setup || null,
      p_trigger_note: trigger || null
    });
    if (error) { msg.textContent = 'Could not add. Try again.'; return; }
    renderWatchlist(container);
  };

  container.querySelectorAll('.wl-status').forEach(b => {
    b.onclick = async () => {
      await sb.rpc('set_watchlist_status', { p_id: b.dataset.id, p_trader_code: state.currentCode, p_status: b.dataset.status });
      renderWatchlist(container);
    };
  });
}

function renderLogForm(container) {
  container.innerHTML = `
    <div class="fade-in" style="max-width:480px;">
      <label>Trade screenshot</label>
      <input type="file" id="imgInput" accept="image/*" style="margin-bottom:8px;" />
      <div id="imgPreviewWrap" style="margin-bottom:12px;"></div>

      <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px;">
        <div><label>Date</label><input type="date" id="dateInput" style="width:100%;" /></div>
        <div><label>Time</label><input type="time" id="timeInput" style="width:100%;" /></div>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px;">
        <div><label>Instrument</label><input id="instrumentInput" placeholder="EUR/USD" style="width:100%;" /></div>
        <div><label>Strategy / setup</label><input id="strategyInput" placeholder="Breakout" style="width:100%;" /></div>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-bottom:12px;">
        <div><label>Outcome</label>
          <select id="resultInput" style="width:100%;"><option value="win">Win</option><option value="loss">Loss</option></select></div>
        <div><label>P&L (%)</label><input type="number" step="0.1" id="pnlInput" placeholder="2.5" style="width:100%;" /></div>
        <div><label>Risk:reward</label><input id="rrInput" placeholder="1:2" style="width:100%;" /></div>
      </div>
      <label>Rules of engagement</label>
      <div style="display:flex;gap:8px;margin-bottom:12px;">
        <button id="disciplinedBtn" style="flex:1;border:2px solid var(--border-accent);">Followed rules</button>
        <button id="emotionalBtn" style="flex:1;">Got emotional</button>
      </div>

      <label>Rule violations</label>
      <div style="font-size:12px;color:var(--text-muted);margin-bottom:8px;">Be honest — check any rules you broke on this trade.</div>
      <div id="violationList">
        <div class="prob-check" data-violation="Entered early"><span class="box">✓</span><span style="font-size:13px;">Entered early</span></div>
        <div class="prob-check" data-violation="Moved stop loss"><span class="box">✓</span><span style="font-size:13px;">Moved stop loss</span></div>
        <div class="prob-check" data-violation="Over leveraged"><span class="box">✓</span><span style="font-size:13px;">Over leveraged</span></div>
        <div class="prob-check" data-violation="Revenge trade"><span class="box">✓</span><span style="font-size:13px;">Revenge trade</span></div>
        <div class="prob-check" data-violation="No clear setup"><span class="box">✓</span><span style="font-size:13px;">No clear setup</span></div>
        <div class="prob-check" data-violation="Ignored higher timeframe"><span class="box">✓</span><span style="font-size:13px;">Ignored higher timeframe</span></div>
      </div>
      <div style="margin-bottom:16px;"></div>

      <label>Setup quality checklist</label>
      <div style="font-size:12px;color:var(--text-muted);margin-bottom:8px;">How well did this setup match your plan? Check what applied.</div>
      <div id="probChecklist">
        <div class="prob-check" data-check><span class="box">✓</span><span style="font-size:13px;">Clear market structure</span></div>
        <div class="prob-check" data-check><span class="box">✓</span><span style="font-size:13px;">Liquidity / key level present</span></div>
        <div class="prob-check" data-check><span class="box">✓</span><span style="font-size:13px;">Volume confirmation</span></div>
        <div class="prob-check" data-check><span class="box">✓</span><span style="font-size:13px;">Higher timeframe aligned</span></div>
        <div class="prob-check" data-check><span class="box">✓</span><span style="font-size:13px;">Risk properly defined</span></div>
      </div>
      <div style="display:flex;justify-content:space-between;align-items:center;margin:10px 0 16px;">
        <span style="font-size:13px;color:var(--text-secondary);">Setup probability</span>
        <span id="probValue" style="font-family:var(--font-mono);font-weight:500;font-size:18px;color:var(--gold);">0%</span>
      </div>
      <div class="prob-meter-track"><div class="prob-meter-fill" id="probFill" style="width:0%;"></div></div>

      <label style="margin-top:16px;">Execution self-rating</label>
      <div style="font-size:12px;color:var(--text-muted);margin-bottom:10px;">Rate how well you executed — honestly, regardless of profit.</div>
      <div style="margin-bottom:12px;">
        <div style="display:flex;justify-content:space-between;font-size:13px;margin-bottom:4px;">
          <span>Patience (waited for your setup)</span>
          <span id="patienceVal" style="font-family:var(--font-mono);color:var(--gold);">75</span>
        </div>
        <input type="range" id="patienceSlider" min="0" max="100" value="75" style="width:100%;accent-color:var(--gold);" />
      </div>
      <div style="margin-bottom:16px;">
        <div style="display:flex;justify-content:space-between;font-size:13px;margin-bottom:4px;">
          <span>Exit (closed per your plan)</span>
          <span id="exitVal" style="font-family:var(--font-mono);color:var(--gold);">75</span>
        </div>
        <input type="range" id="exitSlider" min="0" max="100" value="75" style="width:100%;accent-color:var(--gold);" />
      </div>

      <label style="margin-top:16px;">Trade Story</label>
      <div style="font-size:12px;color:var(--text-muted);margin-bottom:10px;">Turn this trade into a case study you can learn from later.</div>

      <label style="font-size:12px;">Why did you enter?</label>
      <textarea id="storyWhy" rows="2" placeholder="What made this a trade worth taking?" style="width:100%;margin-bottom:10px;"></textarea>

      <label style="font-size:12px;">What were you feeling?</label>
      <textarea id="storyFeeling" rows="2" placeholder="Calm? Anxious? Confident? FOMO?" style="width:100%;margin-bottom:10px;"></textarea>

      <label style="font-size:12px;">Would you take this trade again?</label>
      <div style="display:flex;gap:8px;margin-bottom:10px;">
        <button type="button" id="againYes" class="story-again-btn" data-again="Yes" style="flex:1;">Yes</button>
        <button type="button" id="againNo" class="story-again-btn" data-again="No" style="flex:1;">No</button>
        <button type="button" id="againMaybe" class="story-again-btn" data-again="With changes" style="flex:1;">With changes</button>
      </div>

      <label style="font-size:12px;">Lessons learned</label>
      <textarea id="storyLesson" rows="2" placeholder="What will you carry into your next trade?" style="width:100%;margin-bottom:16px;"></textarea>

      <button id="submitTrade" style="width:100%;">Log trade</button>
      <p id="submitMsg" class="muted" style="font-size:12px;margin-top:8px;"></p>
    </div>`;

  document.getElementById('dateInput').value = new Date().toISOString().slice(0,10);
  state.emotionalVal = false;
  state.imgFile = null;

  const disciplinedBtn = document.getElementById('disciplinedBtn');
  const emotionalBtn = document.getElementById('emotionalBtn');
  function setEmotional(v) {
    state.emotionalVal = v;
    disciplinedBtn.style.border = v ? '0.5px solid var(--border-strong)' : '2px solid var(--border-accent)';
    emotionalBtn.style.border = v ? '2px solid var(--border-accent)' : '0.5px solid var(--border-strong)';
  }
  disciplinedBtn.onclick = () => setEmotional(false);
  emotionalBtn.onclick = () => setEmotional(true);

  // Probability meter checklist
  state.setupScore = 0;
  state.violations = [];
  const violationChecks = container.querySelectorAll('[data-violation]');
  violationChecks.forEach(v => {
    v.onclick = () => {
      v.classList.toggle('checked');
      const rule = v.dataset.violation;
      if (v.classList.contains('checked')) {
        if (!state.violations.includes(rule)) state.violations.push(rule);
      } else {
        state.violations = state.violations.filter(r => r !== rule);
      }
    };
  });
  const checks = container.querySelectorAll('[data-check]');
  function updateProb() {
    const checked = container.querySelectorAll('[data-check].checked').length;
    const pct = Math.round((checked / checks.length) * 100);
    state.setupScore = pct;
    document.getElementById('probValue').textContent = pct + '%';
    document.getElementById('probFill').style.width = pct + '%';
  }
  checks.forEach(c => {
    c.onclick = () => { c.classList.toggle('checked'); updateProb(); };
  });

  // Execution self-rating sliders
  state.qPatience = 75;
  state.qExit = 75;
  const patienceSlider = document.getElementById('patienceSlider');
  const exitSlider = document.getElementById('exitSlider');
  if (patienceSlider) {
    patienceSlider.oninput = () => {
      state.qPatience = parseInt(patienceSlider.value, 10);
      document.getElementById('patienceVal').textContent = state.qPatience;
    };
  }
  if (exitSlider) {
    exitSlider.oninput = () => {
      state.qExit = parseInt(exitSlider.value, 10);
      document.getElementById('exitVal').textContent = state.qExit;
    };
  }

  // Trade story "would you take again" selector
  state.storyAgain = null;
  const againBtns = container.querySelectorAll('.story-again-btn');
  againBtns.forEach(b => {
    b.onclick = () => {
      againBtns.forEach(x => x.style.border = '0.5px solid var(--border-strong)');
      b.style.border = '2px solid var(--border-accent)';
      state.storyAgain = b.dataset.again;
    };
  });

  document.getElementById('imgInput').onchange = (e) => {
    const f = e.target.files[0];
    if (!f) return;
    state.imgFile = f;
    const reader = new FileReader();
    reader.onload = (ev) => {
      document.getElementById('imgPreviewWrap').innerHTML =
        `<img src="${ev.target.result}" style="max-width:100%;border-radius:var(--radius);border:0.5px solid var(--border);" />`;
    };
    reader.readAsDataURL(f);
  };

  document.getElementById('submitTrade').onclick = async () => {
    const msg = document.getElementById('submitMsg');
    msg.textContent = 'Saving…';

    let screenshotUrl = null;
    if (state.imgFile) {
      const fileExt = state.imgFile.name.split('.').pop();
      const filePath = `${state.currentCode}/${Date.now()}.${fileExt}`;
      const { error: uploadErr } = await sb.storage.from('trade-screenshots').upload(filePath, state.imgFile);
      if (uploadErr) { msg.textContent = 'Could not upload screenshot. Trade not saved.'; return; }
      const { data: urlData } = sb.storage.from('trade-screenshots').getPublicUrl(filePath);
      screenshotUrl = urlData.publicUrl;
    }

    const payload = {
      trader_code: state.currentCode,
      trade_date: document.getElementById('dateInput').value,
      trade_time: document.getElementById('timeInput').value || '00:00',
      instrument: document.getElementById('instrumentInput').value || null,
      strategy: document.getElementById('strategyInput').value || null,
      risk_reward: document.getElementById('rrInput').value || null,
      result: document.getElementById('resultInput').value,
      pnl_pct: parseFloat(document.getElementById('pnlInput').value || '0'),
      emotional: state.emotionalVal,
      notes: document.getElementById('storyWhy').value || null,
      story_why: document.getElementById('storyWhy').value || null,
      story_feeling: document.getElementById('storyFeeling').value || null,
      story_again: state.storyAgain || null,
      story_lesson: document.getElementById('storyLesson').value || null,
      screenshot_url: screenshotUrl,
      setup_score: state.setupScore != null ? state.setupScore : null,
      rule_violations: state.violations || [],
      q_patience: state.qPatience != null ? state.qPatience : null,
      q_exit: state.qExit != null ? state.qExit : null
    };

    const { error: insertErr } = await sb.from('trades').insert(payload);
    if (insertErr) { msg.textContent = 'Could not save trade. Try again.'; console.error(insertErr); return; }

    if (payload.result === 'win') playWinChime();

    state.tab = 'mine';
    renderDashboard();
  };
}

function renderMine(container, trades) {
  if (trades.length === 0) {
    container.innerHTML = `<div class="fade-in"><p class="muted">Your edge starts with trade one. Log it to begin tracking your progress.</p></div>`;
    return;
  }
  container.innerHTML = `<div class="fade-in" style="display:flex;flex-direction:column;gap:10px;">` +
    trades.map((t, idx) => `
      <div class="card trade-card" data-trade-idx="${idx}" style="display:flex;gap:12px;align-items:flex-start;cursor:pointer;">
        ${t.screenshot_url
          ? `<img src="${t.screenshot_url}" style="width:64px;height:64px;object-fit:cover;border-radius:var(--radius);flex-shrink:0;" />`
          : `<div style="width:64px;height:64px;border-radius:var(--radius);background:var(--surface-2);flex-shrink:0;display:flex;align-items:center;justify-content:center;color:var(--text-muted);font-size:20px;">📷</div>`}
        <div style="flex:1;min-width:0;">
          <div style="display:flex;justify-content:space-between;gap:8px;">
            <span style="font-family:var(--font-mono);font-size:13px;">${t.trade_date} ${t.trade_time} &middot; ${esc(t.instrument || '-')}</span>
            <span style="font-family:var(--font-mono);font-weight:500;color:${t.pnl_pct >= 0 ? 'var(--text-success)' : 'var(--text-danger)'};">${t.pnl_pct >= 0 ? '+' : ''}${t.pnl_pct}%</span>
          </div>
          <div style="display:flex;gap:6px;margin:4px 0;flex-wrap:wrap;">
            <span class="pill" style="background:${t.result==='win'?'var(--bg-success)':'var(--bg-danger)'};color:${t.result==='win'?'var(--text-success)':'var(--text-danger)'};">${t.result}</span>
            <span class="pill">${t.emotional ? 'Emotional' : 'Disciplined'}</span>
            <span class="pill">${esc(t.strategy || '-')}</span>
            <span class="pill">RR ${esc(t.risk_reward || '-')}</span>
            ${t.reviewed ? `<span class="pill" style="background:rgba(212,175,55,0.15);color:var(--gold);">✓ Reviewed</span>` : ''}
          </div>
          ${t.notes ? `<div style="font-size:13px;color:var(--text-secondary);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${esc(t.notes)}</div>` : ''}
        </div>
      </div>`).join('') +
    `</div>`;

  container.querySelectorAll('.trade-card').forEach(card => {
    card.onclick = () => {
      const idx = parseInt(card.dataset.tradeIdx, 10);
      openTradeDetail(trades[idx]);
    };
  });
}

function openTradeDetail(t) {
  const overlay = document.createElement('div');
  overlay.id = 'trade-detail-overlay';
  overlay.style.cssText = 'position:fixed;inset:0;z-index:300;background:rgba(0,0,0,0.85);display:flex;align-items:center;justify-content:center;padding:20px;animation:fadeIn 0.25s ease-out;';

  const resultColor = t.result === 'win' ? 'var(--text-success)' : 'var(--text-danger)';
  const q = computeTradeQuality(t);
  const qColor = q.overall >= 80 ? 'var(--text-success)' : q.overall >= 60 ? '#fbbf24' : 'var(--text-danger)';
  function qBar(label, val) {
    const c = val >= 80 ? 'var(--text-success)' : val >= 60 ? '#fbbf24' : 'var(--text-danger)';
    return `<div>
      <div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:3px;">
        <span style="color:var(--text-secondary);">${label}</span>
        <span style="font-family:var(--font-mono);color:${c};">${val}</span>
      </div>
      <div style="height:6px;background:var(--surface-2);border-radius:3px;overflow:hidden;">
        <div style="height:100%;width:${val}%;background:${c};border-radius:3px;"></div>
      </div>
    </div>`;
  }
  const qualityHtml = `
    ${t.reviewed ? `<div class="card" style="background:rgba(212,175,55,0.1);border-color:var(--gold);margin-bottom:16px;display:flex;align-items:center;gap:8px;"><span style="font-size:18px;">✓</span><span style="font-size:13px;color:var(--gold);font-weight:500;">Reviewed by your mentor</span></div>` : ''}
    <div class="card" style="background:linear-gradient(135deg, rgba(212,175,55,0.08), var(--surface-2));border-color:${qColor};margin-bottom:16px;">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;">
        <div style="font-weight:500;">Trade Quality Score</div>
        <div style="font-family:var(--font-mono);font-weight:500;font-size:26px;color:${qColor};">${q.overall}<span style="font-size:14px;color:var(--text-muted);">/100</span></div>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">
        ${qBar('Entry', q.entry)}
        ${qBar('Risk Management', q.risk)}
        ${qBar('Patience', q.patience)}
        ${qBar('Exit', q.exit)}
      </div>
      <div style="font-size:11px;color:var(--text-muted);margin-top:10px;">Execution quality — independent of profit. A losing trade can still score high.</div>
    </div>`;
  overlay.innerHTML = `
    <div class="card" style="max-width:560px;width:100%;max-height:90vh;overflow-y:auto;animation:tierPop 0.4s cubic-bezier(0.34,1.56,0.64,1);">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:14px;">
        <div>
          <div class="brand-mark">TRADE DETAIL</div>
          <h2 style="margin-top:2px;font-size:20px;">${esc(t.instrument || 'Trade')}</h2>
          <div style="font-family:var(--font-mono);font-size:12px;color:var(--text-muted);margin-top:2px;">${t.trade_date} &middot; ${t.trade_time}</div>
        </div>
        <button id="closeTradeDetail" style="padding:6px 12px;">✕</button>
      </div>

      ${t.screenshot_url
        ? `<img src="${t.screenshot_url}" style="width:100%;border-radius:var(--radius);border:0.5px solid var(--border);margin-bottom:16px;" />`
        : `<div style="width:100%;height:120px;border-radius:var(--radius);background:var(--surface-2);display:flex;align-items:center;justify-content:center;color:var(--text-muted);margin-bottom:16px;">No screenshot uploaded</div>`}

      ${qualityHtml}

      <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px;">
        <div class="card" style="background:var(--surface-2);">
          <div style="font-size:11px;color:var(--text-muted);">Outcome</div>
          <div style="font-weight:500;color:${resultColor};text-transform:uppercase;">${t.result}</div>
        </div>
        <div class="card" style="background:var(--surface-2);">
          <div style="font-size:11px;color:var(--text-muted);">P&L</div>
          <div style="font-family:var(--font-mono);font-weight:500;color:${t.pnl_pct >= 0 ? 'var(--text-success)' : 'var(--text-danger)'};">${t.pnl_pct >= 0 ? '+' : ''}${t.pnl_pct}%</div>
        </div>
        <div class="card" style="background:var(--surface-2);">
          <div style="font-size:11px;color:var(--text-muted);">Strategy</div>
          <div style="font-weight:500;">${esc(t.strategy || '—')}</div>
        </div>
        <div class="card" style="background:var(--surface-2);">
          <div style="font-size:11px;color:var(--text-muted);">Risk : Reward</div>
          <div style="font-family:var(--font-mono);font-weight:500;">${esc(t.risk_reward || '—')}</div>
        </div>
        <div class="card" style="background:var(--surface-2);">
          <div style="font-size:11px;color:var(--text-muted);">Discipline</div>
          <div style="font-weight:500;">${t.emotional ? 'Got emotional' : 'Followed rules'}</div>
        </div>
        <div class="card" style="background:var(--surface-2);">
          <div style="font-size:11px;color:var(--text-muted);">Instrument</div>
          <div style="font-weight:500;">${esc(t.instrument || '—')}</div>
        </div>
        ${t.setup_score != null ? `
        <div class="card" style="background:var(--surface-2);">
          <div style="font-size:11px;color:var(--text-muted);">Setup Quality</div>
          <div style="font-family:var(--font-mono);font-weight:500;color:${t.setup_score >= 60 ? 'var(--text-success)' : t.setup_score >= 40 ? '#fbbf24' : 'var(--text-danger)'};">${t.setup_score}%</div>
        </div>` : ''}
      </div>

      ${(t.story_why || t.story_feeling || t.story_again || t.story_lesson || t.notes) ? `
        <div style="margin-bottom:4px;">
          <div style="font-size:12px;color:var(--gold);font-weight:500;margin-bottom:8px;">📖 TRADE STORY</div>
          ${t.story_why ? `
            <div style="margin-bottom:10px;">
              <div style="font-size:12px;color:var(--text-muted);margin-bottom:2px;">Why did you enter?</div>
              <div style="font-size:14px;color:var(--text-primary);line-height:1.5;">${esc(t.story_why)}</div>
            </div>` : (t.notes && !t.story_why ? `
            <div style="margin-bottom:10px;">
              <div style="font-size:12px;color:var(--text-muted);margin-bottom:2px;">Notes</div>
              <div style="font-size:14px;color:var(--text-primary);line-height:1.5;">${esc(t.notes)}</div>
            </div>` : '')}
          ${t.story_feeling ? `
            <div style="margin-bottom:10px;">
              <div style="font-size:12px;color:var(--text-muted);margin-bottom:2px;">What were you feeling?</div>
              <div style="font-size:14px;color:var(--text-primary);line-height:1.5;">${esc(t.story_feeling)}</div>
            </div>` : ''}
          ${t.story_again ? `
            <div style="margin-bottom:10px;">
              <div style="font-size:12px;color:var(--text-muted);margin-bottom:2px;">Would you take this trade again?</div>
              <span class="pill" style="background:${t.story_again === 'Yes' ? 'var(--bg-success)' : t.story_again === 'No' ? 'var(--bg-danger)' : 'rgba(251,191,36,0.12)'};color:${t.story_again === 'Yes' ? 'var(--text-success)' : t.story_again === 'No' ? 'var(--text-danger)' : '#fbbf24'};">${esc(t.story_again)}</span>
            </div>` : ''}
          ${t.story_lesson ? `
            <div style="margin-bottom:10px;">
              <div style="font-size:12px;color:var(--text-muted);margin-bottom:2px;">Lessons learned</div>
              <div style="font-size:14px;color:var(--text-primary);line-height:1.5;background:var(--surface-2);padding:10px;border-radius:var(--radius);border-left:2px solid var(--gold);">${esc(t.story_lesson)}</div>
            </div>` : ''}
        </div>` : ''}
      ${(t.rule_violations && t.rule_violations.length) ? `
        <div style="margin-top:16px;">
          <div style="font-size:12px;color:var(--text-secondary);margin-bottom:6px;">Rule violations</div>
          <div style="display:flex;gap:6px;flex-wrap:wrap;">
            ${t.rule_violations.map(v => `<span class="pill" style="background:var(--bg-danger);color:var(--text-danger);">⚠ ${esc(v)}</span>`).join('')}
          </div>
        </div>` : ''}
    </div>`;

  document.body.appendChild(overlay);
  const close = () => overlay.remove();
  document.getElementById('closeTradeDetail').onclick = close;
  overlay.addEventListener('click', (e) => { if (e.target === overlay) close(); });
  // Allow Escape key to close
  const escHandler = (e) => { if (e.key === 'Escape') { close(); document.removeEventListener('keydown', escHandler); } };
  document.addEventListener('keydown', escHandler);
}

function renderRiskCalc(container) {
  container.innerHTML = `
    <div class="fade-in" style="max-width:480px;">
      <p class="muted" style="font-size:13px;margin-bottom:16px;">Calculate the right position size for your next trade based on how much you're willing to risk.</p>

      <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px;">
        <div><label>Account size ($)</label><input type="number" id="calcAccount" placeholder="1000" style="width:100%;" /></div>
        <div><label>Risk per trade (%)</label><input type="number" step="0.1" id="calcRiskPct" placeholder="1" style="width:100%;" /></div>
      </div>

      <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px;">
        <div><label>Entry price</label><input type="number" step="any" id="calcEntry" placeholder="1.0850" style="width:100%;" /></div>
        <div><label>Stop loss price</label><input type="number" step="any" id="calcStop" placeholder="1.0800" style="width:100%;" /></div>
      </div>

      <div style="margin-bottom:16px;">
        <label>Instrument type</label>
        <select id="calcType" style="width:100%;">
          <option value="forex">Forex (standard lot = 100,000 units)</option>
          <option value="crypto">Crypto / Stocks (units/shares)</option>
        </select>
      </div>

      <button id="calcBtn" style="width:100%;">Calculate position size</button>

      <div id="calcResult" style="margin-top:16px;"></div>
    </div>`;

  document.getElementById('calcBtn').onclick = () => {
    const account = parseFloat(document.getElementById('calcAccount').value);
    const riskPct = parseFloat(document.getElementById('calcRiskPct').value);
    const entry = parseFloat(document.getElementById('calcEntry').value);
    const stop = parseFloat(document.getElementById('calcStop').value);
    const type = document.getElementById('calcType').value;
    const resultEl = document.getElementById('calcResult');

    if (!account || !riskPct || !entry || !stop || entry === stop) {
      resultEl.innerHTML = `<p class="muted" style="font-size:13px;">Fill in all fields. Entry and stop loss must be different prices.</p>`;
      return;
    }

    const riskAmount = account * (riskPct / 100);
    const priceDistance = Math.abs(entry - stop);
    const riskPerUnit = priceDistance;
    const positionSize = riskAmount / riskPerUnit;

    let sizeLabel, sizeValue;
    if (type === 'forex') {
      const lots = positionSize / 100000;
      sizeLabel = 'Position size';
      sizeValue = `${lots.toFixed(2)} lots <span style="color:var(--text-muted);font-size:12px;">(${Math.round(positionSize).toLocaleString()} units)</span>`;
    } else {
      sizeLabel = 'Position size';
      sizeValue = `${positionSize.toFixed(4)} units/shares`;
    }

    resultEl.innerHTML = `
      <div class="card fade-in" style="border-color:var(--gold);">
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;">
          <div>
            <div style="font-size:12px;color:var(--text-muted);">Risk amount</div>
            <div style="font-family:var(--font-mono);font-weight:500;font-size:18px;color:var(--text-danger);">$${riskAmount.toFixed(2)}</div>
          </div>
          <div>
            <div style="font-size:12px;color:var(--text-muted);">${sizeLabel}</div>
            <div style="font-family:var(--font-mono);font-weight:500;font-size:18px;color:var(--gold);">${sizeValue}</div>
          </div>
        </div>
        <div style="margin-top:12px;font-size:12px;color:var(--text-muted);">
          You're risking ${riskPct}% of your $${account.toLocaleString()} account ($${riskAmount.toFixed(2)}) with a ${priceDistance.toFixed(5)} price distance to your stop loss.
        </div>
      </div>`;
  };
}

function renderCharts(container, trades) {
  if (trades.length < 2) {
    container.innerHTML = `<div class="fade-in"><p class="muted">Log at least 2 trades to see your charts.</p></div>`;
    return;
  }

  // Sort oldest to newest
  const sorted = [...trades].sort((a, b) =>
    (a.trade_date + a.trade_time).localeCompare(b.trade_date + b.trade_time));

  // Equity curve — cumulative P&L %
  let running = 0;
  const equityLabels = [];
  const equityData = [];
  sorted.forEach((t, i) => {
    running += Number(t.pnl_pct);
    equityLabels.push(`#${i + 1}`);
    equityData.push(Math.round(running * 100) / 100);
  });

  // Rolling 5-trade win rate
  const winRateLabels = [];
  const winRateData = [];
  for (let i = 4; i < sorted.length; i++) {
    const window = sorted.slice(i - 4, i + 1);
    const wr = Math.round((window.filter(t => t.result === 'win').length / 5) * 100);
    winRateLabels.push(`#${i + 1}`);
    winRateData.push(wr);
  }

  // Discipline trend — rolling 5-trade discipline rate
  const discLabels = [];
  const discData = [];
  for (let i = 4; i < sorted.length; i++) {
    const window = sorted.slice(i - 4, i + 1);
    const dr = Math.round((window.filter(t => !t.emotional).length / 5) * 100);
    discLabels.push(`#${i + 1}`);
    discData.push(dr);
  }

  const isPositive = equityData[equityData.length - 1] >= 0;

  // Day-of-week consistency heatmap
  const dayNames = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];
  const byDayOfWeek = { 0: [], 1: [], 2: [], 3: [], 4: [], 5: [], 6: [] };
  trades.forEach(t => {
    const d = new Date(t.trade_date + 'T00:00:00');
    byDayOfWeek[d.getDay()].push(t);
  });
  // Trading days Mon-Fri for forex focus, but show any day with trades
  const weekdayRows = [1, 2, 3, 4, 5].map(dow => {
    const dayTrades = byDayOfWeek[dow];
    const dots = dayTrades.map(t => t.result === 'win' ? '🟢' : '🔴').join('');
    const wins = dayTrades.filter(t => t.result === 'win').length;
    const wr = dayTrades.length ? Math.round((wins / dayTrades.length) * 100) : 0;
    return { name: dayNames[dow], dots: dots || '—', count: dayTrades.length, winRate: wr };
  });

  // Best trading hours — group by session based on trade_time (local clock the trader logged)
  function sessionForHour(h) {
    if (h >= 0 && h < 9) return 'Asian';
    if (h >= 7 && h < 12) return 'London';
    if (h >= 12 && h < 16) return 'London/NY';
    if (h >= 16 && h < 21) return 'NY Open';
    return 'Off-hours';
  }
  const sessionStats = {};
  trades.forEach(t => {
    const hour = parseInt(String(t.trade_time || '0').split(':')[0], 10);
    if (isNaN(hour)) return;
    const session = sessionForHour(hour);
    if (!sessionStats[session]) sessionStats[session] = { wins: 0, total: 0 };
    sessionStats[session].total++;
    if (t.result === 'win') sessionStats[session].wins++;
  });
  const sessionRows = Object.entries(sessionStats)
    .map(([name, s]) => ({ name, winRate: Math.round((s.wins / s.total) * 100), count: s.total }))
    .sort((a, b) => b.winRate - a.winRate);

  // Rule violation frequency
  const violationCounts = {};
  trades.forEach(t => {
    (t.rule_violations || []).forEach(v => {
      violationCounts[v] = (violationCounts[v] || 0) + 1;
    });
  });
  const violationRows = Object.entries(violationCounts)
    .map(([name, count]) => ({ name, count, pct: Math.round((count / trades.length) * 100) }))
    .sort((a, b) => b.count - a.count);
  const totalViolations = Object.values(violationCounts).reduce((a, b) => a + b, 0);

  // ===== Emotion Analytics =====
  // Detects emotional keywords from the Trade Story "feeling" field + the
  // discipline flag, and correlates each emotion with win rate / avg P&L.
  const EMOTION_MAP = [
    { key: 'confident', label: 'Confident', icon: '😎', words: ['confident', 'calm', 'sure', 'clear', 'patient', 'focused', 'disciplined'] },
    { key: 'fomo', label: 'FOMO / Rushed', icon: '😰', words: ['fomo', 'rush', 'rushed', 'chase', 'chasing', 'hurry', 'impatient', 'missed'] },
    { key: 'anxious', label: 'Anxious / Fearful', icon: '😬', words: ['anxious', 'nervous', 'fear', 'fearful', 'scared', 'worried', 'unsure', 'hesitant', 'doubt'] },
    { key: 'greedy', label: 'Greedy', icon: '🤑', words: ['greedy', 'greed', 'overconfident', 'cocky', 'euphoric'] },
    { key: 'revenge', label: 'Angry / Revenge', icon: '😡', words: ['revenge', 'angry', 'frustrated', 'tilt', 'tilted', 'mad', 'emotional'] },
    { key: 'bored', label: 'Bored / Forcing', icon: '😴', words: ['bored', 'boredom', 'forced', 'forcing', 'nothing'] }
  ];
  const emotionStats = {};
  trades.forEach(t => {
    const feel = String(t.story_feeling || '').toLowerCase();
    if (!feel) return;
    EMOTION_MAP.forEach(em => {
      if (em.words.some(w => feel.includes(w))) {
        if (!emotionStats[em.key]) emotionStats[em.key] = { label: em.label, icon: em.icon, trades: 0, wins: 0, pnl: 0 };
        emotionStats[em.key].trades++;
        if (t.result === 'win') emotionStats[em.key].wins++;
        emotionStats[em.key].pnl += Number(t.pnl_pct) || 0;
      }
    });
  });
  const emotionRows = Object.values(emotionStats)
    .map(e => ({ ...e, winRate: Math.round((e.wins / e.trades) * 100), avgPnl: Math.round((e.pnl / e.trades) * 10) / 10 }))
    .sort((a, b) => b.winRate - a.winRate);
  const feelingsLogged = trades.filter(t => t.story_feeling).length;

  // Disciplined vs emotional comparison (from the rules toggle)
  const discT = trades.filter(t => !t.emotional);
  const emoT = trades.filter(t => t.emotional);
  const discWin = discT.length ? Math.round((discT.filter(t => t.result === 'win').length / discT.length) * 100) : null;
  const emoWin = emoT.length ? Math.round((emoT.filter(t => t.result === 'win').length / emoT.length) * 100) : null;
  const discAvg = discT.length ? Math.round((discT.reduce((a, t) => a + (Number(t.pnl_pct) || 0), 0) / discT.length) * 10) / 10 : null;
  const emoAvg = emoT.length ? Math.round((emoT.reduce((a, t) => a + (Number(t.pnl_pct) || 0), 0) / emoT.length) * 10) / 10 : null;

  // ===== Profit by Strategy =====
  const stratGroups = {};
  trades.forEach(t => {
    const name = (t.strategy || 'Unspecified').trim() || 'Unspecified';
    if (!stratGroups[name]) stratGroups[name] = { trades: 0, wins: 0, pnl: 0 };
    stratGroups[name].trades++;
    if (t.result === 'win') stratGroups[name].wins++;
    stratGroups[name].pnl += Number(t.pnl_pct) || 0;
  });
  const stratRows = Object.entries(stratGroups)
    .map(([name, s]) => ({
      name,
      trades: s.trades,
      winRate: Math.round((s.wins / s.trades) * 100),
      pnl: Math.round(s.pnl * 10) / 10,
      avgPnl: Math.round((s.pnl / s.trades) * 10) / 10
    }))
    .sort((a, b) => b.pnl - a.pnl);
  const maxAbsPnl = Math.max(1, ...stratRows.map(s => Math.abs(s.pnl)));

  // ===== Hidden Edge Detector =====
  // Finds conditions where the trader's win rate beats their baseline by a meaningful margin.
  const baseWins = trades.filter(t => t.result === 'win').length;
  const baseWinRate = trades.length ? (baseWins / trades.length) * 100 : 0;
  const MIN_SAMPLE = 4;        // need at least this many trades in a bucket
  const EDGE_MARGIN = 12;      // must beat baseline by at least this many points

  function sessionForHourEdge(h) {
    if (h >= 0 && h < 9) return 'Asian session';
    if (h >= 7 && h < 12) return 'London session';
    if (h >= 12 && h < 16) return 'London/NY overlap';
    if (h >= 16 && h < 21) return 'NY session';
    return 'Off-hours';
  }
  const dayNamesEdge = ['Sunday', 'Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday'];

  // Build candidate buckets across multiple dimensions
  const buckets = {}; // key -> { label, dimension, trades: [] }
  function addToBucket(key, label, dimension, t) {
    if (!buckets[key]) buckets[key] = { label, dimension, wins: 0, total: 0 };
    buckets[key].total++;
    if (t.result === 'win') buckets[key].wins++;
  }

  trades.forEach(t => {
    if (t.instrument) addToBucket('inst:' + t.instrument.toUpperCase(), `Trading ${t.instrument.toUpperCase()}`, 'Instrument', t);
    if (t.strategy) addToBucket('strat:' + t.strategy.toUpperCase(), `${t.strategy} setups`, 'Strategy', t);
    const hour = parseInt(String(t.trade_time || '').split(':')[0], 10);
    if (!isNaN(hour)) { const s = sessionForHourEdge(hour); addToBucket('sess:' + s, s, 'Session', t); }
    const d = new Date(t.trade_date + 'T00:00:00');
    if (!isNaN(d)) { const dn = dayNamesEdge[d.getDay()]; addToBucket('day:' + dn, `On ${dn}s`, 'Day', t); }
    // Risk:reward bracket
    const m = String(t.risk_reward || '').match(/^(\d+(?:\.\d+)?)\s*:\s*(\d+(?:\.\d+)?)$/);
    if (m) {
      const ratio = parseFloat(m[2]) / parseFloat(m[1]);
      if (ratio >= 2.5) addToBucket('rr:high', 'RR above 2.5', 'Risk:Reward', t);
      else if (ratio >= 1.5) addToBucket('rr:mid', 'RR 1.5 to 2.5', 'Risk:Reward', t);
    }
    // Discipline
    if (!t.emotional) addToBucket('disc:yes', 'When following your rules', 'Discipline', t);
  });

  const edges = Object.values(buckets)
    .map(b => ({ ...b, winRate: Math.round((b.wins / b.total) * 100) }))
    .filter(b => b.total >= MIN_SAMPLE && (b.winRate - baseWinRate) >= EDGE_MARGIN)
    .sort((a, b) => b.winRate - a.winRate)
    .slice(0, 6);

  // Also find a "leak" — the condition where they perform worst
  const leaks = Object.values(buckets)
    .map(b => ({ ...b, winRate: Math.round((b.wins / b.total) * 100) }))
    .filter(b => b.total >= MIN_SAMPLE && (baseWinRate - b.winRate) >= EDGE_MARGIN)
    .sort((a, b) => a.winRate - b.winRate)
    .slice(0, 3);

  // Build trade calendar heatmap — last 12 weeks, GitHub-style
  const byDate = {};
  trades.forEach(t => {
    if (!byDate[t.trade_date]) byDate[t.trade_date] = { wins: 0, losses: 0, pnl: 0 };
    if (t.result === 'win') byDate[t.trade_date].wins++; else byDate[t.trade_date].losses++;
    byDate[t.trade_date].pnl += Number(t.pnl_pct);
  });

  const todayDate = new Date();
  const weeksToShow = 12;
  const totalDays = weeksToShow * 7;
  const startDate = new Date(todayDate);
  startDate.setDate(startDate.getDate() - totalDays + 1);
  // Align start to a Sunday so columns line up as full weeks
  startDate.setDate(startDate.getDate() - startDate.getDay());

  const dayCells = [];
  const cursor = new Date(startDate);
  while (cursor <= todayDate) {
    const iso = cursor.toISOString().slice(0, 10);
    const day = byDate[iso];
    let bucket = 'none';
    if (day) {
      const total = day.wins + day.losses;
      const winRate = total ? day.wins / total : 0;
      if (winRate >= 0.7) bucket = 'great';
      else if (winRate >= 0.4) bucket = 'mixed';
      else bucket = 'rough';
    }
    dayCells.push({ date: new Date(cursor), iso, day, bucket });
    cursor.setDate(cursor.getDate() + 1);
  }

  const heatColors = {
    none: 'rgba(255,255,255,0.05)',
    great: '#4ade80',
    mixed: '#fbbf24',
    rough: '#f87171'
  };

  // Group into week columns
  const weekCols = [];
  for (let i = 0; i < dayCells.length; i += 7) weekCols.push(dayCells.slice(i, i + 7));

  const monthLabels = [];
  weekCols.forEach((week, i) => {
    const firstOfMonth = week.find(d => d.date.getDate() <= 7);
    monthLabels.push(firstOfMonth ? firstOfMonth.date.toLocaleString('default', { month: 'short' }) : '');
  });

  const heatmapHTML = `
    <div class="card">
      <div style="font-weight:500;margin-bottom:4px;">Trade Calendar</div>
      <div style="font-size:12px;color:var(--text-muted);margin-bottom:14px;">Last 12 weeks &middot; green = strong day, yellow = mixed, red = rough day</div>
      <div style="overflow-x:auto;">
        <div style="display:inline-flex;gap:3px;">
          ${weekCols.map((week, wi) => `
            <div style="display:flex;flex-direction:column;gap:3px;">
              ${week.map(d => `
                <div title="${d.iso}${d.day ? ` — ${d.day.wins}W/${d.day.losses}L, ${d.day.pnl >= 0 ? '+' : ''}${Math.round(d.day.pnl*10)/10}%` : ' — no trades'}"
                  style="width:13px;height:13px;border-radius:3px;background:${heatColors[d.bucket]};${d.date > todayDate ? 'opacity:0;' : ''}"></div>
              `).join('')}
            </div>`).join('')}
        </div>
      </div>
      <div style="display:flex;gap:14px;margin-top:10px;font-size:11px;color:var(--text-muted);">
        <span><span style="display:inline-block;width:9px;height:9px;border-radius:2px;background:${heatColors.great};margin-right:4px;"></span>Strong day</span>
        <span><span style="display:inline-block;width:9px;height:9px;border-radius:2px;background:${heatColors.mixed};margin-right:4px;"></span>Mixed</span>
        <span><span style="display:inline-block;width:9px;height:9px;border-radius:2px;background:${heatColors.rough};margin-right:4px;"></span>Rough day</span>
      </div>
    </div>`;

  container.innerHTML = `
    <div class="fade-in" style="display:flex;flex-direction:column;gap:24px;">

      ${heatmapHTML}

      <div class="card">
        <div style="font-weight:500;margin-bottom:4px;">Equity Curve</div>
        <div style="font-size:12px;color:var(--text-muted);margin-bottom:12px;">Cumulative % gain across all trades</div>
        <canvas id="equityChart" height="140"></canvas>
      </div>

      <div class="card">
        <div style="font-weight:500;margin-bottom:4px;">Win Rate Trend</div>
        <div style="font-size:12px;color:var(--text-muted);margin-bottom:12px;">Rolling 5-trade win rate</div>
        <canvas id="winChart" height="120"></canvas>
      </div>

      <div class="card">
        <div style="font-weight:500;margin-bottom:4px;">Discipline Trend</div>
        <div style="font-size:12px;color:var(--text-muted);margin-bottom:12px;">Rolling 5-trade discipline rate</div>
        <canvas id="discChart" height="120"></canvas>
      </div>

      <div class="card">
        <div style="font-weight:500;margin-bottom:4px;">Weekly Consistency</div>
        <div style="font-size:12px;color:var(--text-muted);margin-bottom:14px;">Your trades by day of week 🟢 win 🔴 loss</div>
        <div style="display:flex;flex-direction:column;gap:10px;">
          ${weekdayRows.map(r => `
            <div style="display:flex;align-items:center;gap:12px;">
              <span style="font-family:var(--font-mono);font-size:13px;color:var(--text-secondary);width:36px;">${r.name}</span>
              <span style="flex:1;font-size:15px;letter-spacing:1px;word-break:break-all;">${r.dots}</span>
              <span style="font-family:var(--font-mono);font-size:12px;color:${r.count ? (r.winRate >= 50 ? 'var(--text-success)' : 'var(--text-danger)') : 'var(--text-muted)'};width:54px;text-align:right;">${r.count ? r.winRate + '%' : ''}</span>
            </div>`).join('')}
        </div>
      </div>

      <div class="card">
        <div style="font-weight:500;margin-bottom:4px;">Best Trading Hours</div>
        <div style="font-size:12px;color:var(--text-muted);margin-bottom:14px;">Win rate by market session — find when you perform best</div>
        ${sessionRows.length === 0 ? `<p class="muted" style="font-size:13px;">Log trades with times to see this.</p>` : `
        <div style="display:flex;flex-direction:column;gap:12px;">
          ${sessionRows.map(s => `
            <div>
              <div style="display:flex;justify-content:space-between;margin-bottom:4px;">
                <span style="font-size:13px;">${esc(s.name)} <span style="color:var(--text-muted);font-size:11px;">(${s.count} trade${s.count !== 1 ? 's' : ''})</span></span>
                <span style="font-family:var(--font-mono);font-weight:500;font-size:13px;color:${s.winRate >= 50 ? 'var(--text-success)' : 'var(--text-danger)'};">${s.winRate}%</span>
              </div>
              <div style="height:8px;background:var(--surface-2);border-radius:4px;overflow:hidden;">
                <div style="height:100%;width:${s.winRate}%;background:linear-gradient(90deg, #8a6d1f, var(--gold));border-radius:4px;transition:width 0.6s ease;"></div>
              </div>
            </div>`).join('')}
        </div>`}
      </div>

      <div class="card">
        <div style="font-weight:500;margin-bottom:4px;">Rule Violations</div>
        <div style="font-size:12px;color:var(--text-muted);margin-bottom:14px;">How often you break each rule — awareness is the first fix</div>
        ${violationRows.length === 0 ? `<p class="muted" style="font-size:13px;">No rule violations logged. Either flawless discipline or time to start being honest on the log. 💪</p>` : `
        <div style="display:flex;flex-direction:column;gap:12px;">
          ${violationRows.map(v => `
            <div>
              <div style="display:flex;justify-content:space-between;margin-bottom:4px;">
                <span style="font-size:13px;">⚠ ${esc(v.name)} <span style="color:var(--text-muted);font-size:11px;">(${v.count}\u00d7)</span></span>
                <span style="font-family:var(--font-mono);font-weight:500;font-size:13px;color:${v.pct >= 25 ? 'var(--text-danger)' : v.pct >= 10 ? '#fbbf24' : 'var(--text-secondary)'};">${v.pct}%</span>
              </div>
              <div style="height:8px;background:var(--surface-2);border-radius:4px;overflow:hidden;">
                <div style="height:100%;width:${v.pct}%;background:linear-gradient(90deg, #7a2020, var(--text-danger));border-radius:4px;transition:width 0.6s ease;"></div>
              </div>
            </div>`).join('')}
        </div>
        <div style="font-size:12px;color:var(--text-muted);margin-top:12px;">${totalViolations} total violation${totalViolations !== 1 ? 's' : ''} across ${trades.length} trades.</div>`}
      </div>

      <div class="card">
        <div style="font-weight:500;margin-bottom:4px;">Emotion Analytics</div>
        <div style="font-size:12px;color:var(--text-muted);margin-bottom:14px;">How your state of mind affects your results — the inner game</div>

        ${(discWin !== null && emoWin !== null) ? `
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:${emotionRows.length ? '18px' : '0'};">
          <div class="card" style="background:var(--bg-success);border:none;">
            <div style="font-size:12px;color:var(--text-secondary);">🧘 Disciplined trades</div>
            <div style="font-family:var(--font-mono);font-weight:500;font-size:20px;color:var(--text-success);margin-top:4px;">${discWin}% win</div>
            <div style="font-size:11px;color:var(--text-muted);">avg ${discAvg >= 0 ? '+' : ''}${discAvg}% · ${discT.length} trades</div>
          </div>
          <div class="card" style="background:var(--bg-danger);border:none;">
            <div style="font-size:12px;color:var(--text-secondary);">😤 Emotional trades</div>
            <div style="font-family:var(--font-mono);font-weight:500;font-size:20px;color:var(--text-danger);margin-top:4px;">${emoWin}% win</div>
            <div style="font-size:11px;color:var(--text-muted);">avg ${emoAvg >= 0 ? '+' : ''}${emoAvg}% · ${emoT.length} trades</div>
          </div>
        </div>
        ${(discWin !== null && emoWin !== null && discWin - emoWin >= 10) ? `<div style="font-size:12px;color:var(--gold);margin-bottom:${emotionRows.length ? '18px' : '0'};">💡 You win ${discWin - emoWin} points more often when you trade with discipline. The data is clear.</div>` : ''}
        ` : ''}

        ${emotionRows.length ? `
          <div style="font-size:12px;color:var(--text-secondary);margin-bottom:10px;">By feeling (from your Trade Stories)</div>
          <div style="display:flex;flex-direction:column;gap:10px;">
            ${emotionRows.map(e => `
              <div style="display:flex;align-items:center;gap:12px;">
                <div style="font-size:20px;width:28px;text-align:center;flex-shrink:0;">${e.icon}</div>
                <div style="flex:1;min-width:0;">
                  <div style="display:flex;justify-content:space-between;margin-bottom:3px;">
                    <span style="font-size:13px;">${esc(e.label)} <span style="color:var(--text-muted);font-size:11px;">${e.trades}\u00d7</span></span>

  const red = '#f87171';

  // Equity chart — color line green or red based on final value
  new Chart(document.getElementById('equityChart'), {
    type: 'line',
    data: {
      labels: equityLabels,
      datasets: [{
        data: equityData,
        borderColor: isPositive ? green : red,
        backgroundColor: isPositive ? 'rgba(74,222,128,0.08)' : 'rgba(248,113,113,0.08)',
