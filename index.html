<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>CR8 Trading Journal</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.2/dist/chart.umd.min.js"></script>
<style>
  :root {
    --bg: #0a0a0a;
    --surface-1: rgba(23, 22, 18, 0.78);
    --surface-2: rgba(31, 29, 23, 0.85);
    --border: #2e2a20;
    --border-strong: #4a4330;
    --border-accent: #d4af37;
    --text-primary: #f2f0e8;
    --text-secondary: #b8b2a0;
    --text-muted: #7a7468;
    --text-success: #4ade80;
    --text-danger: #f87171;
    --bg-success: #14291c;
    --bg-danger: #2c1717;
    --gold: #d4af37;
    --radius: 8px;
    --font-mono: 'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, monospace;
    --font-sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  }

  /* Retro terminal / hacker theme */
  body.terminal {
    --bg: #000800;
    --surface-1: rgba(0, 20, 0, 0.85);
    --surface-2: rgba(0, 28, 0, 0.9);
    --border: #0f3d0f;
    --border-strong: #1a5c1a;
    --border-accent: #00ff66;
    --text-primary: #00ff66;
    --text-secondary: #2ec27e;
    --text-muted: #1a7a3d;
    --text-success: #00ff66;
    --text-danger: #ff5f5f;
    --bg-success: #022b0e;
    --bg-danger: #2c0a0a;
    --gold: #00ff66;
  }
  body.terminal,
  body.terminal h2,
  body.terminal input,
  body.terminal select,
  body.terminal textarea,
  body.terminal button {
    font-family: var(--font-mono) !important;
    letter-spacing: 0.02em;
  }
  body.terminal #bg-layer { opacity: 0.12; filter: grayscale(1) brightness(0.6); }
  body.terminal .avatar { background: linear-gradient(135deg, #00ff66, #066b2f); color: #001a08; }
  body.terminal h2,
  body.terminal .brand-mark { text-shadow: 0 0 8px rgba(0,255,102,0.5); }
  /* CRT scanline overlay, only in terminal mode */
  body.terminal::after {
    content: '';
    position: fixed; inset: 0; z-index: 200;
    pointer-events: none;
    background: repeating-linear-gradient(
      0deg,
      rgba(0,0,0,0) 0px,
      rgba(0,0,0,0) 2px,
      rgba(0,20,0,0.25) 3px,
      rgba(0,0,0,0) 4px
    );
    animation: scanlineMove 8s linear infinite;
  }
  @keyframes scanlineMove {
    from { background-position: 0 0; }
    to { background-position: 0 100px; }
  }
  * { box-sizing: border-box; }
  html, body { min-height: 100%; }
  body {
    color: var(--text-primary);
    font-family: var(--font-sans);
    margin: 0;
    padding: 24px 16px 60px;
    line-height: 1.5;
    position: relative;
    overflow-x: hidden;
  }
  #bg-layer {
    position: fixed;
    top: -5%; left: -5%; right: -5%; bottom: -5%;
    width: 110%; height: 110%;
    background: url('cr8-bg.jpg') center / cover no-repeat;
    z-index: -2;
    opacity: 1;
    animation: kenburns 36s ease-in-out infinite alternate;
  }
  #bg-overlay {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: linear-gradient(180deg, rgba(5,5,5,0.82), rgba(5,5,5,0.93));
    z-index: -1;
  }
  @keyframes kenburns {
    0%   { transform: scale(1) translate(0, 0); }
    50%  { transform: scale(1.08) translate(-1.5%, -1%); }
    100% { transform: scale(1.04) translate(1.5%, 1%); }
  }
  #app { max-width: 720px; margin: 0 auto; position: relative; z-index: 1; }

  #market-sidebar {
    position: fixed;
    top: 24px;
    right: 24px;
    width: 220px;
    z-index: 2;
    display: none;
  }
  /* Only show the sidebar when there's genuinely room beside the 720px app column */
  @media (min-width: 1240px) {
    #market-sidebar { display: block; }
  }
  .session-row {
    display: flex; align-items: center; justify-content: space-between;
    padding: 8px 0;
    border-bottom: 0.5px solid var(--border);
  }
  .session-row:last-child { border-bottom: none; }
  .session-dot {
    width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0;
  }
  .session-dot.open { background: #4ade80; box-shadow: 0 0 8px rgba(74,222,128,0.7); animation: livePulse 1.6s ease-in-out infinite; }
  .session-dot.closed { background: #4a4330; }
  .clock-display {
    font-family: var(--font-mono);
    font-size: 26px;
    font-weight: 500;
    color: var(--gold);
    text-shadow: 0 0 12px rgba(212,175,55,0.4);
    text-align: center;
  }
  .prob-check {
    display: flex; align-items: center; gap: 10px;
    padding: 9px 12px;
    border: 0.5px solid var(--border-strong);
    border-radius: var(--radius);
    margin-bottom: 6px;
    cursor: pointer;
    transition: border-color 0.18s ease, background 0.18s ease;
    background: var(--surface-2);
  }
  .prob-check:hover { border-color: var(--gold); }
  .prob-check.checked { border-color: var(--gold); background: rgba(212,175,55,0.08); }
  .prob-check .box {
    width: 18px; height: 18px; border-radius: 5px;
    border: 1.5px solid var(--border-strong);
    flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 12px; color: #1a1605;
    transition: background 0.18s ease, border-color 0.18s ease;
  }
  .prob-check.checked .box { background: var(--gold); border-color: var(--gold); }
  .prob-meter-track {
    height: 12px; background: var(--surface-2); border-radius: 6px; overflow: hidden; margin-top: 4px;
  }
  .prob-meter-fill {
    height: 100%; border-radius: 6px;
    background: linear-gradient(90deg, #f87171, #fbbf24, #4ade80);
    background-size: 300% 100%;
    transition: width 0.35s ease;
  }
  .card, .pill, input, select, textarea, button {
    -webkit-backdrop-filter: blur(6px);
    backdrop-filter: blur(6px);
  }

  #fx-layer {
    position: fixed; top: 0; left: 0; right: 0; bottom: 0;
    z-index: 0; overflow: hidden; pointer-events: none;
  }
  .pnl-particle {
    position: absolute;
    font-family: var(--font-mono);
    font-weight: 500;
    opacity: 0;
    white-space: nowrap;
    animation-name: floatUp;
    animation-timing-function: ease-in;
    animation-iteration-count: infinite;
  }
  @keyframes floatUp {
    0%   { opacity: 0; transform: translateY(0) scale(0.9); }
    10%  { opacity: 0.35; }
    85%  { opacity: 0.35; }
    100% { opacity: 0; transform: translateY(-100vh) scale(1.05); }
  }
  .ticker-row {
    position: fixed;
    left: 0; width: 100%;
    display: flex; align-items: flex-end; gap: 6px;
    opacity: 0.22;
    animation: tickerScroll linear infinite;
    padding: 8px 0;
  }
  .ticker-row.top { top: 0; align-items: flex-start; background: linear-gradient(180deg, rgba(0,0,0,0.35), transparent); }
  .ticker-row.bottom { bottom: 0; align-items: flex-end; background: linear-gradient(0deg, rgba(0,0,0,0.35), transparent); }
  .ticker-candle {
    width: 7px; border-radius: 1px; flex-shrink: 0;
  }
  @keyframes tickerScroll {
    from { transform: translateX(0); }
    to   { transform: translateX(-50%); }
  }
  .crypto-particle {
    position: absolute;
    font-family: var(--font-mono);
    font-weight: 600;
    opacity: 0;
    pointer-events: none;
    animation-name: driftAcross;
    animation-timing-function: linear;
    animation-iteration-count: infinite;
  }
  @keyframes driftAcross {
    0%   { opacity: 0; transform: translate(0, 0) rotate(0deg); }
    8%   { opacity: 0.18; }
    92%  { opacity: 0.18; }
    100% { opacity: 0; transform: translate(var(--dx), var(--dy)) rotate(var(--rot)); }
  }
  h2 { font-weight: 500; margin: 0; }
  input, select, textarea, button {
    font-family: var(--font-sans);
    font-size: 14px;
    background: var(--surface-2);
    border: 0.5px solid var(--border-strong);
    color: var(--text-primary);
    border-radius: var(--radius);
    padding: 8px 10px;
    transition: border-color 0.18s ease, color 0.18s ease, box-shadow 0.18s ease, transform 0.12s ease;
  }
  input:focus, select:focus, textarea:focus {
    outline: none;
    border-color: var(--border-accent);
    box-shadow: 0 0 0 3px rgba(212,175,55,0.12);
  }
  button {
    cursor: pointer;
    font-weight: 500;
    position: relative;
    overflow: hidden;
  }
  button:hover { border-color: var(--gold); color: var(--gold); }
  button:active { transform: scale(0.96); }
  .ripple-effect {
    position: absolute;
    border-radius: 50%;
    background: rgba(212,175,55,0.35);
    transform: scale(0);
    animation: rippleAnim 0.55s ease-out;
    pointer-events: none;
  }
  @keyframes rippleAnim {
    to { transform: scale(2.6); opacity: 0; }
  }
  label { font-size: 13px; color: var(--text-secondary); display: block; margin-bottom: 4px; }
  .card {
    background: var(--surface-1);
    border-radius: var(--radius);
    padding: 1rem;
    border: 0.5px solid var(--border);
    transition: transform 0.18s ease, border-color 0.18s ease, box-shadow 0.18s ease;
  }
  .card:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 20px rgba(0,0,0,0.3);
  }
  /* 3D tilt-enabled cards */
  .tilt-card {
    transform-style: preserve-3d;
    transition: transform 0.12s ease-out, box-shadow 0.2s ease, border-color 0.2s ease;
    will-change: transform;
    position: relative;
  }
  .tilt-card.tilting {
    box-shadow: 0 14px 40px rgba(0,0,0,0.45), 0 0 22px rgba(212,175,55,0.12);
    border-color: rgba(212,175,55,0.4);
  }
  .tilt-card .tilt-glare {
    position: absolute; inset: 0;
    border-radius: var(--radius);
    pointer-events: none;
    background: radial-gradient(circle at var(--glare-x, 50%) var(--glare-y, 0%), rgba(212,175,55,0.16), transparent 55%);
    opacity: 0;
    transition: opacity 0.2s ease;
  }
  .tilt-card.tilting .tilt-glare { opacity: 1; }
  .muted { color: var(--text-muted); }
  .tabbtn { border: none; border-bottom: 2px solid transparent; border-radius: 0; background: transparent; padding: 8px 4px; transition: border-color 0.22s ease, color 0.22s ease; white-space: nowrap; flex-shrink: 0; }
  .tabbtn.active { border-bottom-color: var(--gold); font-weight: 500; color: var(--gold); }
  .pill { font-size: 12px; padding: 2px 8px; border-radius: var(--radius); background: var(--surface-2); color: var(--text-secondary); }
  .brand-mark { font-family: var(--font-mono); font-size: 12px; color: var(--gold); letter-spacing: 0.15em; }
  .tagline { font-size: 12px; color: var(--text-muted); letter-spacing: 0.1em; margin-top: 6px; }

  .avatar {
    width: 40px; height: 40px; border-radius: 50%;
    background: linear-gradient(135deg, #d4af37, #8a6d1f);
    display: flex; align-items: center; justify-content: center;
    font-weight: 500; font-size: 14px; color: #1a1605;
    flex-shrink: 0;
    transition: transform 0.2s ease;
  }
  .avatar:hover { transform: scale(1.08) rotate(-4deg); }
  .avatar.sm { width: 28px; height: 28px; font-size: 11px; }

  @keyframes flicker {
    0%, 100% { transform: scale(1) rotate(-2deg); opacity: 1; }
    25% { transform: scale(1.08) rotate(2deg); opacity: 0.9; }
    50% { transform: scale(0.96) rotate(-1deg); opacity: 1; }
    75% { transform: scale(1.04) rotate(3deg); opacity: 0.95; }
  }
  .flame { display: inline-block; animation: flicker 1.4s ease-in-out infinite; }
  .streak-card {
    background: var(--surface-1);
    border-radius: var(--radius);
    padding: 1rem;
    border: 0.5px solid var(--border);
    display: flex; align-items: center; gap: 12px;
  }
  .streak-card.hot { border-color: #f97316; background: linear-gradient(135deg, rgba(249,115,22,0.12), var(--surface-1)); }
  .streak-card.cold { border-color: #60a5fa; }

  #tierup-overlay {
    position: fixed; inset: 0; z-index: 999;
    background: rgba(0,0,0,0.82);
    display: flex; align-items: center; justify-content: center;
    animation: fadeIn 0.3s ease-out;
  }
  #tierup-overlay .tierup-card {
    text-align: center; padding: 2.5rem 2rem;
    max-width: 360px;
    animation: tierPop 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
  }
  @keyframes tierPop {
    0% { transform: scale(0.7); opacity: 0; }
    100% { transform: scale(1); opacity: 1; }
  }
  .tierup-icon {
    font-size: 64px;
    animation: tierBounce 1.2s ease-in-out infinite;
  }
  @keyframes tierBounce {
    0%, 100% { transform: translateY(0) scale(1); }
    50% { transform: translateY(-10px) scale(1.08); }
  }
  .confetti-piece {
    position: fixed; top: -20px;
    width: 8px; height: 14px;
    opacity: 0.9;
    animation-name: confettiFall;
    animation-timing-function: linear;
    z-index: 1000;
  }
  @keyframes confettiFall {
    0% { transform: translateY(0) rotate(0deg); opacity: 1; }
    100% { transform: translateY(110vh) rotate(540deg); opacity: 0.3; }
  }

  #live-ticker {
    position: fixed; bottom: 0; left: 0; right: 0;
    height: 34px;
    background: rgba(10,10,10,0.92);
    border-top: 1px solid var(--border);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    overflow: hidden;
    z-index: 50;
    display: flex; align-items: center;
  }
  #live-ticker .ticker-label {
    flex-shrink: 0;
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--gold);
    letter-spacing: 0.1em;
    padding: 0 12px;
    border-right: 1px solid var(--border);
    height: 100%;
    display: flex; align-items: center;
    background: rgba(212,175,55,0.06);
  }
  #live-ticker .ticker-label .live-dot {
    display: inline-block; width: 6px; height: 6px; border-radius: 50%;
    background: #4ade80; margin-right: 6px;
    animation: livePulse 1.5s ease-in-out infinite;
  }
  @keyframes livePulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.4; transform: scale(0.8); }
  }
  #live-ticker .ticker-track {
    display: flex; gap: 36px;
    white-space: nowrap;
    animation: liveTickerScroll 40s linear infinite;
    padding-left: 100%;
  }
  @keyframes liveTickerScroll {
    from { transform: translateX(0); }
    to   { transform: translateX(-100%); }
  }
  #live-ticker .ticker-item {
    font-size: 12px;
    color: var(--text-secondary);
    display: inline-flex;
    align-items: center;
    gap: 6px;
  }
  body.has-live-ticker { padding-bottom: 50px; }

  #social-bar {
    position: fixed;
    left: 16px; bottom: 44px;
    z-index: 60;
    display: flex; flex-direction: column; gap: 8px;
  }
  #social-bar a {
    width: 38px; height: 38px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    background: rgba(15,15,15,0.85);
    border: 1px solid var(--border-strong);
    -webkit-backdrop-filter: blur(8px); backdrop-filter: blur(8px);
    font-size: 17px;
    text-decoration: none;
    transition: transform 0.18s ease, border-color 0.18s ease, box-shadow 0.18s ease;
  }
  #social-bar a:hover {
    transform: scale(1.12) translateY(-1px);
    border-color: var(--gold);
    box-shadow: 0 0 14px rgba(212,175,55,0.3);
  }
  #social-bar .social-label {
    position: absolute; left: 46px; top: 50%; transform: translateY(-50%);
    background: rgba(15,15,15,0.95); border: 0.5px solid var(--border-strong);
    padding: 3px 8px; border-radius: 6px; font-size: 11px; white-space: nowrap;
    opacity: 0; pointer-events: none; transition: opacity 0.15s ease;
    font-family: var(--font-mono); color: var(--text-secondary);
  }
  #social-bar a { position: relative; }
  #social-bar a:hover .social-label { opacity: 1; }

  .rank-track {
    display: flex; align-items: center; gap: 0;
    margin: 4px 0;
  }
  .rank-node {
    display: flex; flex-direction: column; align-items: center; gap: 4px;
    flex-shrink: 0;
    position: relative;
  }
  .rank-node .rank-ico {
    width: 34px; height: 34px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 15px;
    background: var(--surface-2);
    border: 1.5px solid var(--border-strong);
    transition: transform 0.2s ease, box-shadow 0.2s ease;
    filter: grayscale(0.8); opacity: 0.5;
  }
  .rank-node.reached .rank-ico { filter: none; opacity: 1; }
  .rank-node.current .rank-ico {
    transform: scale(1.18);
    box-shadow: 0 0 14px rgba(212,175,55,0.5);
  }
  .rank-node .rank-name {
    font-size: 9px; color: var(--text-muted); white-space: nowrap;
    text-align: center; max-width: 56px; line-height: 1.1;
  }
  .rank-node.current .rank-name { color: var(--gold); font-weight: 500; }
  .rank-connector {
    flex: 1; height: 2px; background: var(--border-strong); min-width: 8px;
    margin-bottom: 16px;
  }
  .rank-connector.filled { background: var(--gold); }

  /* Vertical side navigation (wide screens only) */
  #side-nav {
    position: fixed;
    left: 24px; top: 50%; transform: translateY(-50%);
    width: 168px;
    z-index: 3;
    display: none;
    flex-direction: column;
    gap: 4px;
    max-height: 86vh;
    overflow-y: auto;
    scrollbar-width: none;
  }
  #side-nav::-webkit-scrollbar { display: none; }
  #side-nav .side-brand {
    font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.15em;
    color: var(--gold); padding: 0 12px 8px; opacity: 0.8;
  }
  .side-nav-btn {
    display: flex; align-items: center; gap: 10px;
    width: 100%;
    padding: 10px 12px;
    border-radius: var(--radius);
    background: transparent;
    border: 0.5px solid transparent;
    color: var(--text-secondary);
    font-size: 13px; font-weight: 500;
    text-align: left;
    cursor: pointer;
    transition: background 0.16s ease, color 0.16s ease, border-color 0.16s ease, transform 0.12s ease;
  }
  .side-nav-btn:hover { background: var(--surface-2); color: var(--text-primary); border-color: var(--border); transform: translateX(2px); }
  .side-nav-btn.active { background: rgba(212,175,55,0.12); color: var(--gold); border-color: var(--gold); }
  .side-nav-btn .ico { font-size: 15px; flex-shrink: 0; }

  @media (min-width: 1160px) {
    #side-nav { display: flex; }
    .tab-bar-h { display: none !important; }
  }
  @media (max-width: 600px) {
    #social-bar { flex-direction: row; left: 10px; bottom: 46px; gap: 6px; }
    #social-bar a { width: 34px; height: 34px; font-size: 15px; }
    #social-bar .social-label { display: none; }
  }

  /* ===== Cinematic loading screen ===== */
  #cr8-loader {
    position: fixed; inset: 0; z-index: 500;
    background: radial-gradient(circle at center, #14110a 0%, #050505 70%);
    display: flex; flex-direction: column; align-items: center; justify-content: flex-start;
    padding-top: 16vh;
    gap: 28px;
    transition: opacity 0.6s ease;
  }
  #cr8-loader.fade-out { opacity: 0; pointer-events: none; }

  .loader-brand {
    font-family: var(--font-mono);
    font-size: 20px; letter-spacing: 0.42em;
    color: var(--gold);
    text-shadow: 0 0 18px rgba(212,175,55,0.7);
    margin-bottom: 4px;
  }

  .loader-stage {
    position: relative;
    width: 220px; height: 220px;
    display: flex; align-items: center; justify-content: center;
  }

  .loader-ring {
    position: absolute;
    width: 220px; height: 220px;
    border-radius: 50%;
    border: 2px solid rgba(212,175,55,0.1);
    border-top-color: var(--gold);
    box-shadow: 0 0 24px rgba(212,175,55,0.25), inset 0 0 24px rgba(212,175,55,0.08);
    animation: loaderSpin 1.1s linear infinite;
  }
  @keyframes loaderSpin { to { transform: rotate(360deg); } }

  .loader-inner {
    display: flex; flex-direction: column; align-items: center; gap: 14px;
  }
  .loader-candles {
    display: flex; align-items: flex-end; gap: 5px; height: 70px;
  }
  .loader-candles i {
    display: block; width: 8px; border-radius: 2px;
    background: linear-gradient(180deg, #f1d27a, #d4af37);
    box-shadow: 0 0 12px rgba(212,175,55,0.7);
    animation: loaderCandle 1.4s ease-in-out infinite;
  }
  @keyframes loaderCandle {
    0%, 100% { height: 24%; opacity: 0.6; }
    50% { height: 100%; opacity: 1; }
  }

  .loader-chart {
    width: 150px; height: 44px;
  }
  .loader-chart path {
    stroke: var(--gold);
    stroke-width: 2.5;
    fill: none;
    stroke-linecap: round;
    stroke-linejoin: round;
    stroke-dasharray: 400;
    stroke-dashoffset: 400;
    animation: drawChart 2.2s ease-in-out infinite;
    filter: drop-shadow(0 0 5px rgba(212,175,55,0.8));
  }
  @keyframes drawChart {
    0% { stroke-dashoffset: 400; }
    55% { stroke-dashoffset: 0; }
    85% { stroke-dashoffset: 0; opacity: 1; }
    100% { stroke-dashoffset: 0; opacity: 0; }
  }

  .loader-boot {
    font-family: var(--font-mono);
    font-size: 12px; color: var(--gold);
    text-shadow: 0 0 8px rgba(212,175,55,0.4);
    min-height: 80px; width: 300px;

const SUPABASE_URL = 'https://xnovywzbjuvgglkzudrv.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inhub3Z5d3pianV2Z2dsa3p1ZHJ2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI2MjI3MDYsImV4cCI6MjA5ODE5ODcwNn0.29EvIEd5u9Mn2xO0YMe1ozyYb29oLrd574PcM5kh4Jc';
// ----------------------------------------------------------------

// Lightweight Supabase REST client — no external library or CDN needed.
// Talks directly to your own Supabase project over plain fetch(), so nothing
// can block it the way third-party CDN scripts sometimes get blocked.
function createLiteClient(url, anonKey) {
  const restBase = url + '/rest/v1';
  const storageBase = url + '/storage/v1';
  const baseHeaders = {
    'apikey': anonKey,
    'Authorization': 'Bearer ' + anonKey
  };

  function buildQuery(table) {
    const filters = [];
    let selectCols = '*';
    let orderClause = null;
    let countMode = null;
    let headOnly = false;
    let singleMode = false;

    const builder = {
      select(cols, opts) {
        selectCols = cols || '*';
        if (opts && opts.count) countMode = opts.count;
        if (opts && opts.head) headOnly = true;
        return builder;
      },
      eq(col, val) {
        filters.push(`${col}=eq.${encodeURIComponent(val)}`);
        return builder;
      },
      order(col, opts) {
        const dir = (opts && opts.ascending === false) ? 'desc' : 'asc';
        orderClause = `${col}.${dir}`;
        return builder;
      },
      maybeSingle() {
        singleMode = true;
        return builder.then(undefined); // trigger execution via thenable below
      },
      insert(rowOrRows) {
        return (async () => {
          try {
            const res = await fetch(`${restBase}/${table}`, {
              method: 'POST',
              headers: { ...baseHeaders, 'Content-Type': 'application/json', 'Prefer': 'return=representation' },
              body: JSON.stringify(rowOrRows)
            });
            if (!res.ok) {
              const errBody = await res.text();
              return { data: null, error: { message: errBody, status: res.status } };
            }
            const data = await res.json();
            return { data, error: null };
          } catch (e) {
            return { data: null, error: { message: e.message } };
          }
        })();
      },
      // Thenable: lets `await sb.from(t).select(...).eq(...)` work without an explicit exec() call
      then(resolve, reject) {
        return execute().then(resolve, reject);
      }
    };

    async function execute() {
      try {
        let queryUrl = `${restBase}/${table}?select=${encodeURIComponent(selectCols)}`;
        if (filters.length) queryUrl += '&' + filters.join('&');
        if (orderClause) queryUrl += `&order=${orderClause}`;

        const headers = { ...baseHeaders };
        if (countMode) headers['Prefer'] = `count=${countMode}`;

        const res = await fetch(queryUrl, {
          method: headOnly ? 'HEAD' : 'GET',
          headers
        });

        if (!res.ok && !headOnly) {
          const errBody = await res.text();
          return { data: null, error: { message: errBody, status: res.status }, count: null };
        }

        let count = null;
        const contentRange = res.headers.get('content-range');
        if (contentRange && contentRange.includes('/')) {
          const total = contentRange.split('/')[1];
          count = total === '*' ? null : parseInt(total, 10);
        }

        if (headOnly) return { data: null, error: null, count };

        const data = await res.json();
        if (singleMode) {
          return { data: data && data.length ? data[0] : null, error: null, count };
        }
        return { data, error: null, count };
      } catch (e) {
        return { data: null, error: { message: e.message }, count: null };
      }
    }

    return builder;
  }

  return {
    from(table) {
      return buildQuery(table);
    },
    async rpc(fnName, params) {
      try {
        const res = await fetch(`${restBase}/rpc/${fnName}`, {
          method: 'POST',
          headers: { ...baseHeaders, 'Content-Type': 'application/json' },
          body: JSON.stringify(params || {})
        });
        if (!res.ok) {
          const errBody = await res.text();
          return { data: null, error: { message: errBody, status: res.status } };
        }
        const data = await res.json();
        return { data, error: null };
      } catch (e) {
        return { data: null, error: { message: e.message } };
      }
    },
    storage: {
      from(bucket) {
        return {
          async upload(path, file) {
            try {
              const res = await fetch(`${storageBase}/object/${bucket}/${path}`, {
                method: 'POST',
                headers: { ...baseHeaders, 'Content-Type': file.type || 'application/octet-stream' },
                body: file
              });
              if (!res.ok) {
                const errBody = await res.text();
                return { data: null, error: { message: errBody, status: res.status } };
              }
              const data = await res.json();
              return { data, error: null };
            } catch (e) {
              return { data: null, error: { message: e.message } };
            }
          },
          getPublicUrl(path) {
            return { data: { publicUrl: `${storageBase}/object/public/${bucket}/${path}` } };
          }
        };
      }
    }
  };
}

function getInitials(name) {
  const parts = String(name || '?').trim().split(/\s+/);
  if (parts.length === 1) return parts[0].slice(0, 2).toUpperCase();

      if (!nick) { msg.textContent = 'Enter a nickname for the new student.'; return; }
      msg.textContent = 'Generating…';

      function generateRandomCode(length) {
        // Random bytes -> base64 -> strip non-alphanumeric -> uppercase -> trim to length
        const bytes = new Uint8Array(length + 8); // extra bytes since base64/cleanup shrinks it
        crypto.getRandomValues(bytes);
        let b64 = btoa(String.fromCharCode(...bytes));
        let clean = b64.replace(/[^a-zA-Z0-9]/g, '').toUpperCase();
        while (clean.length < length) {
          crypto.getRandomValues(bytes);
          clean += btoa(String.fromCharCode(...bytes)).replace(/[^a-zA-Z0-9]/g, '').toUpperCase();
        }
        return clean.slice(0, length);
      }

      let newCode, exists = true, attempts = 0;
      while (exists && attempts < 8) {
        newCode = 'CR8-' + generateRandomCode(15);
        const { data: existing } = await sb.from('traders').select('code').eq('code', newCode).maybeSingle();

        attempts++;

      <div style="display:flex;flex-direction:column;gap:8px;">
        ${rows.map(r => `

            <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap;">
              <div class="avatar sm">${getInitials(r.trader.nickname)}</div>
              <div style="flex:1;min-width:120px;">

function computeStats(trades, code) {
  const t = trades.filter(tr => tr.trader_code === code);
  const wins = t.filter(tr => tr.result === 'win').length;
  const total = t.length;
  const disciplined = t.filter(tr => !tr.emotional).length;
  const pnlPct = t.reduce((a, tr) => a + Number(tr.pnl_pct), 0);
  return {
    total,
    winRate: total ? Math.round((wins / total) * 100) : 0,
    disciplineRate: total ? Math.round((disciplined / total) * 100) : 0,
    pnlPct: Math.round(pnlPct * 10) / 10
  };
}

const TIERS = [
  { name: 'Retail',            minTrades: 0,   minScore: 0,  icon: '🪙', color: '#9a9a9a' },
  { name: 'Developing',        minTrades: 10,  minScore: 40, icon: '📈', color: '#60a5fa' },
  { name: 'Professional',      minTrades: 25,  minScore: 55, icon: '💼', color: '#a78bfa' },
  { name: 'Institution',       minTrades: 50,  minScore: 65, icon: '🏛️', color: '#34d399' },
  { name: 'Portfolio Manager', minTrades: 90,  minScore: 73, icon: '📊', color: '#22d3ee' },
  { name: 'Fund Manager',      minTrades: 140, minScore: 80, icon: '⚡', color: '#d4af37' },
  { name: 'Legacy',            minTrades: 200, minScore: 88, icon: '👑', color: '#f97316' }
];

function computeTier(trades, code) {
  const t = trades.filter(tr => tr.trader_code === code);
  const total = t.length;
  const wins = t.filter(tr => tr.result === 'win').length;
  const disciplined = t.filter(tr => !tr.emotional).length;
  const winRate = total ? (wins / total) * 100 : 0;
  const disciplineRate = total ? (disciplined / total) * 100 : 0;
  const score = winRate * 0.5 + disciplineRate * 0.5;

  let current = TIERS[0];
  for (const tier of TIERS) {
    if (total >= tier.minTrades && score >= tier.minScore) current = tier;
  }

  const currentIndex = TIERS.indexOf(current);
  const next = TIERS[currentIndex + 1] || null;

  return { ...current, score: Math.round(score), total, next, currentIndex };
}

function computeBadges(trades, code) {
  const t = trades.filter(tr => tr.trader_code === code)
    .sort((a, b) => (a.trade_date + a.trade_time).localeCompare(b.trade_date + b.trade_time));
  const total = t.length;
  const wins = t.filter(tr => tr.result === 'win').length;
  const winRate = total ? Math.round((wins / total) * 100) : 0;
  const disciplined = t.filter(tr => !tr.emotional).length;
  const disciplineRate = total ? Math.round((disciplined / total) * 100) : 0;
  const netGain = t.reduce((a, tr) => a + Number(tr.pnl_pct), 0);
  const streaks = computeStreaks(trades, code);

  const last10 = t.slice(-10);
  const disciplineLast10 = last10.length === 10 && last10.every(tr => !tr.emotional);

  // Comeback Kid: a win immediately after a loss streak of 3+
  let comeback = false;
  let lossRun = 0;
  for (let i = 0; i < t.length; i++) {
    if (t[i].result === 'loss') { lossRun++; }
    else {
      if (lossRun >= 3) { comeback = true; }
      lossRun = 0;
    }
  }

  // Risk Manager: average risk:reward of at least 1:2 (parses "1:2", "1:3" style strings)
  const rrValues = t.map(tr => {
    const m = String(tr.risk_reward || '').match(/^(\d+(?:\.\d+)?)\s*:\s*(\d+(?:\.\d+)?)$/);
    if (!m) return null;
    const risk = parseFloat(m[1]), reward = parseFloat(m[2]);
    return risk > 0 ? reward / risk : null;
  }).filter(v => v !== null);
  const avgRR = rrValues.length ? rrValues.reduce((a, b) => a + b, 0) / rrValues.length : 0;

  // Diversified: 3+ distinct instruments traded
  const instruments = new Set(t.map(tr => (tr.instrument || '').trim().toUpperCase()).filter(Boolean));
  // Strategist: 3+ distinct strategies used
  const strategies = new Set(t.map(tr => (tr.strategy || '').trim().toUpperCase()).filter(Boolean));

  // Early Riser / Night Owl: based on logged trade_time
  const earlyTrade = t.some(tr => {
    const h = parseInt(String(tr.trade_time || '99:99').split(':')[0], 10);
    return h < 7;
  });
  const nightTrade = t.some(tr => {
    const h = parseInt(String(tr.trade_time || '-1:99').split(':')[0], 10);
    return h >= 21;
  });

  // High Roller: any single trade with 5%+ gain
  const highRoller = t.some(tr => Number(tr.pnl_pct) >= 5);

  // Consistency King: logged trades on 5+ distinct calendar days
  const distinctDays = new Set(t.map(tr => tr.trade_date));

  // Phoenix: cumulative gain dipped negative at some point, but is positive now
  let running = 0, wentNegative = false;
  t.forEach(tr => {
    running += Number(tr.pnl_pct);
    if (running < 0) wentNegative = true;
  });
  const phoenix = wentNegative && running > 0;

  const badges = [
    { id: 'first', icon: '🌱', name: 'First Blood', desc: 'Log your first trade', unlocked: total >= 1 },
    { id: 'ten', icon: '📓', name: 'Committed', desc: 'Log 10 trades', unlocked: total >= 10 },
    { id: 'twentyfive', icon: '📒', name: 'Grinder', desc: 'Log 25 trades', unlocked: total >= 25 },
    { id: 'fifty', icon: '📚', name: 'Veteran', desc: 'Log 50 trades', unlocked: total >= 50 },
    { id: 'hundred', icon: '🏛️', name: 'Institution', desc: 'Log 100 trades', unlocked: total >= 100 },
    { id: 'discipline10', icon: '🧘', name: 'Disciplined Mind', desc: 'Follow your rules on 10 trades in a row', unlocked: disciplineLast10 },
    { id: 'streak5', icon: '🔥', name: 'Iron Will', desc: 'Hit a 5-trade win streak', unlocked: streaks.best >= 5 },
    { id: 'streak10', icon: '⚡', name: 'Unstoppable', desc: 'Hit a 10-trade win streak', unlocked: streaks.best >= 10 },
    { id: 'sharpshooter', icon: '🎯', name: 'Sharpshooter', desc: '70%+ win rate over 10+ trades', unlocked: total >= 10 && winRate >= 70 },
    { id: 'greengain', icon: '💰', name: 'In the Green', desc: 'Positive net gain over 10+ trades', unlocked: total >= 10 && netGain > 0 },
    { id: 'fulldiscipline', icon: '🛡️', name: 'Rule Follower', desc: '100% discipline over 20+ trades', unlocked: total >= 20 && disciplineRate === 100 },
    { id: 'comeback', icon: '🐦‍🔥', name: 'Comeback Kid', desc: 'Win right after a 3+ loss streak', unlocked: comeback },
    { id: 'riskmanager', icon: '⚖️', name: 'Risk Manager', desc: 'Average risk:reward of 1:2 or better', unlocked: rrValues.length >= 5 && avgRR >= 2 },
    { id: 'diversified', icon: '🌐', name: 'Diversified', desc: 'Trade 3+ different instruments', unlocked: instruments.size >= 3 },
    { id: 'strategist', icon: '🧩', name: 'Strategist', desc: 'Use 3+ different strategies', unlocked: strategies.size >= 3 },
    { id: 'earlyriser', icon: '🌅', name: 'Early Riser', desc: 'Log a trade before 7AM', unlocked: earlyTrade },
    { id: 'nightowl', icon: '🦉', name: 'Night Owl', desc: 'Log a trade at 9PM or later', unlocked: nightTrade },
    { id: 'highroller', icon: '🚀', name: 'High Roller', desc: 'Land a single trade with 5%+ gain', unlocked: highRoller },
    { id: 'consistency', icon: '📅', name: 'Consistency King', desc: 'Log trades on 5 different days', unlocked: distinctDays.size >= 5 },
    { id: 'phoenix', icon: '🔥🐣', name: 'Phoenix', desc: 'Recover from a drawdown into positive territory', unlocked: phoenix }
  ];

  return badges;
}

// Trade Quality Score — rewards execution, not profit.
// Entry: from setup-quality checklist score.
// Risk Management: starts at 100, docked for risk-related rule violations + poor RR.
// Patience: self-rated (stored), falls back to discipline-based estimate.
// Exit: self-rated (stored), falls back to result-aware estimate.
function computeTradeQuality(t) {
  // Entry — based on setup score (how well it matched the plan)
  const entry = t.setup_score != null ? t.setup_score : 60;

  // Risk Management — penalize risk-related violations
  let risk = 100;
  const violations = t.rule_violations || [];
  if (violations.includes('Moved stop loss')) risk -= 35;
  if (violations.includes('Over leveraged')) risk -= 30;
  if (violations.includes('No clear setup')) risk -= 15;
  // Reward defined RR of 1:2 or better
  const m = String(t.risk_reward || '').match(/^(\d+(?:\.\d+)?)\s*:\s*(\d+(?:\.\d+)?)$/);
  if (m) {
    const ratio = parseFloat(m[2]) / parseFloat(m[1]);
    if (ratio < 1) risk -= 15;
  } else {
    risk -= 10; // no RR defined
  }
  risk = Math.max(0, Math.min(100, risk));

  // Patience — self-rated if present, else estimated
  let patience;
  if (t.q_patience != null) {
    patience = t.q_patience;
  } else {
    patience = 80;
    if (t.emotional) patience -= 30;
    if (violations.includes('Entered early')) patience -= 25;
    if (violations.includes('Revenge trade')) patience -= 35;
    patience = Math.max(0, Math.min(100, patience));
  }

  // Exit — self-rated if present, else estimated
  let exit;
  if (t.q_exit != null) {
    exit = t.q_exit;
  } else {
    exit = 75;
    if (violations.includes('Moved stop loss')) exit -= 25;
    exit = Math.max(0, Math.min(100, exit));
  }

  const overall = Math.round((entry + risk + patience + exit) / 4);
  return { entry: Math.round(entry), risk: Math.round(risk), patience: Math.round(patience), exit: Math.round(exit), overall };
}

function computeStreaks(trades, code) {
  // Sort by date+time ascending so we scan from oldest to newest
  const t = trades
    .filter(tr => tr.trader_code === code)
    .sort((a, b) => (a.trade_date + a.trade_time).localeCompare(b.trade_date + b.trade_time));

  if (t.length === 0) return { current: 0, best: 0, currentType: null };

  // Best win streak ever
  let best = 0, run = 0;
  t.forEach(tr => {
    if (tr.result === 'win') { run++; best = Math.max(best, run); }
    else run = 0;
  });

  // Current streak from the most recent trade going back
  const last = t[t.length - 1];
  const streakType = last.result; // 'win' or 'loss'
  let current = 0;
  for (let i = t.length - 1; i >= 0; i--) {
    if (t[i].result === streakType) current++;
    else break;
  }

  return { current, best, currentType: streakType };
}

  const myTier = computeTier(allTrades, state.currentCode);

  const tierKey = 'cr8_last_tier_' + state.currentCode;
  const lastSeenTier = localStorage.getItem(tierKey);
  if (lastSeenTier && lastSeenTier !== myTier.name) {
    const lastIndex = TIERS.findIndex(t => t.name === lastSeenTier);
